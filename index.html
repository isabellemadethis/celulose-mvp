      flex-direction: column;
      gap: 8px;
      padding: 24px 20px;
      background: var(--white);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      text-align: left;
      cursor: pointer;
      transition: border-color 140ms ease, transform 140ms ease, box-shadow 140ms ease;
      font-family: inherit;
      color: inherit;
    }
    .master-client-card:hover {
      border-color: var(--mauve);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(166, 84, 106, 0.08);
    }

    .master-client-name {
      font-size: 18px;
      font-weight: 600;
      color: var(--deep);
      letter-spacing: -0.01em;
    }

    .master-client-sprint {
      font-size: 12px;
      color: var(--mauve-text);
      letter-spacing: 0.02em;
    }

    .master-client-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .master-client-stat {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--blush-light);
      border: 1px solid var(--border-soft);
      border-radius: 100px;
      font-size: 11px;
      color: var(--mauve-text);
      letter-spacing: 0.02em;
    }
    .master-client-stat strong {
      color: var(--deep);
      font-weight: 600;
    }
    /* Variante mauve: sinaliza demanda de atenção (review > 0 OU insights novos > 0) */
    .master-client-stat.is-attention {
      background: var(--white);
      border-color: var(--mauve);
      color: var(--mauve);
    }
    .master-client-stat.is-attention strong {
      color: var(--mauve);
    }

    .master-empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--mauve-text);
      font-size: 13px;
      background: var(--white);
      border: 1px dashed var(--border-soft);
      border-radius: var(--radius-md);
    }

    /* ============================================================ */
    /* MASTER DARK — Repaint Celulose (Commit B / D16)              */
    /* Aplica SO quando body.master-mode (toggleado em renderForCurrentMode  */
    /* + route()). Editor/viewer/home permanecem na paleta cliente — */
    /* zero risco de vazamento dark pro app cliente.                */
    /* Cards recebem CSS vars locais via inline style (--card-bg /  */
    /* --card-fg / --card-accent / --card-border / --card-bg-soft / */
    /* --card-accent-soft) em renderMasterDashboard — vitrine       */
    /* colorida sobre o dark, paleta de cada cliente preservada.    */
    /* Fallback de cada var = paleta global blush (defensivo se     */
    /* branding faltar).                                            */
    /* ============================================================ */
    body.master-mode {
      background: #0a0a0a;
    }
    /* #app envolve o .master-shell e tem background blush-light + max-width:480px
       na regra base (linha ~85). Como ID > classe na especificidade, o background
       blush vazava por tras do shell e o 480px espremia o master de 960. Aqui
       neutralizamos os dois SO no master-mode — editor/viewer mantem 480 + blush. */
    body.master-mode #app {
      background: transparent;
      max-width: none;
    }
    body.master-mode .master-shell {
      background: transparent;
    }
    body.master-mode .master-header {
      border-bottom-color: rgba(255, 255, 255, 0.08);
    }
    body.master-mode .master-kicker {
      color: var(--celulose-green);
    }
    body.master-mode .master-title {
      color: #FFFFFF;
    }
    body.master-mode .master-subtitle {
      color: rgba(255, 255, 255, 0.6);
    }
    body.master-mode .master-add-client-btn {
      border-color: var(--celulose-green);
      background: transparent;
      color: var(--celulose-green);
    }
    body.master-mode .master-add-client-btn:hover {
      background: var(--celulose-green);
      color: #0a0a0a;
    }
    body.master-mode .master-empty {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.6);
    }
    /* Vitrine V1 — cards usam CSS vars locais escopadas no proprio elemento. */
    body.master-mode .master-client-card {
      background: var(--card-bg, var(--white));
      border-color: var(--card-border, var(--border-soft));
      color: var(--card-fg, var(--deep));
    }
    body.master-mode .master-client-card:hover {
      border-color: var(--celulose-green);
      box-shadow: 0 8px 24px color-mix(in srgb, var(--celulose-green) 18%, transparent);
    }
    body.master-mode .master-client-name {
      color: var(--card-fg, var(--deep));
    }
    body.master-mode .master-client-sprint {
      color: var(--card-accent-soft, var(--mauve-text));
    }
    body.master-mode .master-client-stat {
      background: var(--card-bg-soft, var(--blush-light));
      border-color: var(--card-border, var(--border-soft));
      color: var(--card-accent-soft, var(--mauve-text));
    }
    body.master-mode .master-client-stat strong {
      color: var(--card-fg, var(--deep));
    }
    body.master-mode .master-client-stat.is-attention {
      background: var(--white);
      border-color: var(--card-accent, var(--mauve));
      color: var(--card-accent, var(--mauve));
    }
    body.master-mode .master-client-stat.is-attention strong {
      color: var(--card-accent, var(--mauve));
    }
    /* Sheets abertas em master-mode (Add Cliente hoje; Edit/Delete depois):
       UX usa verde Celulose em vez de mauve da paleta default. Botao primario
       vira verde + texto #0a0a0a (mesmo padrao do .master-add-client-btn:hover).
       Preview da paleta cliente e swatch da persona NAO afetados — usam vars
       escopadas (--p-*) ou estilo inline. */
    body.master-mode .sheet-kicker {
      color: var(--celulose-green);
    }
    body.master-mode .form-label {
      color: var(--celulose-green);
    }
    body.master-mode .btn-primary {
      background: var(--celulose-green);
      color: #0a0a0a;
    }
    /* Polish UX master — TUDO que estava em paleta Closet (rosa) e devia ser */
    /* paleta Celulose (dark + verde) dentro do master. Escopado body.master-mode */
    /* pra editor/viewer manterem paleta cliente intactos. */
    body.master-mode .sheet {
      background: var(--white);
    }
    body.master-mode .sheet-handle {
      background: rgba(0, 0, 0, 0.15);
    }
    body.master-mode .sheet-header {
      border-bottom-color: rgba(0, 0, 0, 0.08);
    }
    body.master-mode .form-input:focus,
    body.master-mode .form-textarea:focus,
    body.master-mode .form-select:focus {
      border-color: var(--celulose-green);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--celulose-green) 18%, transparent);
    }
    body.master-mode .form-select {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2307d375'><path d='M7 10l5 5 5-5z'/></svg>");
    }
    body.master-mode .image-upload {
      background: rgba(0, 0, 0, 0.03);
      border-color: rgba(0, 0, 0, 0.15);
    }
    body.master-mode .image-upload-btn {
      color: var(--celulose-green);
      border-color: rgba(0, 0, 0, 0.1);
    }
    body.master-mode .image-upload-btn:hover {
      background: color-mix(in srgb, var(--celulose-green) 8%, transparent);
    }
    body.master-mode .persona-add-form {
      background: rgba(0, 0, 0, 0.03);
    }
    body.master-mode .image-loading {
      color: var(--celulose-green);
    }
    /* Round 3 — auditoria profunda: form-input borders, pin-regen, swatches, */
    /* voter-row, btn-secondary. Todos viram cinza neutro / verde Celulose.   */
    body.master-mode .form-input,
    body.master-mode .form-textarea,
    body.master-mode .form-select {
      border-color: rgba(0, 0, 0, 0.12);
    }
    body.master-mode .form-input::placeholder,
    body.master-mode .form-textarea::placeholder {
      color: rgba(0, 0, 0, 0.4);
    }
    body.master-mode .persona-color-swatch,
    body.master-mode .palette-swatch {
      border-color: rgba(0, 0, 0, 0.12);
    }
    body.master-mode .persona-add-voter-row {
      color: rgba(0, 0, 0, 0.7);
    }
    body.master-mode .pin-regen-btn {
      color: var(--celulose-green);
      border-color: rgba(0, 0, 0, 0.12);
    }
    body.master-mode .pin-regen-btn:hover {
      background: color-mix(in srgb, var(--celulose-green) 8%, transparent);
      border-color: var(--celulose-green);
    }
    body.master-mode .btn-secondary {
      border-color: rgba(0, 0, 0, 0.12);
    }
    body.master-mode .btn-secondary:hover {
      background: rgba(0, 0, 0, 0.04);
    }
    /* form-hint dentro do master vira cinza-escuro neutro (era var(--gray)) */
    body.master-mode .form-hint {
      color: rgba(0, 0, 0, 0.55);
    }
    /* Round 4 — palette grid labels/inputs/hints + preview header.            */
    /* OBS: .palette-preview-{kicker,title,subtitle,pill-*,cta,divider,rose}   */
    /* usam --p-* (paleta cliente em simulacao) — NAO mexer, e proposital.    */
    body.master-mode .palette-row label {
      color: rgba(0, 0, 0, 0.7);
    }
    body.master-mode .palette-row input {
      border-color: rgba(0, 0, 0, 0.12);
    }
    body.master-mode .palette-cell-hint {
      color: rgba(0, 0, 0, 0.5);
    }
    body.master-mode .palette-preview {
      border-color: rgba(0, 0, 0, 0.12);
    }
    body.master-mode .palette-preview-header {
      background: rgba(0, 0, 0, 0.03);
      border-bottom-color: rgba(0, 0, 0, 0.08);
      color: rgba(0, 0, 0, 0.6);
    }
    /* Round 5 — heranca: textos da sheet do master herdam preto neutro 85%, */
    /* substituindo o var(--deep) mauve escuro que vinha do body global.     */
    /* Sheet-title, form-input typed text, btn-secondary text resolvem.      */
    body.master-mode .sheet {
      color: rgba(0, 0, 0, 0.85);
    }
    body.master-mode .sheet-title {
      color: rgba(0, 0, 0, 0.85);
    }
    body.master-mode .form-input,
    body.master-mode .form-textarea,
    body.master-mode .form-select {
      color: rgba(0, 0, 0, 0.85);
    }
    body.master-mode .btn-secondary {
      color: rgba(0, 0, 0, 0.85);
    }
    /* Notificacoes globais escopadas pelo master — toast e banner viram preto */
    /* Celulose enquanto a Isabelle esta no master. Em editor de cliente, voltam */
    /* pro --deep da paleta cliente. */
    body.master-mode .toast {
      background: #0a0a0a;
    }
    body.master-mode .offline-banner {
      background: #0a0a0a;
    }
    body.master-mode .offline-banner-dot {
      background: var(--celulose-green);
    }

    /* ============================================================ */
    /* MASTER MANAGE / DELETE (Commit B / D17)                      */
    /* Toggle "Gerenciar" no header flipa body.is-manage-mode.     */
    /* Cards ganham botao x no canto top-right (display:none default,*/
    /* visivel so em is-manage-mode). Click no x abre sheet de       */
    /* confirm com count detalhado + input pra digitar slug + botao  */
    /* Apagar disabled ate match. Pre-check anti-self-delete via     */
    /* loadAuthLocal()?.cliente === slug. Refresh via                */
    /* loadMasterDashboard() pos remove (mesmo pattern de Add).      */
    /* ============================================================ */
    .master-manage-toggle-btn {
      flex-shrink: 0;
      padding: 10px 14px;
      border: 1px solid var(--mauve);
      background: var(--white);
      color: var(--mauve);
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }
    .master-manage-toggle-btn:hover {
      background: var(--blush-light);
    }
    body.master-mode .master-manage-toggle-btn {
      border-color: rgba(255, 255, 255, 0.2);
      background: transparent;
      color: rgba(255, 255, 255, 0.7);
    }
    body.master-mode .master-manage-toggle-btn:hover {
      background: rgba(255, 255, 255, 0.04);
      color: #FFFFFF;
    }
    body.master-mode .master-manage-toggle-btn.is-active {
      background: rgba(255, 255, 255, 0.08);
      color: #FFFFFF;
      border-color: rgba(255, 255, 255, 0.4);
    }
    /* Wrapper envolve cada card pra hospedar o x absoluto sem violar */
    /* HTML (button dentro de button e invalido). Wrapper preserva o  */
    /* slot do grid auto-fill — ele que vira o cell, card e filho.   */
    .master-client-card-wrapper {
      position: relative;
      display: block;
    }
    /* Card como flex column sem width explicito encolhe pro conteudo dentro do
       wrapper display:block. Forca largura cheia pra preservar o comportamento
       pre-D17 (quando o card era filho direto do grid auto-fill). */
    .master-client-card-wrapper .master-client-card {
      width: 100%;
      box-sizing: border-box;
    }
    .master-client-card-delete {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      display: none;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      color: rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(0, 0, 0, 0.08);
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
      z-index: 2;
      /* padding zero garante que o SVG 12x12 fique exato no centro da bolinha 28x28 */
      padding: 0;
    }
    .master-client-card-delete:hover {
      background: #dc2626;
      border-color: #dc2626;
      color: #FFFFFF;
      transform: scale(1.1);
    }
    body.is-manage-mode .master-client-card-delete {
      display: flex;
    }
    /* P10 — irmao do delete: edit branding (verde Celulose no hover, espelha o pattern do x). */
    .master-client-card-edit {
      position: absolute;
      top: 8px;
      right: 44px; /* 28px (delete width) + 8px gap + 8px margem direita */
      width: 28px;
      height: 28px;
      display: none;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      color: rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(0, 0, 0, 0.08);
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
      z-index: 2;
      padding: 0;
      font-size: 14px;
      line-height: 1;
    }
    .master-client-card-edit:hover {
      background: #07d375;
      border-color: #07d375;
      color: #0a0a0a;
      transform: scale(1.1);
    }
    body.is-manage-mode .master-client-card-edit {
      display: flex;
    }

    /* S3.0: bloco de links de instalação PWA por persona — só aparece em manage-mode. */
    .master-client-persona-links {
      display: none;
      margin-top: 8px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 12px;
      backdrop-filter: blur(6px);
    }
    body.is-manage-mode .master-client-persona-links {
      display: block;
    }
    .master-client-persona-links-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(0, 0, 0, 0.5);
      margin-bottom: 8px;
    }
    .master-client-persona-links-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .master-client-persona-link-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      background: rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 8px;
      color: var(--deep, #3A1E28);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
      text-align: left;
      width: 100%;
    }
    .master-client-persona-link-btn:hover {
      background: rgba(7, 211, 117, 0.12);
      border-color: rgba(7, 211, 117, 0.4);
    }
    .master-client-persona-link-btn-icon {
      font-size: 14px;
      flex-shrink: 0;
    }
    .master-client-persona-link-btn-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .master-client-persona-link-btn-hint {
      font-size: 10px;
      color: rgba(0, 0, 0, 0.45);
      flex-shrink: 0;
    }
    .master-client-persona-links-empty {
      font-size: 11px;
      color: rgba(0, 0, 0, 0.5);
      font-style: italic;
      padding: 4px;
    }

    /* ============================================================ */
    /* MODAL (editor card form)                                     */
    /* ============================================================ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 10, 0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
      overflow-y: auto;
    }

    .modal-overlay.is-hidden { display: none; }

    .modal-box {
      background: var(--white);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 640px;
      box-shadow: var(--shadow-modal);
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 48px);
      margin: auto;
    }

    @media (max-width: 600px) {
      .modal-overlay { padding: 0; }
      .modal-box {
        border-radius: 0;
        max-width: 100%;
        max-height: 100vh;
        height: 100vh;
      }
    }

    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .modal-kicker {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--mauve);
      margin-bottom: 4px;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 500;
      color: var(--deep);
      letter-spacing: -0.015em;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 100px;
      background: var(--blush);
      color: var(--mauve);
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .modal-close:hover { background: var(--rose-soft); color: var(--white); }

    .modal-body {
      padding: 20px 24px;
      overflow-y: auto;
      flex: 1;
    }

    .modal-footer {
      padding: 16px 24px calc(16px + var(--safe-bottom));
      border-top: 1px solid var(--border-soft);
      display: flex;
      gap: 8px;
      align-items: center;
      background: var(--blush-light);
      border-bottom-left-radius: var(--radius-lg);
      border-bottom-right-radius: var(--radius-lg);
    }

    @media (max-width: 600px) {
      .modal-footer { border-radius: 0; }
    }

    /* ============================================================ */
    /* FORM                                                         */
    /* ============================================================ */
    .form-group { margin-bottom: 18px; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
    }

    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mauve);
      margin-bottom: 6px;
    }

    .form-input,
    .form-textarea,
    .form-select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border-soft);
      background: var(--white);
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--deep);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .form-input:focus,
    .form-textarea:focus,
    .form-select:focus {
      border-color: var(--mauve);
      box-shadow: 0 0 0 3px rgba(166, 84, 106, 0.1);
    }

    .form-textarea {
      resize: vertical;
      min-height: 64px;
      font-family: inherit;
      line-height: 1.5;
    }

    .form-select {
      appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23A6546A'><path d='M7 10l5 5 5-5z'/></svg>");
      background-repeat: no-repeat;
      background-position: right 10px center;
      padding-right: 36px;
    }

    .form-hint {
      font-size: 11px;
      color: var(--gray);
      margin-top: 4px;
    }

    /* ============================================================ */
    /* IMAGE UPLOAD                                                 */
    /* ============================================================ */
    .image-upload {
      border: 1.5px dashed var(--rose-soft);
      border-radius: var(--radius-md);
      padding: 14px;
      background: var(--blush-light);
      text-align: center;
      position: relative;
    }

    .image-preview {
      width: 100%;
      max-height: 280px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      margin-bottom: 12px;
      display: none;
    }

    .image-preview.has-image { display: block; }

    .image-preview img {
      width: 100%;
      height: 100%;
      max-height: 280px;
      object-fit: contain;
      display: block;
    }

    .image-upload-btn {
      display: inline-block;
      padding: 10px 18px;
      background: var(--white);
      color: var(--mauve);
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--border-soft);
      cursor: pointer;
    }

    .image-upload-btn:hover { background: var(--blush); }

    .image-upload-actions {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .image-upload input[type=file] { display: none; }

    .image-clear {
      padding: 10px 18px;
      background: transparent;
      color: var(--red);
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--border-soft);
    }

    .image-loading {
      font-size: 12px;
      color: var(--mauve);
      margin-top: 8px;
    }

    /* ============================================================ */
    /* CHECKLIST EDITOR (no modal)                                  */
    /* ============================================================ */
    .checklist-editor {
      background: var(--blush-light);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .checklist-row {
      display: flex;
      gap: 8px;
      align-items: center;
      background: var(--white);
      padding: 8px 10px 8px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-soft);
    }

    .checklist-row-input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-size: 14px;
      color: var(--deep);
      padding: 4px 0;
    }

    .checklist-row-remove {
      width: 28px;
      height: 28px;
      border-radius: 100px;
      background: var(--blush);
      color: var(--mauve);
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .checklist-row-remove:hover { background: var(--red); color: var(--white); }

    .checklist-add {
      align-self: flex-start;
      padding: 8px 14px;
      background: var(--white);
      color: var(--mauve);
      border: 1px solid var(--border-soft);
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
    }

    .checklist-add:hover { background: var(--blush); }

    /* ============================================================ */
    /* BUTTONS                                                      */
    /* ============================================================ */
    .btn-primary {
      padding: 12px 24px;
      background: var(--deep);
      color: var(--white);
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    .btn-primary:hover { opacity: 0.92; }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-secondary {
      padding: 12px 20px;
      background: var(--white);
      color: var(--deep);
      border: 1px solid var(--border-soft);
      border-radius: 100px;
      font-size: 14px;
      font-weight: 500;
    }
    .btn-secondary:hover { background: var(--blush); }

    .btn-danger {
      padding: 12px 18px;
      background: transparent;
      color: var(--red);
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
    }
    .btn-danger:hover { background: rgba(185, 75, 90, 0.08); }

    /* ============================================================ */
    /* STATE                                                        */
    /* ============================================================ */
    .state-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
      gap: 12px;
      color: var(--mauve-text);
    }

    .state-screen-icon { font-size: 32px; margin-bottom: 8px; }
    .state-screen-title { font-size: 18px; font-weight: 500; color: var(--deep); }
    .state-screen-desc { font-size: 14px; max-width: 300px; }

    /* PROMPT 12 / D-12.1: splash inicial com identidade Celulose */
    .boot-splash {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
      gap: 18px;
      color: rgba(255, 255, 255, 0.7);
      background: #0a0a0a;
    }
    /* body + #app ganham fundo dark APENAS enquanto o boot-splash existe no DOM
       (route() substitui via app.innerHTML quando renderiza um mode). :has e
       suportado em Chrome 105+/Safari 15.4+/Firefox 121+ — todos 2022/2023. */
    body:has(#boot-state) {
      background: #0a0a0a;
    }
    body:has(#boot-state) #app {
      background: #0a0a0a;
    }
    .boot-splash-kicker {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #07d375;
      font-weight: 600;
    }
    .boot-splash-title {
      font-size: 22px;
      font-weight: 500;
      color: #FFFFFF;
      letter-spacing: -0.01em;
    }
    .boot-spinner {
      width: 28px;
      height: 28px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-top-color: #07d375;
      border-radius: 50%;
      animation: boot-spin 0.8s linear infinite;
      margin-top: 4px;
    }
    @keyframes boot-spin {
      to { transform: rotate(360deg); }
    }

    /* ============================================================ */
    /* TOAST                                                        */
    /* ============================================================ */
    .toast {
      position: fixed;
      bottom: calc(20px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--deep);
      color: var(--white);
      padding: 12px 22px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 2000;
      max-width: 90vw;
      box-shadow: var(--shadow-modal);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* PROMPT 12 / D-12.2: banner persistente de offline (Firebase desconectado) */
    .offline-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: var(--deep, #3A1E28);
      color: var(--white, #fff);
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      padding: 10px 16px;
      z-index: 1500;
      transform: translateY(-100%);
      transition: transform 0.25s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .offline-banner.is-visible {
      transform: translateY(0);
    }
    .offline-banner-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #E5B0BF;
      margin-right: 8px;
      vertical-align: middle;
      animation: offline-pulse 1.4s ease-in-out infinite;
    }
    @keyframes offline-pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* ============================================================ */
    /* S2.5* DELEGAÇÃO CLOSET — paleta Closet + shells (C1)         */
    /* Força paleta Closet quando executora-mode (Jamily entra      */
    /* sempre no universo do Closet, nunca em modo dark Celulose).  */
    /* ============================================================ */

    body.executora-mode {
      background: var(--blush-light);
      color: var(--deep);
    }
    body.executora-mode #app {
      background: var(--blush-light);
      max-width: 480px;
    }

    .executora-shell {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--blush-light);
    }

    .executora-header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: calc(var(--safe-top) + 18px) 20px 16px;
      background: var(--deep);
      color: var(--blush-light);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .executora-header-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .executora-kicker {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--rose-soft);
      opacity: 0.85;
    }
    .executora-greeting {
      font-size: 18px;
      font-weight: 400;
      letter-spacing: -0.01em;
    }
    .executora-greeting strong {
      font-weight: 600;
    }
    .executora-logout {
      flex-shrink: 0;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--blush-light);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      transition: background 0.15s ease;
    }
    .executora-logout:hover {
      background: rgba(255, 255, 255, 0.16);
    }

    .executora-main {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 24px 20px calc(96px + var(--safe-bottom));
    }

    .executora-placeholder {
      margin-top: 40px;
      padding: 32px 24px;
      background: var(--white);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      text-align: center;
      box-shadow: var(--shadow-soft);
    }
    .executora-placeholder-kicker {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mauve);
      margin-bottom: 12px;
    }
    .executora-placeholder-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--deep);
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }
    .executora-placeholder-sub {
      font-size: 14px;
      color: var(--mauve-text);
      line-height: 1.5;
    }

    .executora-bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      padding: 10px 12px calc(12px + var(--safe-bottom));
      background: var(--white);
      border-top: 1px solid var(--border-soft);
      box-shadow: 0 -4px 16px rgba(58, 30, 40, 0.06);
      z-index: 20;
    }
    .executora-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 8px 6px;
      border-radius: var(--radius-md);
      color: var(--gray);
      transition: color 0.15s ease, background 0.15s ease;
    }
    .executora-tab .executora-tab-icon {
      font-size: 22px;
      line-height: 1;
    }
    .executora-tab .executora-tab-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    .executora-tab.active {
      color: var(--mauve);
      background: var(--blush);
    }
    .executora-tab:hover:not(.active) {
      color: var(--mauve-text);
      background: rgba(166, 84, 106, 0.06);
    }

    /* ----- Sheet de delegação (POV Isabelle dentro do editor) ----- */
    .delegacao-tabs {
      display: flex;
      gap: 6px;
      padding: 12px 0 18px;
      border-bottom: 1px solid var(--border-soft);
      margin-bottom: 18px;
      overflow-x: auto;
    }
    .delegacao-tab {
      flex: 1 1 auto;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 500;
      color: var(--gray);
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      white-space: nowrap;
      transition: all 0.15s ease;
    }
    .delegacao-tab:hover:not(.active) {
      color: var(--mauve-text);
      background: rgba(166, 84, 106, 0.05);
    }
    .delegacao-tab.active {
      color: var(--mauve);
      background: var(--blush);
      border-color: var(--rose-soft);
    }
    .delegacao-body {
      min-height: 200px;
    }
    .delegacao-stub, .delegacao-empty {
      padding: 28px 20px;
      background: var(--blush-light);
      border: 1px dashed var(--rose-soft);
      border-radius: var(--radius-md);
      text-align: center;
    }
    .delegacao-stub-kicker, .delegacao-empty-title {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mauve);
      margin-bottom: 10px;
    }
    .delegacao-empty-title {
      font-size: 14px;
      letter-spacing: -0.01em;
      text-transform: none;
      color: var(--deep);
      font-weight: 600;
    }
    .delegacao-stub-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--deep);
      margin-bottom: 8px;
    }
    .delegacao-stub-sub, .delegacao-empty-sub {
      font-size: 13px;
      color: var(--mauve-text);
      line-height: 1.55;
    }
    .delegacao-stub-sub code, .delegacao-empty-sub code {
      font-family: 'SF Mono', Menlo, Consolas, monospace;
      font-size: 12px;
      padding: 2px 6px;
      background: var(--white);
      border: 1px solid var(--border-soft);
      border-radius: 6px;
      color: var(--mauve-text);
    }

    /* Padding extra no body do sheet de delegação pra footer respirar
       mesmo com teclado virtual aberto no iOS. */
    .delegacao-sheet-body {
      padding-bottom: calc(40px + var(--safe-bottom)) !important;
    }

    /* Sheet de delegação cresce mais que outros (default 80vh) pra Pedir Ajuste
       caber sem scroll mesmo com tags + comentário + botões. */
    .sheet-type-delegacao {
      max-height: 94vh !important;
    }

    /* ============================================================ */
    /* S2.5* C2 — Pauta do dia (POV Isabelle) + Histórico           */
    /* ============================================================ */

    .pauta-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .pauta-panel-header {
      padding-bottom: 4px;
    }
    .pauta-panel-kicker {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mauve);
      margin-bottom: 8px;
    }
    .pauta-panel-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--deep);
      letter-spacing: -0.02em;
    }
    .pauta-panel-meta {
      margin-top: 6px;
      font-size: 12px;
      color: var(--gray);
    }
    .pauta-panel-body {
      position: relative;
    }
    .pauta-textarea {
      width: 100%;
      min-height: 120px;
      padding: 14px 16px;
      font-family: inherit;
      font-size: 15px;
      line-height: 1.55;
      color: var(--deep);
      background: var(--blush-light);
      border: 1.5px solid var(--rose-soft);
      border-radius: var(--radius-md);
      resize: vertical;
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    .pauta-textarea:focus {
      outline: none;
      border-color: var(--mauve);
      background: var(--white);
    }
    .pauta-textarea::placeholder {
      color: var(--gray-light);
    }
    .pauta-counter {
      position: absolute;
      right: 12px;
      bottom: 8px;
      font-size: 11px;
      font-weight: 500;
      color: var(--gray);
      pointer-events: none;
      background: rgba(255, 255, 255, 0.85);
      padding: 2px 6px;
      border-radius: 6px;
    }
    .pauta-panel-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      padding-top: 4px;
    }

    .pauta-historico {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .pauta-historico-item {
      padding: 14px 16px;
      background: var(--blush-light);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      transition: opacity 0.2s ease;
      opacity: 0.55;
    }
    .pauta-historico-item.is-today {
      opacity: 1;
      background: var(--blush);
      border-color: var(--mauve);
    }
    .pauta-historico-date {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--mauve-text);
      margin-bottom: 6px;
    }
    .pauta-historico-item.is-today .pauta-historico-date {
      color: var(--mauve);
    }
    .pauta-historico-text {
      font-size: 14px;
      line-height: 1.55;
      color: var(--deep);
    }

    /* ============================================================ */
    /* S2.5* C2 — Hub Jamily (POV executora)                        */
    /* ============================================================ */

    .hub-jamily {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .hub-card {
      padding: 18px 18px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
    }
    .hub-card-kicker {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* Card pauta — destaque mauve */
    .hub-card-pauta {
      background: var(--mauve);
      color: var(--blush-light);
    }
    .hub-card-pauta .hub-card-kicker {
      color: var(--rose-soft);
    }
    .hub-card-pauta-text {
      font-size: 16px;
      line-height: 1.55;
      font-weight: 400;
      letter-spacing: -0.01em;
    }
    .hub-card-pauta.is-empty {
      background: var(--white);
      border: 1px dashed var(--rose-soft);
      color: var(--mauve-text);
    }
    .hub-card-pauta.is-empty .hub-card-kicker {
      color: var(--mauve);
    }
    .hub-card-pauta-empty {
      font-size: 14px;
      line-height: 1.55;
      color: var(--mauve-text);
    }

    /* Card próxima janela — neutro com destaque verde quando "agora" */
    .hub-card-janela {
      background: var(--white);
      border: 1px solid var(--border-soft);
    }
    .hub-card-janela .hub-card-kicker {
      color: var(--mauve);
    }
    .hub-card-janela-text {
      font-size: 16px;
      font-weight: 500;
      color: var(--deep);
      letter-spacing: -0.01em;
    }
    .hub-card-janela.is-agora {
      background: var(--blush);
      border-color: var(--mauve);
    }
    .hub-card-janela.is-agora .hub-card-janela-text {
      color: var(--mauve-text);
      font-weight: 600;
    }
    .hub-card-janela.is-amanha {
      opacity: 0.85;
    }

    /* Stats compactos */
    .hub-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 4px 0;
    }
    .hub-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 14px 8px;
      background: var(--white);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
    }
    .hub-stat-num {
      font-size: 24px;
      font-weight: 600;
      color: var(--mauve);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .hub-stat-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--mauve-text);
      letter-spacing: 0.04em;
      text-align: center;
      line-height: 1.3;
    }

    /* Bloco aprovados pra postar */
    .hub-section {
      margin-top: 8px;
    }
    .hub-section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mauve);
      margin-bottom: 12px;
      padding: 0 4px;
    }
    .hub-aprovados {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .hub-aprovado-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--white);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      transition: border-color 0.15s ease;
    }
    .hub-aprovado-item:hover {
      border-color: var(--rose-soft);
    }
    .hub-aprovado-info {
      flex: 1 1 auto;
      min-width: 0;
    }
    .hub-aprovado-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--deep);
      letter-spacing: -0.01em;
      line-height: 1.35;
      margin-bottom: 4px;
      word-break: break-word;
    }
    .hub-aprovado-meta {
      display: flex;
      gap: 6px;
      font-size: 11px;
      color: var(--gray);
      letter-spacing: 0.02em;
    }
    .hub-postei-btn {
      flex-shrink: 0;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--mauve);
      background: var(--blush);
      border: 1px solid var(--rose-soft);
      border-radius: 999px;
      transition: all 0.15s ease;
    }
    .hub-postei-btn:hover {
      background: var(--mauve);
      color: var(--blush-light);
      border-color: var(--mauve);
    }
    .hub-postei-btn:active {
      transform: scale(0.96);
    }

    .hub-empty {
      padding: 24px 18px;
      background: var(--blush-light);
      border: 1px dashed var(--rose-soft);
      border-radius: var(--radius-md);
      text-align: center;
      font-size: 13px;
      color: var(--mauve-text);
      line-height: 1.5;
    }

    /* ============================================================ */
    /* Fase 3 — Banner "o que você perdeu" (Isabelle + Jamily) */
    /* ============================================================ */

    .delta-banner {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 12px 14px;
      background: var(--blush-light);
      border: 1px solid var(--rose-soft);
      border-left: 4px solid var(--mauve);
      border-radius: var(--radius-md);
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(122, 76, 96, 0.06);
    }
    .delta-banner-icon {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--blush-light);
      background: var(--mauve);
      border-radius: 999px;
      font-weight: 600;
    }
    .delta-banner-body {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .delta-banner-kicker {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mauve);
    }
    .delta-banner-items {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .delta-banner-item {
      font-size: 13px;
      color: var(--deep);
      line-height: 1.4;
      letter-spacing: -0.005em;
    }
    .delta-banner-dismiss {
      flex-shrink: 0;
      appearance: none;
      -webkit-appearance: none;
      font-family: inherit;
      cursor: pointer;
      padding: 7px 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--mauve);
      background: var(--white);
      border: 1px solid var(--rose-soft);
      border-radius: 999px;
      transition: all 0.15s ease;
    }
    .delta-banner-dismiss:hover {
      background: var(--mauve);
      color: var(--blush-light);
      border-color: var(--mauve);
    }

    /* Versão compacta dentro do shell Jamily (mobile 480px) */
    .executora-shell .delta-banner {
      margin: 12px 16px 0;
      padding: 10px 12px;
      gap: 10px;
    }
    .executora-shell .delta-banner-icon {
      width: 24px;
      height: 24px;
      font-size: 12px;
    }
    .executora-shell .delta-banner-item {
      font-size: 12px;
    }
    .executora-shell .delta-banner-dismiss {
      padding: 6px 10px;
      font-size: 10px;
    }

    /* ----- Toast de pedir permissão de notificação ----- */
    .notif-perm-toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 400px;
      background: var(--white);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      box-shadow: 0 12px 32px rgba(38, 28, 30, 0.16);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 9050;
      animation: notifToastSlideUp 0.25s ease;
    }
    @keyframes notifToastSlideUp {
      from { opacity: 0; transform: translate(-50%, 20px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }
    .notif-perm-toast-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--deep);
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }
    .notif-perm-toast-sub {
      font-size: 12px;
      color: var(--mauve-text);
      line-height: 1.4;
    }
    .notif-perm-toast-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .notif-perm-toast-btn {
      appearance: none;
      -webkit-appearance: none;
      font-family: inherit;
      cursor: pointer;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      border-radius: 999px;
      transition: all 0.15s ease;
    }
    .notif-perm-toast-btn-no {
      color: var(--gray);
      background: transparent;
      border: 1px solid var(--border-soft);
    }
    .notif-perm-toast-btn-no:hover {
      color: var(--deep);
      border-color: var(--deep);
    }
    .notif-perm-toast-btn-yes {
      color: var(--blush-light);
      background: var(--mauve);
      border: 1px solid var(--mauve);
    }
    .notif-perm-toast-btn-yes:hover {
      background: var(--deep);
      border-color: var(--deep);
    }

    /* ----- Overlay "bem-vinda de volta" (Jamily, segunda/terça) ----- */
    .welcome-back-overlay {
      position: fixed;
      inset: 0;
      background: rgba(38, 28, 30, 0.85);
      z-index: 9200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: welcomeFadeIn 0.3s ease;
    }
    @keyframes welcomeFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .welcome-back-modal {
      background: var(--white);
      border-radius: var(--radius-lg);
      max-width: 380px;
      width: 100%;
      padding: 32px 28px 24px;
      text-align: center;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.32);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .welcome-back-icon {
      font-size: 52px;
      line-height: 1;
      margin-bottom: 4px;
    }
    .welcome-back-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--deep);
      letter-spacing: -0.02em;
      line-height: 1.25;
    }
    .welcome-back-sub {
      font-size: 13px;
      color: var(--mauve-text);
      line-height: 1.5;
    }
    .welcome-back-list {
      list-style: none;
      padding: 0;
      margin: 8px 0 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-align: left;
    }
    .welcome-back-list li {
      font-size: 13px;
      color: var(--deep);
      padding: 10px 14px;
      background: var(--blush-light);
      border-left: 3px solid var(--mauve);
      border-radius: 4px;
      line-height: 1.4;
    }
    .welcome-back-empty {
      font-size: 13px;
      color: var(--mauve-text);
      font-style: italic;
      padding: 12px;
      background: var(--blush-light);
      border-radius: var(--radius-sm);
    }
    .welcome-back-btn {
      appearance: none;
      -webkit-appearance: none;
      font-family: inherit;
      cursor: pointer;
      margin-top: 12px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--blush-light);
      background: var(--mauve);
      border: none;
      border-radius: var(--radius-md);
      transition: all 0.15s ease;
    }
    .welcome-back-btn:hover {
      background: var(--deep);
    }
    .welcome-back-btn:active {
      transform: scale(0.97);
    }

    /* ============================================================ */
    /* S2.5* C4.1 — Refazer ajustes (banner Hub + lista + form header) */
    /* ============================================================ */

    /* Banner no Hub Jamily — destaca cards pra refazer. Mauve forte. */
    .hub-refazer-banner {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 16px 18px;
      background: var(--mauve);
      color: var(--blush-light);
      border: none;
      border-radius: var(--radius-md);
      text-align: left;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.15s ease;
      box-shadow: 0 4px 14px rgba(122, 76, 96, 0.18);
    }
    .hub-refazer-banner:hover {
      background: var(--deep);
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(38, 28, 30, 0.22);
    }
    .hub-refazer-banner:active {
      transform: translateY(0);
    }
    .hub-refazer-banner-icon {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: var(--blush-light);
      color: var(--mauve);
      border-radius: 999px;
      font-weight: 600;
    }
    .hub-refazer-banner-text {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .hub-refazer-banner-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.3;
    }

    // Pequeno debounce (800ms) evita flash em flicker de rede.
    if (db) {

      db.ref('.info/connected').on('value', snap => {
        const connected = snap.val() === true;

        if (connected) {
          if (offlineBannerTimer) { clearTimeout(offlineBannerTimer); offlineBannerTimer = null; }

          // Mostra o banner só se ficar offline por mais de 800ms — evita flash em hiccup.
          if (offlineBannerTimer) clearTimeout(offlineBannerTimer);

    //
    // Área 13 (PROMPT 11): se URL chega vazia mas tem cache de auth, reescreve
    // a query string via history.replaceState antes de chamar route(). Equipe
    // entra direto sem precisar do link toda vez. Cache stale (PIN rotacionou)
    // é auto-limpo pelos gates de erro — próximo boot cai em entry gate.
    function bootstrap() {
      if (!firebaseReady) { renderError('Firebase não carregou.'); return; }

      const params = getQueryParams();
      const urlVazia = !params.cliente && !params.master;
      if (urlVazia) {
        const cached = loadAuthLocal();
        if (cached) {
          const qs = authLocalToQueryString(cached);
          if (qs) {
            window.history.replaceState({}, '', '?' + qs);
          }
        }
      }

      route().catch(e => {

    // Listener real-time do cliente carregado. Substitui o `attachListener` antigo
    // que escutava /notas-de-inverno-app inteiro.
    function attachClientListener() {
      if (!clientRef) return;
      clientRef.on('value', snap => {
        const data = snap.val();
        if (!data) { renderError('Cliente sumiu do Firebase.'); return; }
        // S2.5* / v1.5.1: aplica defaults nos cards na borda (origin/postedAt/
        // isReference/createdByRole/lastAdjustmentId). Cards antigos do Closet
        // (~28 em produção) sem esses campos continuam válidos. Idempotente:
        // re-aplicar sobre cards já com os campos preserva os valores.
        if (data && data.cards) {
          data.cards = applyV151DefaultsBulk(data.cards);
        }
        // Fase 3 commit 2: diff-aware notifs locais — compara snapshot anterior
        // com novo, dispara showLocalNotif pra deltas relevantes (Caminho 2).
        try {
          detectAndNotifyDeltas(lastClientDataSnap, data);
        } catch (e) {
          console.warn('[diff-notif] erro:', e);
        }
        lastClientDataSnap = data;

        state.clientData = data;
        // legado: mantém state.data espelhado pra código antigo não crashar até ele migrar
        state.data = data;
        // Trilha C / Gap 5: trancar re-render também enquanto modal de bloco
        // (criar OU editar) estiver aberto. Antes, openBlockModal usava o hack
        // `modalState.open = true` pra reaproveitar a guarda do card modal —
        // funcionava mas era frágil. Agora cada modal tem sua própria guarda.
        if (modalState.open) return;
        if (sheetState.open) return;
        if (blockModalState && blockModalState.open) return;
        if (blockCreateState && blockCreateState.open) return;
        renderForCurrentMode();
      });

    // Re-render baseado no modo atual. Usado pelo listener pra reagir a mudanças.
    // Helper — renderiza saudacao com substituicao do placeholder {nome}.
    // Se saudacao contem {nome}, troca pelo persona.name em <strong>; senao
    // mostra saudacao literal (sem strong). Permite saudacao tipo "Olá, {nome}"
    // (dinamica por persona) OU "Bem-vindo de volta, Boss" (literal sem nome).
    // Default quando saudacao vazia: usa greetingByHour() + ", {nome}".
    function renderGreetingHtml(saudacao, personaName) {
      const sd = (typeof saudacao === 'string' && saudacao.length)
        ? saudacao
        : (greetingByHour() + ', {nome}');
      const safeName = escapeHtml(personaName || '');
      if (sd.indexOf('{nome}') >= 0) {
        const parts = sd.split('{nome}');
        return escapeHtml(parts[0]) + '<strong>' + safeName + '</strong>' + (parts.length > 1 ? escapeHtml(parts.slice(1).join('{nome}')) : '');
      }
      return escapeHtml(sd);
    }

    // Reaplica branding no final pra que [data-brand-logo] / [data-brand-greeting]

    function renderForCurrentMode() {
      // Área 10: detach do listener de comments quando NÃO vamos voltar pro card view.

      // (home, editor, master) não devem manter o listener vazado.

      else if (state.mode === 'executora') {

      if (state.clientData && state.clientData.branding) applyBranding(state.clientData.branding);
