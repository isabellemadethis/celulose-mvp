<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Sinapse">
  <meta name="theme-color" content="#FDF0F5">
  <title>Sinapse</title>

  <!-- Favicon Sinapse — PNG transparente com hexágono verde da Celulose Plastic Noise.
       2026-05-19: substituiu o SVG inline ("C" verde) pelo PNG da logo oficial.
       É trocado dinamicamente via setFavicon() quando carrega um cliente
       (passa a usar branding.logoUrl) e voltado pro padrão Sinapse ao
       abrir master / entry gate / master pin gate. -->
  <link rel="icon" type="image/png" id="favicon-link" href="icon-192.png" />

  <!-- N-B PWA: manifest + apple-touch-icon (precondição pra Service Worker + Push). -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-notif.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

  <style>
    /* ============================================================ */
    /* PALETA IDV — Closet da Rafa                                  */
    /* ============================================================ */
    :root {
      --blush: #FDF0F5;
      --blush-light: #FFF7FA;
      --rose: #D3889C;
      --rose-soft: #E5B0BF;
      --mauve: #A6546A;
      --mauve-text: #6B3848;
      --deep: #3A1E28;
      --border-soft: #F0DCE3;
      --white: #FFFFFF;
      --gray: #8A8A8A;
      --gray-light: #C4C4C4;
      --green: #4A7A52; /* Verde oliva original. Tentamos Celulose #07d375 em A.3 mas espalhou pra muitos lugares (banner, progress, borda, pílula "VOCÊ EXECUTA") e ficou berrante. Revertido em A.4 — verde Celulose vai aparecer SÓ em pontos específicos. */
      --celulose-green: #07d375; /* Verde signature Celulose. Aplicado APENAS em pontos de "chamada pra aprovar" no hero (hint, pulse, coração da animação) e no master dark. */
      --red: #dc2626;
      --shadow-soft: 0 1px 3px rgba(58, 30, 40, 0.04), 0 4px 16px rgba(58, 30, 40, 0.04);
      --shadow-card: 0 2px 8px rgba(58, 30, 40, 0.06), 0 8px 32px rgba(58, 30, 40, 0.05);
      --shadow-modal: 0 16px 48px rgba(58, 30, 40, 0.18), 0 4px 16px rgba(58, 30, 40, 0.12);
      --radius-sm: 12px;
      --radius-md: 18px;
      --radius-lg: 24px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* ============================================================ */
    /* RESET                                                        */
    /* ============================================================ */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Geist', 'Inter', sans-serif;
      background: var(--blush-light);
      color: var(--deep);
      font-size: 16px;
      line-height: 1.5;
      letter-spacing: -0.01em;
    }

    body.modal-open { overflow: hidden; }

    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    input, textarea, select { font-family: inherit; }

    /* ============================================================ */
    /* LAYOUT BASE                                                  */
    /* ============================================================ */
    #app {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
      background: var(--blush-light);
      position: relative;
    }

    @media (min-width: 768px) {
      #app.editor-view { max-width: 1400px; }
      body.editor-mode { background: var(--blush); }
    }

    /* ============================================================ */
    /* WELCOME / USER PICKER                                        */
    /* ============================================================ */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: calc(var(--safe-top) + 24px) 32px calc(var(--safe-bottom) + 24px);
      text-align: center;
      gap: 32px;
    }

    .welcome-logo {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mauve);
    }

    /* PROMPT 12 / D-12.3: fallback quando logoUrl quebra — círculo com inicial */
    .welcome-logo.is-logo-fallback {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--mauve);
      color: var(--white);
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: none;
      background-image: none !important;
    }

    .welcome-title {
      font-size: 36px;
      font-weight: 300;
      line-height: 1.1;
      color: var(--deep);
      letter-spacing: -0.03em;
    }

    .welcome-tagline {
      font-size: 15px;
      color: var(--mauve-text);
      font-style: italic;
      max-width: 280px;
    }

    .welcome-cta {
      background: var(--deep);
      color: var(--white);
      padding: 18px 40px;
      border-radius: 100px;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .welcome-cta:active { transform: scale(0.97); opacity: 0.9; }

    /* ============================================================ */
    /* HOME                                                         */
    /* ============================================================ */
    .home-header {
      padding: calc(var(--safe-top) + 28px) 24px 16px;
      background: var(--blush-light);
    }

    .home-kicker {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--mauve);
      margin-bottom: 8px;
    }

    .home-greeting {
      font-size: 32px;
      font-weight: 400;
      line-height: 1.15;
      color: var(--deep);
      letter-spacing: -0.025em;
      margin-bottom: 6px;
    }

    .home-greeting strong { font-weight: 600; }

    .home-pendentes {
      font-size: 14px;
      color: var(--mauve-text);
      font-weight: 400;
    }

    .day-switcher {
      padding: 12px 24px 8px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .day-switcher::-webkit-scrollbar { display: none; }

    .day-tab {
      flex-shrink: 0;
      padding: 10px 16px;
      border-radius: 100px;
      background: var(--white);
      color: var(--mauve-text);
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--border-soft);
      transition: all 0.15s ease;
    }

    .day-tab.active {
      background: var(--deep);
      color: var(--white);
      border-color: var(--deep);
    }

    .day-tab-date {
      display: block;
      font-size: 11px;
      opacity: 0.7;
      margin-top: 2px;
    }

    /* ============================================================ */
    /* BLOCKS (home)                                                */
    /* ============================================================ */
    .blocks-list {
      padding: 16px 16px 110px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
    }

    .block-section {
      background: var(--white);
      border-radius: var(--radius-md);
      padding: 16px 18px 18px;
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border-soft);
      scroll-margin-top: 16px;
    }

    .block-section.is-meal,
    .block-section.is-pause {
      background: var(--blush);
      border-style: dashed;
      border-color: var(--rose-soft);
      padding-bottom: 14px;
    }

    .block-section.is-active {
      border-color: var(--mauve);
      border-width: 2px;
      box-shadow: var(--shadow-card);
    }

    .block-row-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 4px;
    }

    .block-time {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--mauve);
      text-transform: uppercase;
    }

    .block-territory {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray);
      padding: 4px 10px;
      background: var(--blush);
      border-radius: 100px;
    }

    .block-section.is-meal .block-territory,
    .block-section.is-pause .block-territory {
      background: var(--white);
    }

    .block-title {
      font-size: 18px;
      font-weight: 500;
      color: var(--deep);
      letter-spacing: -0.015em;
      margin-bottom: 12px;
    }

    .block-progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .block-progress-bar {
      flex: 1;
      height: 4px;
      background: var(--blush);
      border-radius: 100px;
      overflow: hidden;
    }

    .block-progress-fill {
      height: 100%;
      background: var(--mauve);
      border-radius: 100px;
      transition: width 0.3s ease;
    }

    .block-progress-fill.is-complete { background: var(--green); }

    .block-count {
      font-size: 12px;
      font-weight: 500;
      color: var(--mauve-text);
      font-variant-numeric: tabular-nums;
    }

    .block-empty-hint {
      font-size: 12px;
      color: var(--gray);
      font-style: italic;
      text-align: center;
      padding: 4px 0 0;
    }

    .card-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .home-card {
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--blush-light);
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.12s ease;
    }

    .home-card:active { transform: scale(0.99); background: var(--blush); }
    .home-card.is-completed {
      opacity: 0.55;
      background: var(--white);
    }
    .home-card.is-completed .home-card-title {
      text-decoration: line-through;
    }

    .home-card-prio {
      width: 8px;
      height: 8px;
      border-radius: 100px;
      flex-shrink: 0;
    }
    .home-card-prio.is-alta { background: var(--red); }
    .home-card-prio.is-media { background: var(--mauve); }
    .home-card-prio.is-baixa { background: var(--gray-light); }

    .home-card-body {
      flex: 1;
      min-width: 0;
    }

    .home-card-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }

    .home-card-pill {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 100px;
      background: var(--white);
      color: var(--mauve);
      border: 1px solid var(--border-soft);
    }

    /* PARTE 3 — Visão 360 */
    .home-card-persona-chip {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 2px 8px;
      border-radius: 100px;
      color: #fff;
      white-space: nowrap;
    }

    /* Área 9 — Pílula de papel da persona logada (Você executa / Bruna executa / Isa produz) */
    .card-role-pill {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
      white-space: nowrap;
      color: #fff;
    }
    .card-role-pill.is-mine {
      /* A.4: era var(--green) (ficou verde Celulose berrante após --green global).
         Agora usa --mauve (mesma cor da pílula "MÉDIA") pra peso de prioridade
         integrado à paleta do cliente. */
      background: var(--mauve);
      color: #fff;
    }
    .card-role-pill.is-other {
      color: #fff;
      /* background vem inline via style="background: var(--persona-{id})" */
    }
    .card-role-pill.is-closet {
      background: transparent;
      color: var(--mauve-text);
      border: 1px dashed var(--border-soft);
      letter-spacing: 0.08em;
    }

    /* Versão DESTAQUE pra tela expandida (acima do título do card) */
    .card-role-row {
      margin: 14px 0 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-role-row .card-role-pill {
      font-size: 12px;
      letter-spacing: 0.08em;
      padding: 6px 14px;
      font-weight: 600;
    }
    .card-role-row .card-role-pill.is-mine {
      /* A.4: removido box-shadow verde — pílula é mauve agora, sombras verdes não fazem sentido. */
    }

    .persona-filters {
      display: flex;
      gap: 8px;
      padding: 8px 24px 12px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .persona-filters::-webkit-scrollbar { display: none; }

    .persona-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 100px;
      background: var(--white);
      border: 1px solid var(--border-soft);
      font-size: 12px;
      font-weight: 500;
      color: var(--deep);
      cursor: pointer;
      transition: opacity 0.15s ease, transform 0.1s ease;
      flex-shrink: 0;
      font-family: inherit;
    }
    .persona-chip:active { transform: scale(0.97); }
    .persona-chip.is-hidden { opacity: 0.4; }
    .persona-chip-dot {
      width: 8px;
      height: 8px;
      border-radius: 100px;
      background: var(--chip-color, var(--gray));
      flex-shrink: 0;
    }
    .persona-chip-name { line-height: 1; }

    .home-card-time {
      font-size: 11px;
      color: var(--gray);
      font-variant-numeric: tabular-nums;
    }

    .home-card-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--deep);
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .home-card-check {
      width: 22px;
      height: 22px;
      border-radius: 100px;
      border: 1.5px solid var(--border-soft);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-size: 12px;
      transition: background 0.15s ease, border 0.15s ease;
    }

    .home-card.is-completed .home-card-check {
      background: var(--green);
      border-color: var(--green);
    }

    /* Área 9: ícone de estado no canto direito do home-card */
    .home-card-state-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      line-height: 1;
    }
    .home-card-state-icon.is-published { background: var(--green); color: var(--white); }
    .home-card-state-icon.is-approved { background: #DDE9D5; color: #4A6B36; }
    .home-card-state-icon.is-changes { background: #F4D9B0; color: #8B5A1A; }
    .home-card-state-icon.is-progress { background: #E8E0D2; color: var(--mauve-text); }
    .home-card-state-icon.is-pending { background: var(--blush-mid); color: var(--mauve-text); }
    .home-card-state-icon.is-draft { background: transparent; color: var(--mauve); border: 1px dashed var(--border-soft); }

    /* Pílula "aprovado por você" / "você pediu ajuste" inline na meta */
    .home-card-myvote {
      font-size: 10px;
      letter-spacing: 0.04em;
      text-transform: lowercase;
      padding: 2px 8px;
      border-radius: 100px;
      font-weight: 500;
    }
    .home-card-myvote.is-approved { background: #DDE9D5; color: #4A6B36; }
    .home-card-myvote.is-changes { background: #F4D9B0; color: #8B5A1A; }

    /* Variantes sutis no card inteiro por estado efetivo */
    .home-card.is-state-requested_changes { border-left: 3px solid #C68E4D; }
    .home-card.is-state-approved { border-left: 3px solid var(--green); }
    .home-card.is-state-draft .home-card-title { color: var(--mauve-text); }

    /* Área 14 Tipo 2 — badge mauve de votos não-vistos pro dono do card.
       Mesmo pattern visual do editor-mini-comment-badge (M2 da Área 14 F2):
       canto sup direito absoluto, mauve, count pequeno, sem interceptar clique.
       Quando badge presente, .has-unread-votes aumenta padding-right do card
       pra empurrar o .home-card-check (state-icon) ligeiramente pra esquerda
       e evitar colisão visual com a bolinha do canto. */
    .home-card-vote-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 100px;
      background: var(--mauve);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      line-height: 1;
      z-index: 1;
    }
    .home-card.has-unread-votes { padding-right: 30px; }

    /* ============================================================ */
    /* CARD VIEW (tela expandida)                                   */
    /* ============================================================ */
    .card-view {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--blush-light);
      animation: slideInRight 0.25s ease;
    }

    @keyframes slideInRight {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .card-view-header {
      position: sticky;
      top: 0;
      z-index: 30;
      background: var(--blush-light);
      padding: calc(var(--safe-top) + 14px) 16px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border-soft);
    }

    .card-back {
      width: 38px;
      height: 38px;
      border-radius: 100px;
      background: var(--white);
      color: var(--deep);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      border: 1px solid var(--border-soft);
      flex-shrink: 0;
      transition: background 0.12s ease;
    }

    .card-back:active { background: var(--blush); }

    .card-view-title-row {
      flex: 1;
      min-width: 0;
    }

    .card-view-block {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mauve);
      margin-bottom: 2px;
    }

    .card-view-greeting {
      font-size: 13px;
      color: var(--mauve-text);
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-view-body {
      flex: 1;
      padding: 16px 16px 120px;
    }

    .card-hero {
      position: relative;
      width: 100%;
      aspect-ratio: 4/5;
      max-height: 70vh;
      background: var(--blush);
      border-radius: var(--radius-md);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s ease;
      margin-bottom: 16px;
    }

    .card-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .card-hero.is-armed {
      /* A.4.3: pulse usa cor da paleta (--mauve via color-mix pra acomodar opacidade).
         Verde Celulose (A.4.2) destacava demais sobre paletas marrom/rosa do cliente.
         Mauve mantém coerência com pílula "VOCÊ EXECUTA" e "MÉDIA". */
      box-shadow: 0 0 0 0 color-mix(in srgb, var(--mauve) 40%, transparent);
      animation: pulseArmed 1.6s ease-out infinite;
    }

    @keyframes pulseArmed {
      0%   { box-shadow: 0 0 0 0 color-mix(in srgb, var(--mauve) 45%, transparent); }
      80%  { box-shadow: 0 0 0 14px color-mix(in srgb, var(--mauve) 0%, transparent); }
      100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--mauve) 0%, transparent); }
    }

    .card-hero.is-shaking {
      animation: shake 0.4s cubic-bezier(.36,.07,.19,.97);
    }

    @keyframes shake {
      10%, 90% { transform: translateX(-2px); }
      20%, 80% { transform: translateX(3px); }
      30%, 50%, 70% { transform: translateX(-5px); }
      40%, 60% { transform: translateX(5px); }
    }

    .card-hero-empty {
      color: var(--mauve);
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
      padding: 24px;
    }

    .card-hero-overlay-hint {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 100px;
      font-size: 12px;
      color: var(--mauve-text);
      text-align: center;
      pointer-events: none;
    }

    .card-hero.is-armed .card-hero-overlay-hint {
      /* A.4.3: hint usa cor mauve da paleta cliente (color-mix pra 92% opacidade). */
      background: color-mix(in srgb, var(--mauve) 92%, transparent);
      color: var(--white);
    }

    .card-heart {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      pointer-events: none;
      font-size: 120px;
      line-height: 1;
      /* A.4.3: animação de aprovar — mauve da paleta cliente (coerente com hero). */
      color: var(--mauve);
      filter: drop-shadow(0 4px 16px color-mix(in srgb, var(--mauve) 40%, transparent));
    }

    .card-heart.fire {
      animation: heartPop 0.9s cubic-bezier(.4, 1.4, .6, 1) forwards;
    }

    @keyframes heartPop {
      0%   { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      30%  { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
      60%  { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.4); opacity: 0; }
    }

    /* Área 9 fix: coração FLOATING fullscreen — sempre visível, independe de scroll */
    .fly-heart {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 200px;
      line-height: 1;
      /* A.4.3: animação de aprovar — mauve da paleta cliente (coerente com hero). */
      color: var(--mauve);
      z-index: 9999;
      pointer-events: none;
      filter: drop-shadow(0 8px 28px color-mix(in srgb, var(--mauve) 50%, transparent));
      animation: flyHeartPop 1.1s cubic-bezier(0.2, 0.8, 0.4, 1) forwards;
    }
    @keyframes flyHeartPop {
      0%   { transform: translate(-50%, -50%) scale(0) rotate(-12deg); opacity: 0; }
      18%  { transform: translate(-50%, -50%) scale(1.3) rotate(8deg);  opacity: 1; }
      55%  { transform: translate(-50%, -55%) scale(1.05) rotate(0deg); opacity: 1; }
      100% { transform: translate(-50%, -130%) scale(0.65) rotate(-4deg); opacity: 0; }
    }

    .card-fullscreen {
      position: fixed;
      inset: 0;
      background: rgba(58, 30, 40, 0.96);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .card-fullscreen img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .card-fullscreen-close {
      position: absolute;
      top: calc(var(--safe-top) + 16px);
      right: 16px;
      width: 40px;
      height: 40px;
      border-radius: 100px;
      background: rgba(255,255,255,0.15);
      color: var(--white);
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
    }

    .card-meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .card-meta-pill {
      padding: 4px 10px;
      border-radius: 100px;
      background: var(--white);
      color: var(--mauve);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid var(--border-soft);
    }

    .card-meta-pill.is-prio-alta { background: var(--red); color: var(--white); border-color: var(--red); }
    .card-meta-pill.is-prio-media { background: var(--mauve); color: var(--white); border-color: var(--mauve); }
    .card-meta-pill.is-prio-baixa { background: var(--gray-light); color: var(--white); border-color: var(--gray-light); }

    .card-title-big {
      font-size: 24px;
      font-weight: 500;
      color: var(--deep);
      letter-spacing: -0.025em;
      margin-bottom: 24px;
      line-height: 1.2;
    }

    .card-section {
      margin-bottom: 20px;
    }

    .card-section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--mauve);
      margin-bottom: 6px;
    }

    .card-section-text {
      font-size: 15px;
      color: var(--deep);
      line-height: 1.5;
    }

    .card-section-text.is-italic {
      font-style: italic;
      color: var(--mauve-text);
    }

    .card-anchor {
      background: var(--blush);
      border-left: 3px solid var(--mauve);
      padding: 14px 16px;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      margin: 0 0 20px;
      font-style: italic;
      color: var(--deep);
      font-size: 15px;
      line-height: 1.4;
    }

    .card-anchor::before {
      content: "Frase-âncora";
      display: block;
      font-style: normal;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--mauve);
      margin-bottom: 6px;
    }

    /* CHECKLIST viewer */
    .check-list-viewer {
      background: var(--white);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      padding: 16px;
      margin-top: 8px;
    }

    .check-list-viewer-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mauve);
      margin-bottom: 12px;
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 4px;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.12s ease;
    }

    .check-row:hover { background: var(--blush-light); }

    .check-box {
      width: 22px;
      height: 22px;
      border-radius: 100px;
      border: 1.5px solid var(--border-soft);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-size: 12px;
      transition: all 0.15s ease;
    }

    .check-row.is-checked .check-box {
      background: var(--mauve);
      border-color: var(--mauve);
    }

    .check-row.is-checked .check-text {
      color: var(--gray);
    }

    .check-text {
      flex: 1;
      font-size: 14px;
      color: var(--deep);
      line-height: 1.4;
    }

    .check-progress {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border-soft);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .check-progress-bar {
      flex: 1;
      height: 4px;
      background: var(--blush);
      border-radius: 100px;
      overflow: hidden;
    }

    .check-progress-fill {
      height: 100%;
      background: var(--mauve);
      border-radius: 100px;
      transition: width 0.3s ease;
    }

    .check-progress-fill.is-complete { background: var(--green); }

    .check-progress-text {
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--mauve-text);
      font-variant-numeric: tabular-nums;
    }

    .card-completed-banner {
      margin-top: 16px;
      padding: 14px 18px;
      background: var(--green);
      color: var(--white);
      border-radius: var(--radius-sm);
      text-align: center;
      font-size: 14px;
      font-weight: 500;
    }

    .card-undo {
      margin-top: 12px;
      text-align: center;
    }

    .card-undo button {
      font-size: 12px;
      color: var(--mauve);
      text-decoration: underline;
      padding: 6px 12px;
    }

    /* ============================================================ */
    /* APPROVAL BLOCK (Área 9)                                       */
    /* ============================================================ */
    .card-approval-block {
      margin: 16px 0 4px;
      padding: 16px 14px;
      border-radius: var(--radius-md);
      background: var(--white);
      border: 1px solid var(--border-soft);
      /* PROMPT 12 / item 8: transição suave entre estados de aprovação */
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    .card-approval-block.is-vote { background: var(--blush-mid); border-color: transparent; }
    .card-approval-block.is-approved { background: #EAF1E2; border-color: #CFE0BF; }
    .card-approval-block.is-changes { background: #F8E9CD; border-color: #E9CFA1; }
    .card-approval-block.is-published { background: var(--green); border-color: var(--green); }
    .card-approval-block.is-published .card-approval-banner { color: var(--white); }
    .card-approval-block.is-draft { background: transparent; border-style: dashed; }

    .card-approval-question {
      font-size: 13px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--mauve-text);
      margin-bottom: 12px;
      text-align: center;
      font-weight: 500;
    }
    .card-approval-buttons {
      display: flex;
      gap: 10px;
    }
    .card-approve-btn,
    .card-request-btn {
      flex: 1;
      padding: 14px 12px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
      border: none;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    .card-approve-btn {
      background: var(--green);
      color: var(--white);
    }
    .card-approve-btn:active { transform: scale(0.97); }
    .card-request-btn {
      background: #C68E4D;
      color: var(--white);
    }
    .card-request-btn:active { transform: scale(0.97); }

    /* A.4.1: variant enxuta — texto + botão em linha, sem uppercase, fundo --white
       (consistente em qualquer paleta cliente). Usada agora que só "Pedir ajuste"
       sobra no bloco (Aprovar virou gesto double-tap no hero). */
    .card-approval-block.is-vote-soft {
      background: var(--white);
      border: 1px solid var(--border-soft);
      padding: 18px 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .card-approval-question-soft {
      font-size: 13px;
      color: var(--mauve-text);
      font-weight: 500;
      /* sem text-transform: uppercase, sem letter-spacing forçado */
    }
    .card-request-btn-soft {
      background: var(--mauve);
      color: var(--white);
      border: none;
      padding: 11px 28px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
      font-family: inherit;
    }
    .card-request-btn-soft:active { transform: scale(0.97); }
    .card-request-btn-soft:hover { opacity: 0.92; }

    .card-approval-banner {
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 0;
    }
    .card-approval-block.is-approved .card-approval-banner { color: #4A6B36; }
    .card-approval-block.is-changes .card-approval-banner { color: #8B5A1A; }
    .card-switch-vote-btn {
      display: block;
      margin: 10px auto 0;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--mauve-text);
      background: transparent;
      border: none;
      text-decoration: underline;
      cursor: pointer;
      padding: 4px 8px;
    }
    .card-approval-hint {
      font-size: 12px;
      line-height: 1.5;
      color: var(--mauve-text);
      text-align: center;
    }

    /* hero variants por estado efetivo */
    .card-hero.is-state-approved { box-shadow: 0 0 0 2px #CFE0BF inset; }
    .card-hero.is-state-requested_changes { box-shadow: 0 0 0 2px #E9CFA1 inset; }
    .card-hero.is-state-published { box-shadow: 0 0 0 2px var(--green) inset; }

    /* textarea no sheet de pedir ajuste */
    .insight-textarea {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
      line-height: 1.4;
      resize: vertical;
      background: var(--white);
      color: var(--deep);
    }
    .insight-textarea:focus { outline: none; border-color: var(--mauve); }

    /* Área 9: bloco "Aprovações por persona" (compartilhado viewer + modal editor) */
    .card-approvals-block {
      margin: 16px 0;
      padding: 14px;
      background: var(--white);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
    }
    .card-approvals-title {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--mauve-text);
      margin-bottom: 12px;
      font-weight: 500;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }
    .card-approvals-count {
      font-size: 10px;
      letter-spacing: 0.04em;
      text-transform: none;
      color: var(--mauve);
      font-variant-numeric: tabular-nums;
    }
    .card-approvals-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .approval-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      background: var(--blush-mid);
      transition: opacity 0.15s ease;
    }
    .approval-row.is-pending {
      background: transparent;
      border: 1px dashed var(--border-soft);
      opacity: 0.6;
    }
    .approval-row.is-approved {
      background: #EAF1E2;
      border-color: #CFE0BF;
    }
    .approval-row.is-requested_changes {
      background: #F8E9CD;
      border-color: #E9CFA1;
    }
    .approval-avatar {
      width: 28px;
      height: 28px;
      border-radius: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-size: 12px;
      font-weight: 500;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0;
    }
    .approval-text {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .approval-name {
      font-size: 13px;
      color: var(--deep);
      font-weight: 500;
    }
    .approval-state {
      font-size: 11px;
      color: var(--mauve-text);
      letter-spacing: 0.02em;
    }
    .approval-row.is-approved .approval-state { color: #4A6B36; }
    .approval-row.is-requested_changes .approval-state { color: #8B5A1A; }
    .approval-note-snippet {
      font-size: 11px;
      color: var(--mauve-text);
      font-style: italic;
      margin-top: 2px;
      line-height: 1.3;
    }

    /* ============================================================ */
    /* ÁREA 14 CAMINHO C — Resolução de pedidos de ajuste            */
    /* ============================================================ */

    /* Botões inline na approval-row (Ajuste feito + Replicar) — só aparecem
       no editor pra rows com state=requested_changes. */
    .approval-row-actions {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .approval-action-btn {
      font-size: 11px;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: 100px;
      border: 1px solid var(--border-soft);
      background: var(--white);
      color: var(--mauve-text);
      cursor: pointer;
      transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
      font-family: inherit;
    }
    .approval-action-btn:hover { background: var(--blush); }
    .approval-action-btn.is-resolve {
      background: var(--green);
      color: var(--white);
      border-color: var(--green);
    }
    .approval-action-btn.is-resolve:hover { opacity: 0.92; }
    .approval-action-btn.is-reply {
      /* outline neutro — ação secundária comparada ao Ajuste feito */
    }

    /* Form de réplica expansível inline. */
    .approval-reply-form {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .approval-reply-textarea {
      width: 100%;
      min-height: 60px;
      padding: 8px 10px;
      font-size: 12px;
      font-family: inherit;
      border: 1px solid var(--border-soft);
      border-radius: 6px;
      background: var(--white);
      color: var(--deep);
      resize: vertical;
      box-sizing: border-box;
    }
    .approval-reply-textarea:focus { outline: none; border-color: var(--mauve); }
    .approval-reply-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }

    /* Réplica visível (pro viewer e pro editor — abaixo da nota original). */
    .approval-reply-display {
      margin-top: 6px;
      padding: 6px 10px;
      background: var(--blush-light);
      border-left: 2px solid var(--mauve);
      border-radius: 0 6px 6px 0;
      font-size: 11px;
      color: var(--deep);
      line-height: 1.4;
    }
    .approval-reply-display-label {
      font-size: 10px;
      letter-spacing: 0.05em;
      color: var(--mauve);
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 2px;
    }

    /* Banner ✦ no card view quando persona logada tem ajuste feito pendente. */
    .card-revisao-banner {
      margin: 16px 0 12px;
      padding: 12px 14px;
      background: #EAF1E2;
      border: 1px solid #CFE0BF;
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: #4A6B36;
      line-height: 1.4;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-revisao-banner-icon {
      font-size: 18px;
      flex-shrink: 0;
    }

    /* Badge verde no home-card pra Tipo 5 (canto sup esquerdo).
       Coexiste com badge mauve do Tipo 2 (canto sup direito). */
    .home-card-adjustment-badge {
      position: absolute;
      top: 6px;
      left: 6px;
      width: 8px;
      height: 8px;
      border-radius: 100px;
      background: var(--green);
      pointer-events: none;
      z-index: 1;
      box-shadow: 0 0 0 3px rgba(122, 157, 90, 0.18);
    }
    .home-card.has-adjustment { padding-left: 22px; }

    /* Estado especial "aguardando revisão" na approval-state quando state=pending
       e resolvedByEditorAt existe (não é só pendente — Isabelle ajustou). */
    .approval-state.is-resolved { color: #4A6B36; font-weight: 500; }

    /* ============================================================ */
    /* COMMENTS (Área 10)                                           */
    /* ============================================================ */
    .modal-comments {
      margin: 24px 0 8px;
      padding-top: 20px;
      border-top: 1px solid var(--border-soft);
    }
    .modal-comments-title {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--mauve-text);
      margin-bottom: 12px;
      font-weight: 500;
    }
    .comment-thread-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 12px;
    }
    .comment-thread-empty {
      font-size: 12px;
      color: var(--gray);
      font-style: italic;
      padding: 8px 0;
    }
    .comment-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .comment-avatar {
      width: 32px;
      height: 32px;
      border-radius: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
      text-transform: uppercase;
      background: var(--mauve);
    }
    .comment-body {
      flex: 1;
      min-width: 0;
    }
    .comment-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 2px;
      flex-wrap: wrap;
    }
    .comment-author {
      font-size: 13px;
      font-weight: 600;
      color: var(--deep);
    }
    .comment-time {
      font-size: 11px;
      color: var(--gray);
      font-variant-numeric: tabular-nums;
    }
    .comment-text {
      font-size: 14px;
      color: var(--deep);
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    /* Área 14 F1: edit/delete inline de comment */
    .comment-edited-tag {
      font-size: 10px;
      color: var(--gray);
      font-style: italic;
    }
    .comment-actions {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: -2px;
    }
    .comment-action-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 3px 6px;
      color: var(--gray);
      font-size: 11px;
      line-height: 1;
      border-radius: 4px;
      font-family: inherit;
    }
    .comment-action-btn:hover { background: var(--blush-mid); color: var(--mauve-text); }
    /* Mobile (sem hover): actions sempre discretamente visíveis. Desktop: só on hover. */
    @media (hover: hover) {
      .comment-actions { opacity: 0; transition: opacity 0.15s ease; }
      .comment-row:hover .comment-actions { opacity: 1; }
    }
    .comment-edit-form {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 2px;
    }
    .comment-edit-textarea {
      width: 100%;
      min-height: 50px;
      padding: 6px 8px;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.4;
      color: var(--deep);
      background: var(--white);
      border: 1px solid var(--mauve);
      border-radius: 6px;
      resize: vertical;
      outline: none;
    }
    .comment-edit-actions { display: flex; gap: 6px; }
    .comment-edit-save {
      padding: 5px 12px;
      font-size: 12px;
      background: var(--mauve);
      color: var(--white);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
    }
    .comment-edit-save:disabled { opacity: 0.4; cursor: not-allowed; }
    .comment-edit-cancel {
      padding: 5px 12px;
      font-size: 12px;
      background: transparent;
      color: var(--mauve-text);
      border: 1px solid var(--border-soft);
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
    }
    .comment-compose {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      margin-top: 8px;
    }
    .comment-compose-input {
      flex: 1;
      min-height: 38px;
      padding: 10px 12px;
      font-size: 14px;
      color: var(--deep);
      background: var(--white);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-sm);
      resize: vertical;
      font-family: inherit;
      line-height: 1.4;
      transition: border-color 0.15s ease;
    }
    .comment-compose-input:focus {
      outline: none;
      border-color: var(--mauve);
    }
    .comment-compose-submit {
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--white);
      background: var(--mauve);
      border-radius: var(--radius-sm);
      transition: opacity 0.15s ease;
      flex-shrink: 0;
    }
    .comment-compose-submit:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ============================================================ */
    /* BOTTOM NAV                                                   */
    /* ============================================================ */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--white);
      border-top: 1px solid var(--border-soft);
      padding: 10px 8px calc(10px + var(--safe-bottom));
      display: flex;
      justify-content: space-around;
      box-shadow: 0 -4px 24px rgba(58, 30, 40, 0.04);
      z-index: 50;
    }

    .nav-btn {
      flex: 1;
      padding: 8px 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      border-radius: 12px;
      transition: background 0.15s ease;
    }

    .nav-btn:active { background: var(--blush); }

    .nav-icon {
      font-size: 18px;
      line-height: 1;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--mauve-text);
    }

    /* ============================================================ */
    /* SHEET (bottom modal)                                         */
    /* ============================================================ */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 10, 0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 800;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }

    .sheet-overlay.is-hidden { display: none; }

    .sheet {
      background: var(--blush-light);
      width: 100%;
      max-width: 480px;
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      animation: slideUp 0.25s cubic-bezier(.4, .8, .4, 1);
      box-shadow: var(--shadow-modal);
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .sheet-handle {
      align-self: center;
      width: 40px;
      height: 4px;
      background: var(--rose-soft);
      border-radius: 100px;
      margin: 10px 0 4px;
    }

    .sheet-header {
      padding: 8px 24px 16px;
      border-bottom: 1px solid var(--border-soft);
    }

    .sheet-kicker {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--mauve);
      margin-bottom: 4px;
    }

    .sheet-title {
      font-size: 22px;
      font-weight: 500;
      color: var(--deep);
      letter-spacing: -0.02em;
    }

    .sheet-body {
      padding: 16px 24px calc(20px + var(--safe-bottom));
      overflow-y: auto;
    }

    .sheet-block-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--white);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
      cursor: pointer;
      gap: 12px;
      transition: transform 0.12s ease, background 0.12s ease;
    }

    .sheet-block-row:active { transform: scale(0.99); background: var(--blush); }

    .sheet-block-row.is-current {
      border-color: var(--mauve);
      border-width: 2px;
    }

    .sheet-block-row.is-meal,
    .sheet-block-row.is-pause {
      border-style: dashed;
      background: var(--blush);
    }

    .sheet-block-info {
      flex: 1;
      min-width: 0;
    }

    .sheet-block-time {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mauve);
      margin-bottom: 2px;
    }

    .sheet-block-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--deep);
    }

    .sheet-block-progress {
      font-size: 12px;
      color: var(--mauve-text);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .sheet-block-progress.is-complete { color: var(--green); font-weight: 600; }

    .sheet-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }

    .sheet-action {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: var(--white);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.12s ease;
    }

    .sheet-action:hover { background: var(--blush); }

    .sheet-action-icon {
      width: 36px;
      height: 36px;
      border-radius: 100px;
      background: var(--blush);
      color: var(--mauve);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .sheet-action-body {
      flex: 1;
      min-width: 0;
      text-align: left;
    }

    .sheet-action-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--deep);
      margin-bottom: 2px;
    }

    .sheet-action-desc {
      font-size: 12px;
      color: var(--mauve-text);
    }

    .sheet-action.is-danger .sheet-action-icon {
      background: rgba(185, 75, 90, 0.1);
      color: var(--red);
    }
    .sheet-action.is-danger .sheet-action-title { color: var(--red); }

    .sheet-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .sheet-form .form-textarea {
      min-height: 120px;
    }

    .sheet-empty {
      text-align: center;
      color: var(--gray);
      font-size: 13px;
      padding: 32px 16px;
    }

    .sheet-insight-row {
      padding: 12px 14px;
      background: var(--white);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
    }

    .sheet-insight-meta {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--mauve);
      margin-bottom: 4px;
    }

    .sheet-insight-text {
      font-size: 13px;
      color: var(--deep);
      line-height: 1.4;
    }

    /* ============================================================ */
    /* EDITOR                                                       */
    /* ============================================================ */
    .editor-shell {
      padding: calc(var(--safe-top) + 28px) 24px 80px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .editor-header {
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-soft);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .editor-kicker {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mauve);
      margin-bottom: 8px;
    }

    .editor-title {
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    /* Polish: header-info agora é flex column pra acomodar botão "← Master" */
    .editor-header-info {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }
    .editor-back-master-btn {
      appearance: none;
      -webkit-appearance: none;
      font-family: inherit;
      cursor: pointer;
      margin-top: 6px;
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--mauve);
      background: transparent;
      border: 1px solid var(--rose-soft);
      border-radius: 999px;
      transition: all 0.15s ease;
    }
    .editor-back-master-btn:hover {
      background: var(--mauve);
      color: var(--blush-light);
      border-color: var(--mauve);
    }

    .editor-subtitle {
      color: var(--mauve-text);
      font-size: 14px;
    }

    .editor-day-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .editor-day-tab {
      padding: 10px 18px;
      border-radius: 100px;
      background: var(--white);
      border: 1px solid var(--border-soft);
      font-size: 13px;
      font-weight: 500;
      color: var(--mauve-text);
      cursor: pointer;
    }

    .editor-day-tab.active {
      background: var(--deep);
      color: var(--white);
      border-color: var(--deep);
    }

    /* Tab "+" pra adicionar novo day no editor (Fase 0 do refactor de Sprint).
       Variante dashed mauve discreta — sinaliza ação sem competir visualmente
       com tabs de days reais. */
    .editor-day-tab.is-add {
      background: transparent;
      border-style: dashed;
      border-color: var(--mauve);
      color: var(--mauve);
      padding: 10px 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .editor-day-tab.is-add:hover {
      background: var(--blush-light);
    }

    .editor-blocks {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .editor-block {
      background: var(--white);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .editor-block.is-meal,
    .editor-block.is-pause {
      background: var(--blush-light);
      border-style: dashed;
    }

    .editor-block-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--border-soft);
      background: var(--white);
    }

    .editor-block.is-meal .editor-block-header,
    .editor-block.is-pause .editor-block-header {
      background: var(--blush-light);
    }

    .editor-block-info {
      display: flex;
      align-items: baseline;
      gap: 14px;
      flex-wrap: wrap;
    }

    .editor-block-time {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--mauve);
      font-variant-numeric: tabular-nums;
    }

    .editor-block-name {
      font-size: 17px;
      font-weight: 500;
      color: var(--deep);
    }

    .editor-block-territory {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray);
    }

    .editor-block-kind {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--rose);
      padding: 3px 8px;
      background: var(--blush);
      border-radius: 100px;
    }

    .editor-block-edit {
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--mauve);
      background: var(--blush);
      border-radius: 100px;
      border: 1px solid var(--border-soft);
      cursor: pointer;
      transition: background 0.12s ease;
    }
    .editor-block-edit:hover { background: var(--rose-soft); color: var(--white); }

    .editor-block-detail {
      /* Atrito 5a: padding-top zero deixava a pílula peça-hero colada no border-bottom
         do header → visualmente parecia flutuando. 12px dá respiro. */
      padding: 12px 20px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 12px;
      color: var(--mauve-text);
      background: var(--white);
      border-bottom: 1px solid var(--border-soft);
    }

    .editor-block.is-meal .editor-block-detail,
    .editor-block.is-pause .editor-block-detail {
      background: var(--blush-light);
    }

    .editor-block-detail-pill {
      padding: 3px 10px;
      background: var(--blush);
      border-radius: 100px;
      font-size: 11px;
      font-weight: 500;
      color: var(--mauve);
    }
    .editor-block-detail-pill.is-hero { background: var(--mauve); color: var(--white); }
    .editor-block-detail-note {
      font-style: italic;
      color: var(--gray);
      font-size: 11px;
    }

    .block-hero-pill {
      padding: 4px 10px;
      background: var(--mauve);
      color: var(--white);
      border-radius: 100px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .block-location {
      font-size: 12px;
      color: var(--mauve-text);
      margin-bottom: 10px;
      letter-spacing: 0.01em;
    }

    .welcome-bullets {
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-align: left;
    }

    .welcome-bullet {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      font-size: 13px;
      color: var(--mauve-text);
      line-height: 1.4;
    }

    .welcome-bullet-num {
      width: 22px;
      height: 22px;
      border-radius: 100px;
      background: var(--blush);
      color: var(--mauve);
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .editor-cols {
      display: grid;
      grid-template-columns: repeat(5, minmax(180px, 1fr));
      gap: 0;
      min-height: 80px;
    }

    @media (max-width: 1100px) {
      .editor-cols { grid-template-columns: repeat(3, minmax(180px, 1fr)); }
    }
    @media (max-width: 700px) {
      .editor-cols { grid-template-columns: 1fr; }
    }

    .editor-col {
      padding: 14px;
      border-right: 1px solid var(--border-soft);
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 100px;
    }

    .editor-col:last-child { border-right: none; }

    @media (max-width: 1100px) {
      .editor-col:nth-child(3n) { border-right: none; }
    }
    @media (max-width: 700px) {
      .editor-col {
        border-right: none;
        border-bottom: 1px solid var(--border-soft);
      }
      .editor-col:last-child { border-bottom: none; }
    }

    .editor-col-header {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mauve);
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .editor-col-count {
      color: var(--gray);
      font-weight: 500;
    }

    .editor-mini-card {
      padding: 10px 12px;
      background: var(--blush-light);
      border: 1px solid var(--border-soft);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.12s ease, transform 0.12s ease;
      position: relative; /* F2: ancora .editor-mini-comment-badge */
    }

    /* Área 14 F2: badge de comments não-lidos no editor (canto sup direito).
       Só aparece se mode === editor e há comments com createdAt > lastSeenAt[cardId]. */
    .editor-mini-comment-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      background: var(--mauve);
      color: var(--white);
      border-radius: 100px;
      font-size: 10px;
      font-weight: 600;
      line-height: 18px;
      text-align: center;
      box-sizing: border-box;
      pointer-events: none; /* clique passa direto pro mini-card */
      z-index: 1;
    }
    /* Reserva espaço no meta pra evitar sobreposição com o editor-mini-badge de estado. */
    .editor-mini-card.has-unread .editor-mini-meta { padding-right: 26px; }

    /* Área 14 Tipo 3: badge laranja de pedidos de ajuste não-vistos (canto sup ESQUERDO).
       Cor saturada (#C68E4D, igual border-left de cards requested_changes) sinaliza AÇÃO
       requerida — diferente do mauve do Tipo 1 (que é só "comment não-visto"). Coexiste
       com o badge mauve no mesmo card sem conflito (cantos opostos). */
    .editor-mini-changes-badge {
      position: absolute;
      top: 6px;
      left: 6px;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      background: #C68E4D;
      color: var(--white);
      border-radius: 100px;
      font-size: 10px;
      font-weight: 600;
      line-height: 18px;
      text-align: center;
      box-sizing: border-box;
      pointer-events: none;
      z-index: 1;
    }
    /* Reserva espaço no meta à esquerda (espelha o has-unread direito). */
    .editor-mini-card.has-unread-changes .editor-mini-meta { padding-left: 26px; }

    .editor-mini-card:hover { background: var(--blush); }
    .editor-mini-card:active { transform: scale(0.98); }

    .editor-mini-card.is-completed {
      opacity: 0.55;
    }

    .editor-mini-meta {
      /* Atrito 5b: sem flex-wrap, em mobile estreito o dot + format + tipo + badge
         de status tentavam caber em 1 linha só → ficavam comprimidos/feios.
         row-gap garante espaço quando quebra pra 2 linhas. */
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      row-gap: 5px;
      margin-bottom: 6px;
      align-items: center;
    }

    .editor-mini-pill {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--mauve);
      padding: 2px 6px;
      background: var(--white);
      border-radius: 100px;
      border: 1px solid var(--border-soft);
    }

    .editor-mini-prio {
      width: 6px;
      height: 6px;
      border-radius: 100px;
    }
    .editor-mini-prio.is-alta { background: var(--red); }
    .editor-mini-prio.is-media { background: var(--mauve); }
    .editor-mini-prio.is-baixa { background: var(--gray-light); }

    .editor-mini-title {
      font-size: 12.5px;
      font-weight: 500;
      color: var(--deep);
      line-height: 1.3;
    }

    .editor-mini-card.is-completed .editor-mini-title { text-decoration: line-through; }

    .editor-mini-time {
      font-size: 10px;
      color: var(--gray);
      margin-top: 4px;
    }

    /* Área 9: badge de estado efetivo no editor mini-card */
    .editor-mini-badge {
      font-size: 9.5px;
      letter-spacing: 0.04em;
      padding: 2px 7px;
      border-radius: 100px;
      font-weight: 500;
      text-transform: lowercase;
      line-height: 1.4;
      white-space: nowrap;
      /* PROMPT 12 / item 8: transição suave entre estados */
      transition: background 0.25s ease, color 0.25s ease, border-color 0.25s ease;
    }
    .editor-mini-badge.is-draft { background: transparent; color: var(--mauve); border: 1px dashed var(--border-soft); }
    .editor-mini-badge.is-pending { background: var(--blush-mid); color: var(--mauve-text); }
    .editor-mini-badge.is-in_progress { background: #E8E0D2; color: var(--mauve-text); }
    .editor-mini-badge.is-approved { background: #DDE9D5; color: #4A6B36; }
    .editor-mini-badge.is-requested_changes { background: #F4D9B0; color: #8B5A1A; }
    .editor-mini-badge.is-published { background: var(--green); color: var(--white); }

    /* Bordas laterais por estado pra reforçar o estado visualmente no editor */
    .editor-mini-card.is-state-requested_changes { border-left: 3px solid #C68E4D; }
    .editor-mini-card.is-state-approved { border-left: 3px solid #7A9D5A; }
    .editor-mini-card.is-state-published { border-left: 3px solid var(--green); }

    /* Botão de ação inline (Enviar pra aprovação / Marcar como publicado) */
    .editor-mini-action {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 7px 10px;
      border: none;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    .editor-mini-action:active { transform: scale(0.97); }
    .editor-mini-action.is-send {
      background: var(--mauve);
      color: var(--white);
    }
    .editor-mini-action.is-publish {
      background: var(--green);
      color: var(--white);
    }
    /* Rede de segurança pós-publicação. Outline cinza discreto pra NÃO competir
       com is-publish/is-send — é ação reversiva, não principal. */
    .editor-mini-action.is-unpublish {
      background: transparent;
      color: var(--mauve-text);
      border: 1px solid var(--border-soft);
    }
    .editor-mini-action.is-unpublish:hover {
      background: var(--blush-light);
      border-color: var(--mauve);
      color: var(--mauve);
    }

    .editor-add-card {
      padding: 12px;
      border: 1.5px dashed var(--rose-soft);
      border-radius: 10px;
      color: var(--mauve);
      background: transparent;
      font-size: 12px;
      font-weight: 500;
      transition: background 0.12s ease;
      cursor: pointer;
    }

    .editor-add-card:hover { background: var(--blush); }

    /* Caminho 1: empty state e botão "Adicionar bloco" */
    .editor-blocks-empty {
      text-align: center;
      padding: 60px 20px;
      background: var(--white);
      border: 1px dashed var(--border-soft);
      border-radius: var(--radius-md);
      color: var(--mauve-text);
    }
    .editor-blocks-empty-text {
      font-size: 14px;
      line-height: 1.55;
      margin-bottom: 18px;
    }
    .editor-add-block-btn {
      padding: 11px 20px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: opacity 0.15s ease, background 0.15s ease;
      border: none;
    }
    .editor-add-block-btn.is-primary {
      background: var(--mauve);
      color: var(--white);
    }
    .editor-add-block-btn.is-primary:hover { opacity: 0.92; }
    .editor-add-block-btn.is-secondary {
      background: transparent;
      color: var(--mauve);
      border: 1.5px dashed var(--rose-soft);
      margin-top: 16px;
      display: block;
      width: 100%;
    }
    .editor-add-block-btn.is-secondary:hover { background: var(--blush); }

    .editor-banner {
      background: var(--blush);
      border: 1px dashed var(--rose-soft);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      margin-bottom: 24px;
      font-size: 13px;
      color: var(--mauve-text);
    }

    .editor-banner strong {
      color: var(--mauve);
      font-weight: 600;
    }

    .editor-meta-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .editor-meta-pill {
      padding: 6px 12px;
      background: var(--white);
      border: 1px solid var(--border-soft);
      border-radius: 100px;
      font-size: 11px;
      color: var(--mauve-text);
      letter-spacing: 0.04em;
    }

    .editor-meta-pill strong { color: var(--deep); font-weight: 600; }

    /* Área 14 Tipo 4 — pílula de insights clickável (Isabelle no editor).
       Mantém o look passivo do .editor-meta-pill quando sem badge; quando há
       insights novos (.has-unread-insights), borda mauve e dot mauve no canto
       sup direito. Click rola pra seção "Insights dos fundadores" e zera
       lastSeenInsightAt no path notifications/isabelle/lastSeenInsightAt. */
    .editor-meta-pill.is-clickable {
      position: relative;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 120ms ease, background 120ms ease;
    }
    .editor-meta-pill.is-clickable:hover {
      border-color: var(--mauve);
      background: var(--blush-light);
    }
    /* Atrito 1 caminho C: pílula destrutiva (excluir day). Ação rara, fica
       visualmente discreta — só se compromete quando hover. */
    .editor-meta-pill.is-danger {
      cursor: pointer;
      color: #B85B5B;
      border-color: var(--border-soft);
      font-family: inherit;
      transition: border-color 120ms ease, background 120ms ease, color 120ms ease;
    }
    .editor-meta-pill.is-danger:hover {
      border-color: #B85B5B;
      background: #FBEBEB;
      color: #8E3A3A;
    }
    .editor-meta-pill.has-unread-insights {
      border-color: var(--mauve);
      padding-right: 18px;
    }
    .editor-meta-pill-insights-badge {
      position: absolute;
      top: 50%;
      right: 6px;
      transform: translateY(-50%);
      width: 8px;
      height: 8px;
      border-radius: 100px;
      background: var(--mauve);
      pointer-events: none;
      /* PROMPT 12 / item 8: pulsa suavemente pra chamar atenção sem ser intrusivo */
      animation: insights-badge-pulse 2.4s ease-in-out infinite;
    }
    @keyframes insights-badge-pulse {
      0%, 100% { opacity: 0.85; transform: translateY(-50%) scale(1); }
      50%      { opacity: 1;    transform: translateY(-50%) scale(1.18); }
    }

    /* Atrito 3: sheet de gestão de tags */
    .tags-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }
    .tag-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--white);
      border: 1px solid var(--border-soft);
      border-radius: 10px;
    }
    .tag-row-label {
      flex: 1;
      font-size: 13px;
      color: var(--deep);
      font-weight: 500;
    }
    .tag-row-count {
      font-size: 11px;
      color: var(--gray);
      letter-spacing: 0.04em;
    }
    .tag-row-remove {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: transparent;
      border: 1px solid var(--border-soft);
      color: var(--mauve-text);
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
    }
    .tag-row-remove:hover {
      background: #FBEBEB;
      color: #8E3A3A;
      border-color: #B85B5B;
    }
    .tag-row.is-in-use .tag-row-remove {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .tag-add-row {
      display: flex;
      gap: 8px;
    }
    .tag-add-row .form-input { flex: 1; }

    /* D12 — sheet Gerenciar personas (mesmo molde da sheet de tags). */
    .persona-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--white);
      border: 1px solid var(--border-soft);
      border-radius: 10px;
    }
    .persona-row-swatch {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1px solid var(--border-soft);
      flex-shrink: 0;
    }
    .persona-row-meta {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .persona-row-name {
      font-size: 13px;
      color: var(--deep);
      font-weight: 500;
    }
    .persona-row-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--blush-light);
      color: var(--mauve-text);
      letter-spacing: 0.04em;
      display: inline-block;
      width: fit-content;
    }
    .persona-row-badge.is-voter {
      background: var(--mauve);
      color: var(--white);
    }
    .persona-row-count {
      font-size: 11px;
      color: var(--gray);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .persona-row-remove {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: transparent;
      border: 1px solid var(--border-soft);
      color: var(--mauve-text);
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
      flex-shrink: 0;
    }
    .persona-row-remove:hover {
      background: #FBEBEB;
      color: #8E3A3A;
      border-color: #B85B5B;
    }
    .persona-row.is-in-use .persona-row-remove {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .persona-add-form {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
      background: var(--blush-light);
      border-radius: 10px;
    }
    .persona-add-row-inline {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .persona-add-row-inline .form-input { flex: 1; min-width: 120px; }
    .persona-color-pair {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .persona-color-pair .form-input {
      width: 90px;
      font-family: monospace;
      text-transform: uppercase;
      font-size: 12px;
    }
    .persona-color-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid var(--border-soft);
      flex-shrink: 0;
    }
    .persona-add-voter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--mauve-text);
    }
    .persona-add-voter-row input { margin: 0; }

    .editor-section {
      margin-top: 32px;
    }

    .editor-section-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--deep);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .editor-section-title::before {
      content: '';
      width: 4px;
      height: 16px;
      background: var(--mauve);
      border-radius: 2px;
    }

    /* ============================================================ */
    /* ÁREA 11 — MASTER DASHBOARD                                   */
    /* Painel da Isabelle (sem cliente). Paleta neutra: blush-light  */
    /* + mauve. Sem branding por cliente.                            */
    /* ============================================================ */
    .master-shell {
      max-width: 960px;
      margin: 0 auto;
      padding: 48px 32px 64px;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--blush-light);
    }

    .master-header {
      margin-bottom: 40px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border-soft);
      /* Bug fix Empire Hair: position: absolute no botão sobrepunha "Olá, Isabelle"
         em viewport estreito. Trocado por flex com wrap — botão à direita em telas
         largas, wrappa pra linha de baixo em telas estreitas. */
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .master-header-text {
      flex: 1 1 auto;
      min-width: 0;
    }

    /* Atrito 6: botão pra adicionar cliente novo no master */
    .master-add-client-btn {
      flex-shrink: 0;
      padding: 10px 18px;
      border: 1px solid var(--mauve);
      background: var(--white);
      color: var(--mauve);
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .master-add-client-btn:hover {
      background: var(--mauve);
      color: var(--white);
    }

    /* Atrito 6: grid 2 colunas pros 8 hex inputs da paleta */
    .palette-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    /* Empire Hair fix: cada hex agora tem sublabel descritivo embaixo */
    .palette-cell {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .palette-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .palette-swatch {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      border: 1px solid var(--border-soft);
      flex-shrink: 0;
    }
    .palette-row label {
      font-size: 10px;
      color: var(--mauve-text);
      letter-spacing: 0.04em;
      min-width: 64px;
      font-weight: 600;
    }
    .palette-row input {
      flex: 1;
      padding: 6px 8px;
      font-size: 11px;
      font-family: monospace;
      border: 1px solid var(--border-soft);
      border-radius: 6px;
      background: var(--white);
    }
    .palette-cell-hint {
      font-size: 10px;
      color: var(--gray);
      line-height: 1.4;
      padding-left: 32px;
    }

    /* Empire Hair fix: preview ao vivo da paleta — usa CSS vars locais escopadas
       no .palette-preview pra não vazar pro app inteiro. JS atualiza --p-* quando
       hex inputs mudam. */
    .palette-preview {
      margin-top: 16px;
      border: 1px solid var(--border-soft);
      border-radius: 12px;
      overflow: hidden;
      background: var(--p-blush-light);
    }
    .palette-preview-header {
      padding: 8px 12px;
      background: var(--white);
      border-bottom: 1px solid var(--border-soft);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--mauve-text);
    }
    .palette-preview-body {
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .palette-preview-kicker {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--p-mauve);
      font-weight: 600;
    }
    .palette-preview-title {
      font-size: 22px;
      font-weight: 500;
      color: var(--p-deep);
      line-height: 1.1;
      letter-spacing: -0.01em;
    }
    .palette-preview-subtitle {
      font-size: 13px;
      color: var(--p-mauve-text);
      font-style: italic;
    }
    .palette-preview-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .palette-preview-pill-meta {
      padding: 4px 10px;
      background: var(--white);
      border: 1px solid var(--p-border-soft);
      border-radius: 100px;
      font-size: 11px;
      color: var(--p-mauve-text);
    }
    .palette-preview-pill-mauve {
      padding: 4px 10px;
      background: var(--p-blush);
      border: 1px solid var(--p-mauve);
      border-radius: 100px;
      font-size: 11px;
      color: var(--p-mauve);
      font-weight: 500;
    }
    .palette-preview-cta {
      padding: 12px 20px;
      background: var(--p-deep);
      color: var(--white);
      border: none;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      align-self: flex-start;
      cursor: default;
    }
    .palette-preview-divider {
      border-top: 1px solid var(--p-border-soft);
      margin: 4px 0;
    }
    .palette-preview-rose-hover {
      padding: 4px 10px;
      background: var(--p-rose-soft);
      border-radius: 100px;
      font-size: 11px;
      color: var(--white);
      align-self: flex-start;
    }

    .pin-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .pin-row .form-input {
      flex: 1;
      font-family: monospace;
      letter-spacing: 0.16em;
      text-align: center;
    }
    .pin-regen-btn {
      padding: 8px 12px;
      border: 1px solid var(--border-soft);
      background: var(--white);
      color: var(--mauve);
      border-radius: 8px;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.12s ease;
    }
    .pin-regen-btn:hover {
      background: var(--blush-light);
      border-color: var(--mauve);
    }

    .master-kicker {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mauve);
      margin-bottom: 12px;
    }

    .master-title {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--deep);
      line-height: 1.1;
    }

    .master-subtitle {
      margin-top: 8px;
      font-size: 13px;
      color: var(--mauve-text);
    }

    .master-clients {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .master-client-card {
      position: relative;
      display: flex;
