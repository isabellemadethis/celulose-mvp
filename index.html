    // ============================================================
    // ROUTING (v1.5) — 3 contextos: master, editor, viewer
    // ============================================================
    async function route() {
      const params = getQueryParams();

      // ---------- 1. MASTER ----------
      if (params.master) {
        const masterPinSnap = await masterRef.child('pin').once('value');
        const masterPinVal = masterPinSnap.val();
        // PIN do master pode estar como number no RTDB → comparação tolerante
        if (String(masterPinVal) !== String(params.pin)) { renderMasterPinGate(); return; }
        state.mode = 'master';
        state.authValidated = true;
        document.body.classList.remove('editor-mode');
        document.body.classList.add('master-mode');
        await loadJanelasAprovacao(); // S2.5*: pre-carrega janelas pra tela master
        await loadMasterDashboard();
        return;
      }

      // ---------- 2. SEM CLIENTE → entry gate ----------
      if (!params.cliente) {
        renderEntryGate();
        return;
      }

      // ---------- 3. RESOLVE CLIENTE ----------
      state.clientSlug = params.cliente;
      clientRef = db.ref(ROOT_PATH + '/clients/' + state.clientSlug);
      const snap = await clientRef.once('value');
      if (!snap.exists()) { renderClientNotFound(); return; }
      const rawClientData = snap.val();
      // S2.5* / v1.5.1: defaults nos cards já no boot (antes do attachClientListener
      // re-aplicar via on('value')). Garante que qualquer render no caminho route()
      // já enxerga cards na forma v1.5.1 (origin/postedAt/isReference/etc).
      if (rawClientData && rawClientData.cards) {
        rawClientData.cards = applyV151DefaultsBulk(rawClientData.cards);
      }
      state.clientData = rawClientData;
      state.data = state.clientData; // legado espelhado

      // S2.5*: side-load de personasInternas + janelas master. Não bloqueia render
      // se falhar (ambas têm fallback). Closet hoje é o único cliente que terá
      // personasInternas/jamily — outros clientes recebem {} silenciosamente.
      state.clientPersonasInternas = await loadClientPersonasInternas(state.clientSlug);
      await loadJanelasAprovacao();

      const auth = state.clientData.auth || {};

      // ---------- 4. EXECUTORA INTERNA (S2.5* — Jamily no Closet) ----------
      // Quarto contexto do route() introduzido em v1.5.1. Auth via
      // personasInternas/{u}/pin. PWA-friendly (Jamily usa atalho no iPhone:
      // mode=executora&u=jamily&pin=XXXX salvo em localStorage).
      if (params.mode === 'executora') {
        const internas = state.clientPersonasInternas || {};
        if (!params.u || !internas[params.u]) {
          renderExecutoraPersonaNotFound();
          return;
        }
        const exec = internas[params.u];
        if (!exec.pin || params.pin !== exec.pin) {
          renderExecutoraPinGate();
          return;
        }
        if (exec.active === false) {
          renderExecutoraDesativada();
          return;
        }
        state.mode = 'executora';
        state.authValidated = true;
        state.currentExecutoraId = params.u;
        state.currentExecutora = exec;
        state.executoraTab = 'hub'; // default ao entrar
        document.body.classList.remove('editor-mode');
        document.body.classList.remove('master-mode');
        document.body.classList.remove('is-manage-mode');
        document.body.classList.add('executora-mode');
        applyBranding(state.clientData.branding);  // pre-paint
        saveAuthLocal(params);
        attachClientListener();
        renderExecutoraShell();
        applyBranding(state.clientData.branding);  // post-paint
        return;
      }

      // ---------- 4. EDITOR ----------
      if (params.mode === 'editor') {
        if (params.pin !== auth.editorPin) { renderEditorPinGate(); return; }
        state.mode = 'editor';
        state.authValidated = true;
        // Resolve currentDayId: se URL trouxe ?day=, valida; senão infere.
        if (params.day && state.clientData.days && state.clientData.days[params.day]) {
          state.currentDayId = params.day;
        } else {
          state.currentDayId = inferCurrentDayId();
        }
        document.body.classList.add('editor-mode');
        document.body.classList.remove('master-mode');
        document.body.classList.remove('is-manage-mode');
        applyBranding(state.clientData.branding);  // pre-paint: CSS vars setadas
        saveAuthLocal(params);
        attachClientListener();
        renderEditor();
        applyBranding(state.clientData.branding);  // post-paint: aplica logo/saudação no DOM novo
        return;
      }

      // ---------- 5. VIEWER ----------
      // 5a. precisa de persona escolhida
      const personas = state.clientData.personas || {};
      if (!params.u || !personas[params.u]) {
        renderPersonaPicker();
        return;
      }
      // 5b. precisa do PIN do viewer
      if (params.pin !== auth.viewerPin) { renderViewerPinGate(); return; }

      state.mode = 'viewer';
      state.authValidated = true;
      state.currentPersonaId = params.u;
      // Resolve currentDayId: se URL trouxe ?day=, valida; senão infere.
      if (params.day && state.clientData.days && state.clientData.days[params.day]) {
        state.currentDayId = params.day;
      } else {
        state.currentDayId = inferCurrentDayId();
      }
      document.body.classList.remove('editor-mode');
      document.body.classList.remove('master-mode');
      document.body.classList.remove('is-manage-mode');
      applyBranding(state.clientData.branding);  // pre-paint: CSS vars setadas
      saveAuthLocal(params);
      attachClientListener();

      // S3.0: troca manifest PWA pro deste cliente+persona, com PIN embutido no
      // start_url. Quando viewer clica "Adicionar à tela inicial", instala app
      // personalizado que abre direto sem gate de PIN. Ícone vem do logo do
      // cliente (branding.pwaLogoUrl) ou canvas fallback (inicial + paleta.mauve).
      swapPwaManifest(state.clientData, params.u, params.pin);

      // (welcome/audioUnlocked + day inference virão no próximo prompt, junto da migração da Home)
      renderHome();
      applyBranding(state.clientData.branding);  // post-paint: aplica logo/saudação no DOM novo
    }

    // ============================================================
    // HELPERS — Sprints + Days (Área 8)
    // ============================================================

    // Soma `n` dias a uma string 'YYYY-MM-DD'. Usa UTC pra evitar shift de
    // fuso (criar Date('2026-05-19') vira UTC-0; toISOString fica seguro).
    // Retorna 'YYYY-MM-DD'.
    function addDays(dateStr, n) {
      const d = new Date(dateStr + 'T00:00:00Z');
      d.setUTCDate(d.getUTCDate() + n);
      return d.toISOString().slice(0, 10);
    }

    // Converte string em kebab-case ASCII pra usar em IDs.
    // "Publicação Pós-Campos do Jordão" → "publicacao-pos-campos-do-jordao"
    // dateToYM, daysBetween, slugify removidos junto com cloneActiveSprint
    // no refactor HARD-LITE. addDays continua porque é usado em createNewDay
    // pra sugerir próxima data.

    // Label dinâmica de day pra exibição. Substituiu o "Dia N" estático no
    // refactor de produção diária. Retorna:
    //   - "Hoje" se day.date é hoje (data LOCAL, pra casar com input type=date)
    //   - "Amanhã" se +1 dia
    //   - "Ontem" se -1 dia
    //   - Dia da semana por extenso ("Segunda", "Terça"...) pra outros dias
    //   - Fallback day.short se day inválido
    function getDayDisplayLabel(day) {
      if (!day || !day.date) return (day && day.short) || '';

      // Data local YYYY-MM-DD (não UTC — pra match com day.date que vem do input
      // type=date, que é interpretado em fuso local).
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const da = String(now.getDate()).padStart(2, '0');
      const today = `${y}-${m}-${da}`;

      const tomorrow = addDays(today, 1);
      const yesterday = addDays(today, -1);

      if (day.date === today) return 'Hoje';
      if (day.date === tomorrow) return 'Amanhã';
      if (day.date === yesterday) return 'Ontem';

      const dows = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
      const dt = new Date(day.date + 'T12:00:00');
      return dows[dt.getDay()];
    }

    // Lista todos os days do cliente, ordenados por DATA ascendente.
    // Refactor HARD-LITE: substituiu getDaysOfSprint(). Days não pertencem mais
    // a sprints — produção é diária livre, ordenada cronologicamente.
    function getAllDaysOfClient() {
      const days = (state.clientData && state.clientData.days) || {};
      return Object.values(days)
        .filter(d => d && d.date)
        .sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : 0));
    }

    // O day atualmente selecionado, lido por state.currentDayId. null se não existe.
    function getCurrentDay() {
      const dayId = state.currentDayId;
      if (!dayId) return null;
      return (state.clientData && state.clientData.days && state.clientData.days[dayId]) || null;
    }

    // Blocks de um day específico, ordenados por `order`. Vazio se day não existe ou sem blocks.
    function getBlocksOfDay(dayId) {
      const day = (state.clientData && state.clientData.days && state.clientData.days[dayId]) || null;
      if (!day || !day.blocks) return [];
      return Object.values(day.blocks).sort((a, b) => (a.order || 0) - (b.order || 0));
    }

    // Resolve qual day mostrar no boot. Hoje se houver match exato; senão first/last.
    function inferCurrentDayId() {
      const days = getAllDaysOfClient();
      if (days.length === 0) return null;
      const today = new Date().toISOString().slice(0, 10);
      const match = days.find(d => d.date === today);
      if (match) return match.id;
      const first = days[0], last = days[days.length - 1];
      if (today < first.date) return first.id;
      return last.id;
    }

    // ============================================================
    // HELPERS — Card status + Approvals (Área 9)
    // ============================================================
    // Modelo v1.5:
    //   card.status         = 'draft' | 'review' | 'published'   (string no nível do card)
    //   card.approvalByPersona[personaId] = { state, updatedAt, notes }
    //     state = 'pending' | 'approved' | 'requested_changes'
    //
    // Compat com v1: se card.status for objeto (formato antigo {personaId:{completed}}),
    // tratamos como 'draft' silenciosamente. v1.5 começa fresh.

    function getCardStatus(card) {
      if (!card) return 'draft';
      if (typeof card.status === 'string') return card.status;
      return 'draft';
    }

    function getCardApprovalForPersona(card, personaId) {
      if (!card || !card.approvalByPersona) return null;
      const a = card.approvalByPersona[personaId];
      return a ? a.state : null;
    }

    // Estado efetivo derivado, usado em renderização (badge, classes).
    // Retorna: 'draft' | 'pending' | 'in_progress' | 'approved' | 'requested_changes' | 'published'
    //   draft               → status=='draft'
    //   published           → status=='published'
    //   requested_changes   → status=='review' E qualquer persona pediu ajuste
    //   approved            → status=='review' E todas aprovaram
    //   in_progress         → status=='review' E pelo menos 1 aprovou (e ninguém pediu ajuste) e ainda há pendentes
    //   pending             → status=='review' E ninguém votou ainda
    function getCardEffectiveApproval(card) {
      const status = getCardStatus(card);
      if (status === 'draft') return 'draft';
      if (status === 'published') return 'published';
      // status === 'review'
      const approvals = (card && card.approvalByPersona) || {};
      const states = Object.values(approvals).map(a => a && a.state).filter(Boolean);
      if (states.length === 0) return 'pending';
      if (states.includes('requested_changes')) return 'requested_changes';
      if (states.every(s => s === 'approved')) return 'approved';
      // pelo menos 1 aprovou mas ainda há pendentes (ou pelo menos 1 pendente explícito)
      if (states.includes('approved')) return 'in_progress';
      return 'pending';
    }

    // ============================================================
    // S2.5* DELEGAÇÃO CLOSET — helpers + loaders v1.5.1 (Fase 1C)
    // Plumbing puro. SEM UI nesta fase. Tudo é seguro de chamar
    // mesmo quando os nós novos do DB ainda não existem (defaults
    // no read garantem retorno coerente).
    // ============================================================

    // Estado global das janelas — preenchido por loadJanelasAprovacao()
    // no boot do master. Fallback pra JANELAS_FALLBACK até carregar.
    let janelasAprovacao = JANELAS_FALLBACK.slice();

    // Lê _master/janelasAprovacao (set único pra todos os clientes —
    // a janela é DA Isabelle, não do cliente). Idempotente.
    async function loadJanelasAprovacao() {
      try {
        if (!masterRef) return;
        const snap = await masterRef.child('janelasAprovacao').once('value');
        const v = snap.val();
        if (Array.isArray(v) && v.length > 0) {
          janelasAprovacao = v.slice();
        }
      } catch (e) {
        console.warn('[v1.5.1] janelasAprovacao indisponível, usando fallback', e);
      }
    }

    // Lê personasInternas/{} de um cliente. Default {}: cliente sem
    // executora opera normal (Closet hoje é o único candidato).
    async function loadClientPersonasInternas(slug) {
      try {
        if (!slug) return {};
        const snap = await db.ref(ROOT_PATH + '/clients/' + slug + '/personasInternas').once('value');
        return snap.val() || {};
      } catch (e) {
        console.warn('[v1.5.1] personasInternas indisponível pra ' + slug, e);
        return {};
      }
    }

    // Helper canônico de papel — recebe um persona-obj (cliente OU interna)
    // e retorna um dos ROLES.*. Usado pra escopar UI/permissões.
    function getPersonaRole(personaObj) {
      if (!personaObj) return null;
      if (personaObj.role === ROLES.EXECUTORA_INTERNA) return ROLES.EXECUTORA_INTERNA;
      return ROLES.PERSONA_CLIENTE;
    }

    // Hoje (Closet) só folga dom+seg, mas estrutura aceita qualquer combinação.
    // Usado pelo banner "o que perdeu" + tela "bem-vinda de volta" (Fase 2).
    function isExecutoraEmFolga(executora, dateRef) {
      if (!executora || !Array.isArray(executora.diasDescanso) || executora.diasDescanso.length === 0) return false;
      const ref = dateRef || new Date();
      const dias = ['dom','seg','ter','qua','qui','sex','sab'];
      return executora.diasDescanso.indexOf(dias[ref.getDay()]) >= 0;
    }

    // Defaults no read pra cards v1.5.1+ — cards antigos (sem origin/postedAt/
    // isReference/createdByRole/lastAdjustmentId/videoUrl) continuam válidos. Aplicar
    // na borda evita undefined espalhado pelo render.
    // v1.5.4 (Sprint S2.6): videoUrl adicionado pra cards com vídeo no Storage.
    function applyV151Defaults(card) {
      if (!card) return card;
      return Object.assign({}, card, {
        origin:           card.origin           != null ? card.origin           : 'pauta',
        postedAt:         card.postedAt         != null ? card.postedAt         : null,
        isReference:      card.isReference      != null ? card.isReference      : false,
        createdByRole:    card.createdByRole    != null ? card.createdByRole    : ROLES.MASTER,
        lastAdjustmentId: card.lastAdjustmentId != null ? card.lastAdjustmentId : null,
        videoUrl:         card.videoUrl         != null ? card.videoUrl         : ''
      });
    }

    // Aplica defaults em todo o objeto de cards (forma do listener).
    function applyV151DefaultsBulk(cardsObj) {
      if (!cardsObj || typeof cardsObj !== 'object') return cardsObj;
      const out = {};
      for (const k in cardsObj) {
        if (Object.prototype.hasOwnProperty.call(cardsObj, k)) {
          out[k] = applyV151Defaults(cardsObj[k]);
        }
      }
      return out;
    }

    // Status efetivo do card considerando postedAt (v1.5.1) — não substitui
    // getCardEffectiveApproval, ENVOLVE. Retorna 'posted' quando postedAt!=null,
    // delega pro original em todo resto. Usar este pra renderização Hub Jamily
    // (separar "aprovado pronto pra postar" de "já postado").
    function getCardEffectiveStatus(card) {
      if (card && card.postedAt) return 'posted';
      return getCardEffectiveApproval(card);
    }

    // ----- Pauta diária (POV Isabelle edita, POV Jamily lê) -----

    // Lê pauta de uma data específica. null = sem pauta hoje (não é erro).
    async function loadPautaDoDia(slug, dateRef) {
      const ref = dateRef || new Date();
      const ymd = ref.toISOString().slice(0, 10);
      try {
        const snap = await db.ref(ROOT_PATH + '/clients/' + slug + '/pautas/' + ymd).once('value');
        return snap.val();
      } catch (e) {
        return null;
      }
    }

    // Pra tela 7 do wireframe (POV Isabelle — pauta + histórico das últimas 3).
    async function loadPautaUltimas3(slug) {
      return loadPautaUltimasN(slug, 3);
    }

    // Generic — POV Isabelle usa N=3; POV Jamily aba Histórico usa N=10.
    async function loadPautaUltimasN(slug, n) {
      try {
        const snap = await db.ref(ROOT_PATH + '/clients/' + slug + '/pautas')
          .orderByKey().limitToLast(n || 10).once('value');
        return snap.val() || {};
      } catch (e) {
        return {};
      }
    }

    // ----- Galeria (C5) -----

    // Cards marcados como referência (postados + isReference=true).
    // OBSOLETO desde C5.1 (v1.5.2): Galeria agora lê de references/ direto.
    // Mantido por retrocompat caso algum lugar legado chame — pode ser removido
    // em sprint futuro depois de confirmar zero uso.
    function getCardsReferencia() {
      const cards = Object.values((state.clientData && state.clientData.cards) || {});
      return cards
        .filter(c => c && c.postedAt && c.isReference === true)
        .sort((a, b) => (b.postedAt || 0) - (a.postedAt || 0));
    }

    // ----- C5.1 (v1.5.2): Biblioteca de Referências (subárvore separada) -----
    // Referências são cards-exemplo criados pela Isabelle do zero (não cards
    // postados). Schema próprio em references/{refId}. Não passam por fluxo
    // de aprovação. Galeria da Jamily lê daqui.

    // Limites de campos — UI valida antes de submit.
    const REFERENCE_LIMITS = {
      title: 80,
      copy: 500,
      notes: 1000,
      category: 30
    };

    function generateRefId() {
      const rand = Math.random().toString(36).slice(2, 8);
      return `ref_${Date.now()}_${rand}`;
    }

    // Lista de referências do cliente atual, ordenada por createdAt desc
    // (mais recente primeiro — material novo aparece no topo).
    function getReferencesList() {
      const refs = (state.clientData && state.clientData.references) || {};
      return Object.values(refs)
        .filter(r => r && r.id)
        .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
    }

    function getReferenceById(refId) {
      const refs = (state.clientData && state.clientData.references) || {};
      return refs[refId] || null;
    }

    // Salvar referência — create se sem id, update se com id.
    // Sem fluxo de aprovação — autora é a Isabelle, escreve direto.
    function saveReference(fields, existingId) {
      if (!clientRef) { showToast('Cliente não carregado.'); return Promise.reject(); }
      const title = (fields.title || '').trim();
      if (!title) { showToast('Título é obrigatório.'); return Promise.reject(); }
      if (title.length > REFERENCE_LIMITS.title) { showToast(`Título passa de ${REFERENCE_LIMITS.title} chars.`); return Promise.reject(); }
      const copy = (fields.copy || '').trim();
      const notes = (fields.notes || '').trim();
      const pieceTypes = Array.isArray(fields.pieceTypes) ? fields.pieceTypes.filter(Boolean) : [];
      const shotTypes  = Array.isArray(fields.shotTypes)  ? fields.shotTypes.filter(Boolean)  : [];
      const mediaBase64 = typeof fields.mediaBase64 === 'string' ? fields.mediaBase64 : '';
      const videoUrl = typeof fields.videoUrl === 'string' ? fields.videoUrl : '';  // S2.6 Sessão 2

      const now = Date.now();
      const refId = existingId || generateRefId();

      if (existingId) {
        // Update — preserva createdAt/createdBy + category legada (não toca)
        const updates = {
          [`references/${refId}/title`]: title,
          [`references/${refId}/copy`]: copy,
          [`references/${refId}/notes`]: notes,
          [`references/${refId}/pieceTypes`]: pieceTypes,
          [`references/${refId}/shotTypes`]: shotTypes,
          [`references/${refId}/mediaBase64`]: mediaBase64,
          [`references/${refId}/videoUrl`]: videoUrl,
          [`references/${refId}/updatedAt`]: now
        };
        return clientRef.update(updates).then(() => {
          showToast('✓ Referência atualizada');
        }).catch(e => {
          console.warn('[saveReference] update erro:', e);
          showToast('Não consegui salvar. Tenta de novo.');
          throw e;
        });
      } else {
        // Create
        const reference = {
          id: refId,
          title,
          copy,
          notes,
          pieceTypes,
          shotTypes,
          mediaBase64,
          videoUrl,
          createdBy: 'isabelle',
          createdAt: now,
          updatedAt: now
        };
        return clientRef.child(`references/${refId}`).set(reference).then(() => {
          showToast('✓ Referência criada');
        }).catch(e => {
          console.warn('[saveReference] create erro:', e);
          showToast('Não consegui criar. Tenta de novo.');
          throw e;
        });
      }
    }

    function deleteReference(refId) {
      if (!clientRef) { showToast('Cliente não carregado.'); return Promise.reject(); }
      return clientRef.child(`references/${refId}`).remove().then(() => {
        showToast('✓ Referência apagada');
      }).catch(e => {
        console.warn('[deleteReference] erro:', e);
        showToast('Não consegui apagar. Tenta de novo.');
        throw e;
      });
    }


    // C5.2: Galeria redesenhada — lista vertical com 2 dimensões de filtros
    // (peça + plano), expand inline (substitui modal) "como os outros cards".

    // Filtra refs pelos chips ativos. Sem filtros → todas. Com filtros → AND
    // entre dimensões, OR dentro da dimensão (ex: peça=[vestido,blusa] AND
    // plano=[corpo_inteiro] = (vestido OU blusa) E corpo_inteiro).
    function getFilteredReferences() {
      const all = getReferencesList();
      const pf = galeriaState.pieceFilter || [];
      const sf = galeriaState.shotFilter  || [];
      if (pf.length === 0 && sf.length === 0) return all;
      return all.filter(r => {
        const pieces = Array.isArray(r.pieceTypes) ? r.pieceTypes : [];
        const shots  = Array.isArray(r.shotTypes)  ? r.shotTypes  : [];
        const pieceOk = pf.length === 0 || pieces.some(t => pf.includes(t));
        const shotOk  = sf.length === 0 || shots.some(t => sf.includes(t));
        return pieceOk && shotOk;
      });
    }

    function renderGaleriaHTML() {
      // Expand inline: se há refId expandido, renderiza tela cheia da ref.
      if (galeriaState.expandedRefId) {
        return renderGaleriaExpandHTML(galeriaState.expandedRefId);
      }
      const all = getReferencesList();
      if (all.length === 0) {
        return `
          <section class="galeria-empty">
            <div class="galeria-empty-icon">★</div>
            <div class="galeria-empty-title">Nenhuma referência ainda</div>
            <div class="galeria-empty-sub">
              Quando a Isabelle criar referências do padrão Closet, elas aparecem aqui — vira sua coleção de "como deve ficar".
            </div>
          </section>
        `;
      }
      return `
        ${renderGaleriaFiltrosHTML()}
        ${renderGaleriaListaHTML()}
      `;
    }

    function renderGaleriaFiltrosHTML() {
      const pf = galeriaState.pieceFilter || [];
      const sf = galeriaState.shotFilter  || [];
      const hasAnyFilter = pf.length > 0 || sf.length > 0;
      return `
        <div class="galeria-filtros">
          <div class="galeria-filtros-row">
            <div class="galeria-filtros-label">Peça</div>
            <div class="galeria-filtros-chips">
              ${PIECE_TYPES.map(t => `
                <button type="button"
                  class="galeria-filtro-chip ${pf.includes(t.id) ? 'active' : ''}"
                  data-filter-piece="${escapeHtml(t.id)}"
                  aria-pressed="${pf.includes(t.id) ? 'true' : 'false'}">
                  ${escapeHtml(t.label)}
                </button>
              `).join('')}
            </div>
          </div>
          <div class="galeria-filtros-row">
            <div class="galeria-filtros-label">Plano</div>
            <div class="galeria-filtros-chips">
              ${SHOT_TYPES.map(t => `
                <button type="button"
                  class="galeria-filtro-chip ${sf.includes(t.id) ? 'active' : ''}"
                  data-filter-shot="${escapeHtml(t.id)}"
                  aria-pressed="${sf.includes(t.id) ? 'true' : 'false'}">
                  ${escapeHtml(t.label)}
                </button>
              `).join('')}
            </div>
          </div>
          ${hasAnyFilter ? `
            <button type="button" class="galeria-filtros-clear" id="galeria-filtros-clear-btn">
              Limpar filtros
            </button>` : ''}
        </div>
      `;
    }

    function renderGaleriaListaHTML() {
      const filtered = getFilteredReferences();
      const all = getReferencesList();
      const hasFilter = (galeriaState.pieceFilter.length + galeriaState.shotFilter.length) > 0;

      if (filtered.length === 0 && hasFilter) {
        return `
          <div class="galeria-lista-empty">
            <div class="galeria-lista-empty-title">Nenhuma referência com esses filtros</div>
            <div class="galeria-lista-empty-sub">
              Tem ${all.length} ${all.length === 1 ? 'referência' : 'referências'} no total. Tira algum filtro pra ver outras.
            </div>
          </div>
        `;
      }

      return `
        <div class="galeria-lista-header">
          <div class="galeria-lista-count">
            ${filtered.length} ${filtered.length === 1 ? 'referência' : 'referências'}${hasFilter ? ` de ${all.length}` : ''}
          </div>
        </div>
        <div class="galeria-lista">
          ${filtered.map(r => {
            const pieceLabels = (r.pieceTypes || []).map(id => {
              const t = PIECE_TYPES.find(x => x.id === id);
              return t ? t.label : id;
            });
            const shotLabels = (r.shotTypes || []).map(id => {
              const t = SHOT_TYPES.find(x => x.id === id);
              return t ? t.label : id;
            });
            const allTagsHtml = [
              ...pieceLabels.map(l => `<span class="galeria-lista-tag galeria-lista-tag-piece">${escapeHtml(l)}</span>`),
              ...shotLabels.map(l =>  `<span class="galeria-lista-tag galeria-lista-tag-shot">${escapeHtml(l)}</span>`)
            ].join('');
            const notesSnippet = r.notes ? r.notes.slice(0, 120) + (r.notes.length > 120 ? '…' : '') : '';
            // S2.6 Sessão 2: badge 📹 quando ref tem vídeo
            let thumb;
            if (r.videoUrl && r.mediaBase64) {
              thumb = `<img class="galeria-lista-thumb-img" src="${escapeHtml(r.mediaBase64)}" alt="" />
                       <div style="position: absolute; right: 4px; bottom: 4px; background: rgba(0,0,0,0.7); color: #fff; border-radius: 12px; padding: 2px 6px; font-size: 11px; pointer-events: none;">📹</div>`;
            } else if (r.videoUrl) {
              thumb = `<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; background: #1A1A1A; color: #F2F2F2; gap: 4px;">
                         <div style="font-size: 28px;">📹</div>
                         <div style="font-size: 10px; color: #A0A0A0; letter-spacing: 0.5px;">VÍDEO</div>
                       </div>`;
            } else if (r.mediaBase64) {
              thumb = `<img class="galeria-lista-thumb-img" src="${escapeHtml(r.mediaBase64)}" alt="" />`;
            } else {
              thumb = `<div class="galeria-lista-thumb-placeholder">${escapeHtml((r.title || 'R').charAt(0).toUpperCase())}</div>`;
            }
            return `
              <button type="button" class="galeria-lista-item" data-ref-expand="${escapeHtml(r.id)}">
                <div class="galeria-lista-thumb">${thumb}</div>
                <div class="galeria-lista-info">
                  <div class="galeria-lista-title">${escapeHtml(r.title || '(sem título)')}</div>
                  ${allTagsHtml ? `<div class="galeria-lista-tags">${allTagsHtml}</div>` : ''}
                  ${notesSnippet ? `<div class="galeria-lista-notes">${escapeHtml(notesSnippet)}</div>` : ''}
                </div>
                <div class="galeria-lista-chevron">›</div>
              </button>
            `;
          }).join('')}
        </div>
      `;
    }

    function renderGaleriaExpandHTML(refId) {
      const ref = getReferenceById(refId);
      // Ref sumiu (deletada na outra ponta) — volta pra lista
      if (!ref) {
        galeriaState.expandedRefId = null;
        return renderGaleriaHTML();
      }
      const pieceLabels = (ref.pieceTypes || []).map(id => {
        const t = PIECE_TYPES.find(x => x.id === id);
        return t ? t.label : id;
      });
      const shotLabels = (ref.shotTypes || []).map(id => {
        const t = SHOT_TYPES.find(x => x.id === id);
        return t ? t.label : id;
      });
      // S2.6 Sessão 2: vídeo > imagem > placeholder; quando há ambos, mostra os dois
      let imgBlock;
      if (ref.videoUrl) {
        imgBlock = `
          <div class="galeria-expand-media" style="background: #000;">
            <video src="${escapeHtml(ref.videoUrl)}" controls preload="metadata" playsinline style="width: 100%; max-height: 70vh; display: block; background: #000;"></video>
          </div>
          ${ref.mediaBase64
            ? `<div style="margin: 12px 0 0; padding: 12px; background: var(--white, #fff); border: 1px solid var(--border-soft, #eadbe0); border-radius: 12px; display: flex; align-items: center; gap: 12px;">
                 <img src="${escapeHtml(ref.mediaBase64)}" alt="referência" data-img-expand="${escapeHtml(ref.mediaBase64)}" style="width: 64px; height: 64px; object-fit: cover; border-radius: 8px; flex-shrink: 0; cursor: zoom-in;" />
                 <div style="font-size: 13px; color: var(--mauve-text, #A0A0A0);">Imagem de referência</div>
               </div>`
            : ''}
        `;
      } else if (ref.mediaBase64) {
        imgBlock = `<div class="galeria-expand-media">
             <img class="galeria-expand-img" src="${escapeHtml(ref.mediaBase64)}" alt="" data-img-expand="${escapeHtml(ref.mediaBase64)}" />
           </div>`;
      } else {
        imgBlock = `<div class="galeria-expand-media-placeholder">${escapeHtml((ref.title || 'R').charAt(0).toUpperCase())}</div>`;
      }

      const tagsBlock = (pieceLabels.length || shotLabels.length) ? `
        <div class="galeria-expand-tags">
          ${pieceLabels.length ? `
            <div class="galeria-expand-tag-group">
              <div class="galeria-expand-tag-label">Peça</div>
              <div class="galeria-expand-tag-list">
                ${pieceLabels.map(l => `<span class="galeria-expand-tag galeria-expand-tag-piece">${escapeHtml(l)}</span>`).join('')}
              </div>
            </div>` : ''}
          ${shotLabels.length ? `
            <div class="galeria-expand-tag-group">
              <div class="galeria-expand-tag-label">Plano</div>
              <div class="galeria-expand-tag-list">
                ${shotLabels.map(l => `<span class="galeria-expand-tag galeria-expand-tag-shot">${escapeHtml(l)}</span>`).join('')}
              </div>
            </div>` : ''}
        </div>` : '';

      return `
        <div class="galeria-expand-screen">
          <button type="button" class="galeria-expand-back" id="galeria-expand-back-btn">← Voltar pra Galeria</button>
          ${imgBlock}
          <div class="galeria-expand-body">
            <div class="galeria-expand-title">${escapeHtml(ref.title || '(sem título)')}</div>
            ${tagsBlock}
            ${ref.copy ? `
              <div class="galeria-expand-section">

    // ----- Helpers de tempo / janelas (C2) -----

    // Chave de pauta = data ISO do hoje no fuso local (não UTC — pauta é
    // definida em horário Brasil, não UTC).
    function getPautaTodayKey() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    // "há 5 min" / "há 2h" / "há 3d" — pra "última atualização" da pauta
    function formatTimeAgo(ms) {
      if (!ms) return '';
      const diff = Date.now() - ms;
      if (diff < 60000) return 'agora mesmo';
      const mins = Math.floor(diff / 60000);
      if (mins < 60) return `há ${mins} min`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `há ${hours}h`;
      const days = Math.floor(hours / 24);
      return `há ${days}d`;
    }

    // Próxima janela de aprovação considerando agora.
    // Retorna { hora, deltaMinutes, isAgora, isAmanha }.
    // isAgora = janela está ativa (-10min a +30min do horário marcado).
    function getProximaJanela() {
      const janelas = (Array.isArray(janelasAprovacao) && janelasAprovacao.length)
        ? janelasAprovacao : JANELAS_FALLBACK;
      const now = new Date();
      const nowMin = now.getHours() * 60 + now.getMinutes();

      // Procura janela ativa (-10/+30 min) primeiro
      for (const h of janelas) {
        const [hh, mm] = h.split(':').map(Number);
        const jMin = hh * 60 + mm;
        const delta = nowMin - jMin;
        if (delta >= -10 && delta <= 30) {
          return { hora: h, deltaMinutes: 0, isAgora: true, isAmanha: false };
        }
      }
      // Próxima futura no dia de hoje
      for (const h of janelas) {
        const [hh, mm] = h.split(':').map(Number);
        const jMin = hh * 60 + mm;
        if (jMin > nowMin) {
          return { hora: h, deltaMinutes: jMin - nowMin, isAgora: false, isAmanha: false };
        }
      }
      // Passou todas → primeira de amanhã
      const primeira = janelas[0];
      const [hh, mm] = primeira.split(':').map(Number);
      const minutosAteAmanha = (24 * 60 - nowMin) + (hh * 60 + mm);
      return { hora: primeira, deltaMinutes: minutosAteAmanha, isAgora: false, isAmanha: true };
    }

    // Formata "Próxima às 14h · daqui 1h47" / "Janela aberta · 14h" / "Próxima amanhã às 11h"
    function formatProximaJanela(j) {
      const horaSh = j.hora.replace(':00', 'h').replace(':', 'h');
      if (j.isAgora) return `Janela aberta agora · ${horaSh}`;
      if (j.isAmanha) return `Próxima amanhã às ${horaSh}`;
      const h = Math.floor(j.deltaMinutes / 60);
      const m = j.deltaMinutes % 60;
      const delta = h > 0 ? `${h}h${String(m).padStart(2,'0')}` : `${m} min`;
      return `Próxima às ${horaSh} · daqui ${delta}`;
    }

    // ----- Cards de delegação (C2) -----

    // Fix C3 bugfix (2026-05-15): filtra direto por status+postedAt+createdByRole
    // ao invés de delegar pra getCardEffectiveStatus, porque essa função tem
    // early return em status='published' (legado v1) que não distinguia
    // "aprovado pronto pra postar" de "postado". O filtro abaixo escopa o Hub
    // ao universo da executora interna — cards legados do Closet criados pela
    // Isabelle no fluxo tradicional NÃO entram aqui, evitando poluição visual.
    function getCardsAprovadosPraPostar() {
      const cards = Object.values((state.clientData && state.clientData.cards) || {});
      return cards
        .filter(c =>
          c &&
          c.status === 'published' &&
          !c.postedAt &&
          c.createdByRole === ROLES.EXECUTORA_INTERNA
        )
        .sort((a, b) => (a.sentForReviewAt || a.updatedAt || 0) - (b.sentForReviewAt || b.updatedAt || 0));
    }

    // Fix C3 bugfix (2026-05-15): todos os 3 contadores escopados ao universo
    // executora interna (createdByRole) — Hub é a visão da Jamily, não vaza
    // cards legados criados pela Isabelle no fluxo tradicional.
    function getHubStats() {
      const cards = Object.values((state.clientData && state.clientData.cards) || {});
      const todayKey = getPautaTodayKey();
      const delegacaoCards = cards.filter(c => c && c.createdByRole === ROLES.EXECUTORA_INTERNA);
      const aprovados = delegacaoCards.filter(c => c.status === 'published' && !c.postedAt).length;
      const naFila = delegacaoCards.filter(c => c.status === 'review').length;
      const postadosHoje = delegacaoCards.filter(c => {
        if (!c.postedAt) return false;
        const d = new Date(c.postedAt);
        const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        return k === todayKey;
      }).length;
      // C4.1: cards da executora com ajuste pendente (lastAdjustmentId && !resolved).
      // Conta cards "review" do universo executora cujo lastAdjustment ainda não foi
      // resolvido. Esses cards estão escondidos da Fila Bulk até serem reenviados.
      const paraRefazer = delegacaoCards.filter(c => c.status === 'review' && isCardComAjustePendente(c)).length;
      return { aprovados, naFila, postadosHoje, paraRefazer };
    }
