    // Alias temporário pra qualquer chamada legada. Remover quando o app inteiro migrar.
    function renderUserPicker() { return renderPersonaPicker(); }

    // Trilha D / D2: renderWelcome (welcome screen com tagline + bullets) era
    // dead code não chamado em lugar nenhum, e ainda lia state.data.campaign.tagline
    // (schema antigo, hoje quebrado). Removido. O welcome ativo do v1.5 é o
    // renderPersonaPicker. Se um dia precisar de welcome com tagline+CTA por
    // cliente, ressuscitar do git lendo de state.clientData.meta.tagline.

    function greetingByHour() {
      const h = new Date().getHours();
      if (h < 12) return 'Bom dia';
      if (h < 18) return 'Boa tarde';
      return 'Boa noite';
    }

    // ============================================================
    // VISÃO 360 — chips de filtro por persona (Área 7b)
    // ============================================================
    // Renderiza a linha de chips coloridos. Cada chip é um botão; estado "is-hidden"
    // = aquela persona está escondida no momento (presente em state.personaFilter).
    function renderPersonaFilters() {
      const personas = Object.values(state.clientData?.personas || {})
        .filter(p => p.active !== false)
        .sort((a, b) => (a.order || 0) - (b.order || 0));
      if (personas.length === 0) return '';
      return `
        <div class="persona-filters" data-persona-filters>
          ${personas.map(p => {
            const hidden = state.personaFilter.has(p.id);
            return `
              <button class="persona-chip ${hidden ? 'is-hidden' : ''}"
                      data-persona="${escapeAttr(p.id)}"
                      style="--chip-color: var(--persona-${p.id});">
                <span class="persona-chip-dot"></span>
                <span class="persona-chip-name">${escapeHtml(p.name)}</span>
              </button>
            `;
          }).join('')}
        </div>
      `;
    }

    // Liga o click dos chips ao toggle do filtro. Re-renderiza a home aplicando o novo Set.
    function bindPersonaFilters(root) {
      root.querySelectorAll('.persona-chip').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.getAttribute('data-persona');
          if (!id) return;
          if (state.personaFilter.has(id)) state.personaFilter.delete(id);
          else state.personaFilter.add(id);
          renderHome();   // re-render aplicando o filtro novo
        });
      });
    }

    // Aplica state.personaFilter a uma lista de cards. Vazio = passthrough.
    function filterCardsByPersona(cards) {
      if (!state.personaFilter || state.personaFilter.size === 0) return cards;
      return cards.filter(c => !state.personaFilter.has(c.personaId));
    }

    // ============================================================
    // RENDER — Home
    // ============================================================
    function renderHome() {
      state.viewer = 'home';
      state.currentCardId = null;

      const persona = state.clientData.personas[state.currentPersonaId];
      // HARD-LITE: days do cliente em ordem cronológica (sem sprint).
      const days = getAllDaysOfClient();
      const day = getCurrentDay();
      // Empty state: sprint sem days OU currentDayId não casa com nenhum day do sprint.
      if (!day) { renderHomeEmpty(persona); return; }
      const blocks = getBlocksOfDay(day.id);

      const allCards = Object.values(state.data.cards || {});
      // PARTE 2 — Visão 360: timeline mostra TODOS os cards do day, não só da persona logada.
      const dayCardsAll = allCards.filter(c => c.dayId === day.id);
      // PARTE 3 — Visão 360: aplica filtro de persona escolhido pela user via chips.
      const dayCards = filterCardsByPersona(dayCardsAll);
      // Pendência segue contando sobre os VISÍVEIS (coerente com o que a user enxerga).
      const totalPending = dayCards.filter(c => !isCardCompleted(c)).length;

      const app = document.getElementById('app');
      app.classList.remove('editor-view');
      app.innerHTML = `
        <div class="home-header">
          <div class="home-kicker">${escapeHtml(getDayDisplayLabel(day))} · ${formatDate(day.date)}</div>
          <div class="home-greeting">${renderGreetingHtml(state.clientData && state.clientData.branding && state.clientData.branding.saudacao, persona.name)}</div>
          <div class="home-pendentes">${pendentesCopy(totalPending, dayCards.length)}</div>
        </div>

        ${renderPersonaFilters()}

        <div class="day-switcher">
          ${days.map(d => `
            <button class="day-tab ${d.id === day.id ? 'active' : ''}" data-day="${d.id}">
              ${escapeHtml(getDayDisplayLabel(d))}
              <span class="day-tab-date">${formatDateShort(d.date)}</span>
            </button>
          `).join('')}
        </div>

        <div class="blocks-list">
          ${blocks.map(b => renderBlockSection(b, dayCards)).join('')}
        </div>

        ${renderBottomNavViewer()}
      `;

      app.querySelectorAll('.day-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          state.currentDayId = tab.getAttribute('data-day');
          renderHome();
        });
      });

      app.querySelectorAll('.home-card').forEach(card => {
        card.addEventListener('click', () => {
          const cardId = card.getAttribute('data-card');
          state.currentCardId = cardId;
          state.viewer = 'card';
          renderCardView();
          // Área 14 Tipo 2: marca card como "visto" pela persona logada (no viewer).
          // M3 híbrido — futuros votos com updatedAt > este timestamp reativam o badge.
          // O guard state.viewer='card' setado acima impede o listener Firebase
          // principal de re-renderizar a home (e fechar o card view) quando essa
          // escrita disparar on('value'). Lazy create — sem migration.
          if (clientRef && state.currentPersonaId) {
            clientRef.child('notifications/' + state.currentPersonaId + '/lastSeenAt/' + cardId)
              .set(Date.now())
              .catch(e => console.warn('[Tipo 2 lastSeenAt set falhou]', e));
          }
        });
      });

      bindPersonaFilters(app);
      bindBottomNavViewer(app);
    }

    // Empty state da home quando o cliente não tem nenhum day cadastrado.
    function renderHomeEmpty(persona) {
      const clientName = (state.clientData && state.clientData.meta && state.clientData.meta.name) || 'Cliente';
      const app = document.getElementById('app');
      app.classList.remove('editor-view');
      app.innerHTML = `
        <div class="home-header">
          <div class="home-kicker">${escapeHtml(clientName)}</div>
          <div class="home-greeting">${renderGreetingHtml(state.clientData && state.clientData.branding && state.clientData.branding.saudacao, persona ? persona.name : '')}</div>
        </div>
        <div style="padding: 48px 24px; text-align: center; color: var(--mauve-text);">
          <div style="font-size: 14px; line-height: 1.5; max-width: 280px; margin: 0 auto;">
            Nenhum dia de produção cadastrado ainda.<br>
            Aguarde a Isabelle cadastrar o primeiro dia.
          </div>
        </div>
        ${renderBottomNavViewer()}
      `;
      bindBottomNavViewer(app);
    }

    function pendentesCopy(pending, total) {
      if (total === 0) return 'Sem pauta neste dia ainda.';
      if (pending === 0) return 'Tudo concluído por aqui.';
      if (pending === 1) return 'Você tem 1 conteúdo pendente.';
      return `Você tem ${pending} conteúdos pendentes.`;
    }

    // Área 9: alias de compat. "completed" no v1.5 = status efetivo == 'published'
    // (verdade objetiva da Celulose entregou; usado pra cálculos de progresso de bloco/dia).
    function isCardCompleted(card) {
      return getCardEffectiveApproval(card) === 'published';
    }

    function renderBlockSection(b, dayCards) {
      const blockCards = dayCards
        .filter(c => c.blockId === b.id)
        .sort((a, b) => (a.order || 999) - (b.order || 999));

      const completed = blockCards.filter(c => isCardCompleted(c)).length;
      const total = blockCards.length;
      const pct = total > 0 ? (completed / total) * 100 : 0;
      const isMeal = b.kind === 'meal';
      const isPause = b.kind === 'pause';
      const klass = ['block-section'];
      if (isMeal) klass.push('is-meal');
      if (isPause) klass.push('is-pause');
      if (isCurrentBlock(b)) klass.push('is-active');

      const territoryLabel = b.territoryCategory ? b.territoryCategory : (b.kind === 'shoot' ? 'a definir' : '');

      return `
        <div class="${klass.join(' ')}" data-block="${b.id}" id="block-${b.id}">
          <div class="block-row-top">
            <div class="block-time">${b.timeStart}–${b.timeEnd}</div>
            <div style="display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: flex-end;">
              ${territoryLabel ? `<div class="block-territory">${escapeHtml(territoryLabel)}</div>` : ''}
              ${b.heroPiece && clientHasHeroPiece() ? `<div class="block-hero-pill">${escapeHtml(b.heroPiece)}</div>` : ''}
            </div>
          </div>
          <div class="block-title">${escapeHtml(b.label)}</div>
          ${b.locationSpecific ? `<div class="block-location">→ ${escapeHtml(b.locationSpecific)}</div>` : ''}
          ${b.note ? `<div class="block-location" style="font-style: italic;">${escapeHtml(b.note)}</div>` : ''}
          ${total > 0 ? `
            <div class="block-progress-row">
              <div class="block-progress-bar">
                <div class="block-progress-fill ${completed === total ? 'is-complete' : ''}" style="width: ${pct}%"></div>
              </div>
              <div class="block-count">${completed}/${total}</div>
            </div>
            <div class="card-list">
              ${blockCards.map(c => renderHomeCard(c)).join('')}
            </div>
          ` : `
            <div class="block-empty-hint">${isMeal || isPause ? 'sem captação obrigatória' : 'sem cards ainda'}</div>
          `}
        </div>
      `;
    }

    function renderHomeCard(c) {
      const effective = getCardEffectiveApproval(c);
      const myApproval = getCardApprovalForPersona(c, state.currentPersonaId);
      const prio = (c.priority || 'Média').toLowerCase().replace('é', 'e');
      const klass = ['home-card', 'is-state-' + effective];
      if (effective === 'published') klass.push('is-completed'); // compat com CSS antigo
      // Área 14 Tipo 2: votos não-vistos pelo dono do card (badge mauve no canto sup direito).
      const unreadVotes = getUnreadVoteCount(c);
      if (unreadVotes > 0) klass.push('has-unread-votes');
      // Área 14 Tipo 5: ajuste feito pela Isabelle pendente de revisão (badge verde sup esq).
      const adjustmentDone = getAdjustmentDoneCount(c);
      if (adjustmentDone > 0) klass.push('has-adjustment');
      // Pílula de papel — Você executa / Bruna executa / Isa produz (resolve confusão dona/aprovadora).
      const rolePill = getCardRolePill(c);
      // Indicador no canto direito por estado efetivo.
      let stateIcon = '';
      if (effective === 'published') stateIcon = '<span class="home-card-state-icon is-published" title="Publicado">✓</span>';
      else if (effective === 'approved') stateIcon = '<span class="home-card-state-icon is-approved" title="Todas aprovaram">✓</span>';
      else if (effective === 'requested_changes') stateIcon = '<span class="home-card-state-icon is-changes" title="Pediram ajuste">!</span>';
      else if (effective === 'in_progress') stateIcon = '<span class="home-card-state-icon is-progress" title="Em aprovação">…</span>';
      else if (effective === 'pending') stateIcon = '<span class="home-card-state-icon is-pending" title="Pendente">·</span>';
      else if (effective === 'draft') stateIcon = '<span class="home-card-state-icon is-draft" title="Rascunho">✎</span>';
      // Marker do voto da persona logada (se já votou).
      let myVote = '';
      if (myApproval === 'approved') myVote = '<span class="home-card-myvote is-approved">aprovado por você</span>';
      else if (myApproval === 'requested_changes') myVote = '<span class="home-card-myvote is-changes">você pediu ajuste</span>';
      return `
        <div class="${klass.join(' ')}" data-card="${c.id}">
          <div class="home-card-prio is-${prio}"></div>
          <div class="home-card-body">
            <div class="home-card-meta">
              ${rolePill}
              ${c.format ? `<span class="home-card-pill">${escapeHtml(c.format)}</span>` : ''}
              ${c.timeSlot ? `<span class="home-card-time">${escapeHtml(c.timeSlot)}</span>` : ''}
              ${myVote}
            </div>
            <div class="home-card-title">${escapeHtml(c.title || '(sem título)')}</div>
          </div>
          <div class="home-card-check">${stateIcon}</div>
          ${unreadVotes > 0 ? `<div class="home-card-vote-badge">${unreadVotes}</div>` : ''}
          ${adjustmentDone > 0 ? `<div class="home-card-adjustment-badge" title="Isabelle ajustou — confira e revote"></div>` : ''}
        </div>
      `;
    }

    function isCurrentBlock(b) {
      const day = getCurrentDay();
      if (!day) return false;
      const today = new Date().toISOString().slice(0, 10);
      if (day.date !== today) return false;
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
      return hh >= b.timeStart && hh < b.timeEnd;
    }

    // ============================================================
    // RENDER — Card view (tela expandida)
    // ============================================================
    function renderCardView() {
      const c = state.data.cards[state.currentCardId];
      if (!c) {
        renderHome();
        return;
      }

      const day = state.clientData.days?.[c.dayId];
      const block = day?.blocks?.[c.blockId];
      if (!day || !block) { renderHome(); return; }

      // Área 9: estado do card e da persona logada.
      const cardStatus = getCardStatus(c);                          // 'draft' | 'review' | 'published'
      const myApproval = getCardApprovalForPersona(c, state.currentPersonaId); // 'pending'|'approved'|'requested_changes'|null
      const effective = getCardEffectiveApproval(c);
      const isPublished = cardStatus === 'published';
      const isInReview = cardStatus === 'review';
      const canVote = isInReview && (myApproval === 'pending' || myApproval == null);
      const alreadyVoted = isInReview && (myApproval === 'approved' || myApproval === 'requested_changes');

      const checklist = c.checklist || [];
      const checklistState = loadChecklistDraft(c.id);
      const checkedCount = checklist.filter(item => checklistState[item.id]).length;
      const allChecked = checklist.length > 0 && checkedCount === checklist.length;

      const prio = (c.priority || 'Média').toLowerCase().replace('é', 'e');

      // Hero hint dinâmico por estado.
      let heroHint = '';
      if (isPublished) heroHint = '';
      else if (cardStatus === 'draft') heroHint = 'em rascunho com a celulose';
      else if (canVote) heroHint = '2 toques pra aprovar';
      else if (myApproval === 'approved') heroHint = 'aprovado por você';
      else if (myApproval === 'requested_changes') heroHint = 'você pediu ajuste';

      // Área 10: preserva texto do textarea de comments durante re-renders
      // disparados pelo listener do clientData (ex: outra persona aprovou).
      const previousComposeEl = document.getElementById('viewer-comment-compose-input');
      const previousComposeText = previousComposeEl ? previousComposeEl.value : '';

      // Área 14 Caminho C — Tipo 5: banner ✦ "Isabelle ajustou" quando persona logada
      // tem ajuste resolvido pelo editor pendente de revisão (state=pending E
      // resolvedByEditorAt E havia notes anterior).
      const myApprovalEntry = c.approvalByPersona && c.approvalByPersona[state.currentPersonaId];
      const showRevisaoBanner = state.mode === 'viewer'
        && myApprovalEntry
        && myApprovalEntry.state === 'pending'
        && myApprovalEntry.resolvedByEditorAt
        && myApprovalEntry.notes;
      const revisaoBannerHtml = showRevisaoBanner
        ? `<div class="card-revisao-banner">
             <span class="card-revisao-banner-icon">✦</span>
             <span><strong>Isabelle ajustou.</strong> Confira o conteúdo e revote.</span>
           </div>`
        : '';

      const app = document.getElementById('app');
      app.classList.remove('editor-view');
      app.innerHTML = `
        <div class="card-view">
          <div class="card-view-header">
            <button class="card-back" id="card-back-btn">←</button>
            <div class="card-view-title-row">
              <div class="card-view-block">${escapeHtml(block.label)} · ${block.timeStart}–${block.timeEnd}</div>
              <div class="card-view-greeting">${escapeHtml(getDayDisplayLabel(day))} · ${formatDate(day.date)}</div>
            </div>
          </div>

          <div class="card-view-body">
            <div class="card-hero is-state-${effective} ${canVote ? 'is-armed' : ''} ${isPublished ? 'is-completed' : ''}" id="card-hero" ${(c.videoUrl || c.referenceImage) ? 'data-has-image="1"' : ''}>
              ${c.videoUrl
                ? `<video src="${escapeHtml(c.videoUrl)}" controls preload="metadata" playsinline style="width: 100%; height: 100%; object-fit: cover; display: block; background: #000;"></video>`
                : (c.referenceImage
                    ? `<img src="${c.referenceImage}" alt="referência">`
                    : `<div class="card-hero-empty">Sem referência visual</div>`)
              }
              ${heroHint ? `<div class="card-hero-overlay-hint">${escapeHtml(heroHint)}</div>` : ''}
              <div class="card-heart" id="card-heart">♥</div>
            </div>
            ${c.videoUrl && c.referenceImage
              ? `<div style="margin: 12px 0 0; padding: 12px; background: var(--card-bg, #1A1A1A); border-radius: 12px; display: flex; align-items: center; gap: 12px;">
                   <img src="${c.referenceImage}" alt="referência" style="width: 64px; height: 64px; object-fit: cover; border-radius: 8px; flex-shrink: 0;" />
                   <div style="font-size: 13px; color: var(--text-secondary, #A0A0A0);">Imagem de referência</div>
                 </div>`
              : ''
            }

            <div class="card-role-row">
              ${getCardRolePill(c)}
            </div>

            <div class="card-meta-row">
              ${c.format ? `<span class="card-meta-pill">${escapeHtml(c.format)}</span>` : ''}
              ${c.type ? `<span class="card-meta-pill">${escapeHtml(c.type)}</span>` : ''}
              ${c.priority ? `<span class="card-meta-pill is-prio-${prio}">${escapeHtml(c.priority)}</span>` : ''}
              ${c.timeSlot ? `<span class="card-meta-pill">${escapeHtml(c.timeSlot)}</span>` : ''}
            </div>

            <div class="card-title-big">${escapeHtml(c.title || '(sem título)')}</div>

            ${revisaoBannerHtml}

            ${renderApprovalActionBlock(c, cardStatus, myApproval, canVote, alreadyVoted, isPublished)}

            ${renderApprovalsByPersonaBlock(c)}

            <!-- Atrito 2A: render condicional dos 3 campos de texto livre.
                 Campo vazio = section não aparece no card final. -->
            ${c.objective ? `
              <div class="card-section">
                <div class="card-section-label">Objetivo do conteúdo</div>
                <div class="card-section-text">${escapeHtml(c.objective)}</div>
              </div>
            ` : ''}

            ${c.caption ? `
              <div class="card-section">
                <div class="card-section-label">Legenda</div>
                <div class="card-section-text">${escapeHtml(c.caption)}</div>
              </div>
            ` : ''}

            ${c.topics ? `
              <div class="card-section">
                <div class="card-section-label">Tópicos</div>
                <div class="card-section-text" style="white-space: pre-line;">${escapeHtml(c.topics)}</div>
              </div>
            ` : ''}

            ${checklist.length > 0 ? `
              <div class="check-list-viewer">
                <div class="check-list-viewer-title">Checklist do card</div>
                ${checklist.map(item => `
                  <div class="check-row ${checklistState[item.id] ? 'is-checked' : ''}" data-item="${item.id}">
                    <div class="check-box">${checklistState[item.id] ? '✓' : ''}</div>
                    <div class="check-text">${escapeHtml(item.label)}</div>
                  </div>
                `).join('')}
                <div class="check-progress">
                  <div class="check-progress-bar">
                    <div class="check-progress-fill ${allChecked ? 'is-complete' : ''}" style="width: ${(checkedCount / checklist.length) * 100}%"></div>
                  </div>
                  <div class="check-progress-text">${checkedCount}/${checklist.length}</div>
                </div>
              </div>
            ` : ''}

            <div class="modal-comments" data-card-id="${escapeAttr(c.id)}">
              <h3 class="modal-comments-title">Conversa</h3>
              <div class="comment-thread-list" id="viewer-comment-thread-list">
                <div class="comment-thread-empty">Sem comments ainda.</div>
              </div>
              <div class="comment-compose">
                <textarea
                  class="comment-compose-input"
                  id="viewer-comment-compose-input"
                  placeholder="Escreve um comentário…"
                  rows="2"
                ></textarea>
                <button class="comment-compose-submit" id="viewer-comment-compose-submit" type="button" disabled>Enviar</button>
              </div>
            </div>
          </div>

          ${renderBottomNavCardExpanded()}
        </div>
      `;

      // back button
      document.getElementById('card-back-btn').addEventListener('click', () => {
        // Área 10: detach do listener de comments antes de sair do card.
        detachCommentsListener();
        state.viewer = 'home';
        state.currentCardId = null;
        renderHome();
      });

      // checklist toggle (Área 9: sem gate; persona pode marcar livre — é organização própria)
      app.querySelectorAll('.check-row').forEach(row => {
        row.addEventListener('click', () => {
          if (isPublished) return;
          const itemId = row.getAttribute('data-item');
          const draft = loadChecklistDraft(c.id);
          draft[itemId] = !draft[itemId];
          saveChecklistDraft(c.id, draft);
          renderCardView();
        });
      });

      // hero double-tap = approve (se elegível) ou fullscreen
      const hero = document.getElementById('card-hero');
      bindCardHero(hero, c, canVote);

      // A.4: botão "Aprovar" removido — aprovação acontece via double-tap no hero
      // (bindCardHero acima). Só sobrou "Pedir ajuste" no bloco de ação.
      const requestBtn = document.getElementById('btn-request-changes');
      if (requestBtn) {
        requestBtn.addEventListener('click', () => openRequestChangesSheet(c));
      }
      const switchVoteBtn = document.getElementById('btn-switch-vote');
      if (switchVoteBtn) {
        switchVoteBtn.addEventListener('click', () => {
          const ok = confirm('Trocar seu voto neste card?');
          if (!ok) return;
          clientRef.child('cards/' + c.id + '/approvalByPersona/' + state.currentPersonaId).remove().then(() => {
            showToast('Voto removido');
          });
        });
      }

      // ===== Área 10: comments no viewer =====
      const composeInput = document.getElementById('viewer-comment-compose-input');
      const composeSubmit = document.getElementById('viewer-comment-compose-submit');
      if (composeInput && composeSubmit) {
        // Restaura texto preservado de um re-render anterior (ex: outra persona aprovou enquanto a user digitava).
        if (previousComposeText) composeInput.value = previousComposeText;
        const updateSubmitState = () => {
          composeSubmit.disabled = composeInput.value.trim().length === 0;
        };
        updateSubmitState();
        composeInput.addEventListener('input', updateSubmitState);
        const doPost = () => {
          const text = composeInput.value;
          if (!text.trim()) return;
          composeSubmit.disabled = true;
          postComment(c.id, text)
            .then(() => {
              composeInput.value = '';
              updateSubmitState();
            })
            .catch(err => {
              showToast('Falhou: ' + (err && err.message ? err.message : 'erro'));
              updateSubmitState();
            });
        };
        composeSubmit.addEventListener('click', doPost);
        composeInput.addEventListener('keydown', (e) => {
          if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
            e.preventDefault();
            doPost();
          }
        });
        attachCommentsListener(c.id, 'viewer-comment-thread-list');
      }

      bindBottomNavCardExpanded(app);
    }

    // Bloco de ação por estado — Área 9.
    function renderApprovalActionBlock(c, cardStatus, myApproval, canVote, alreadyVoted, isPublished) {
      if (isPublished) {
        return `<div class="card-approval-block is-published">
          <div class="card-approval-banner">✓ Conteúdo publicado</div>
        </div>`;
      }
      if (cardStatus === 'draft') {
        return `<div class="card-approval-block is-draft">
          <div class="card-approval-hint">Esse card ainda está em rascunho com a Celulose. Você verá os botões de aprovação quando ele for enviado.</div>
        </div>`;
      }
      // status === 'review'
      // A.4: botão "Aprovar" removido — aprovação acontece via double-tap no hero
      // (sistema bindCardHero já estava implementado). Só fica "Pedir ajuste" abaixo.
      // O hint "2 toques pra aprovar" sobre a imagem do hero educa o gesto.
      // A.4.1: variant `is-vote-soft` — enxuta, texto + botão em linha, sem
      // uppercase, fundo --white (consistente em qualquer paleta cliente).
      if (canVote) {
        return `<div class="card-approval-block is-vote-soft">
          <div class="card-approval-question-soft">Quer pedir um ajuste?</div>
          <button class="card-request-btn-soft" id="btn-request-changes">Pedir ajuste</button>
        </div>`;
      }
      if (alreadyVoted && myApproval === 'approved') {
        return `<div class="card-approval-block is-approved">
          <div class="card-approval-banner">✓ Aprovado por você</div>
          <button class="card-switch-vote-btn" id="btn-switch-vote">Trocar voto</button>
        </div>`;
      }
      if (alreadyVoted && myApproval === 'requested_changes') {
        return `<div class="card-approval-block is-changes">
          <div class="card-approval-banner">↩ Você pediu ajuste</div>
          <button class="card-switch-vote-btn" id="btn-switch-vote">Trocar voto</button>
        </div>`;
      }
      return '';
    }

    // Bloco "Aprovações por persona" — Área 9.
    // Avatares circulares com cor da persona (var(--persona-*)) + estado de cada voto.
    // Pendente fica dashed border + opacity 0.6 (visualmente diferenciado).
    // Renderiza em review/published; oculta em draft (ainda não há votos).
    function renderApprovalsByPersonaBlock(card) {
      const cardStatus = getCardStatus(card);
      if (cardStatus !== 'review' && cardStatus !== 'published') return '';
      const personas = getVotingPersonas();
      if (personas.length === 0) return '';
      const approvals = (card && card.approvalByPersona) || {};
      const approvedCount = personas.filter(p => approvals[p.id] && approvals[p.id].state === 'approved').length;
      const changesCount = personas.filter(p => approvals[p.id] && approvals[p.id].state === 'requested_changes').length;
      const total = personas.length;
      const isEditor = state.mode === 'editor';

      return `
        <div class="card-approvals-block">
          <div class="card-approvals-title">
            Aprovações por persona
            <span class="card-approvals-count">${approvedCount}/${total} aprovaram${changesCount ? ` · ${changesCount} pediu ajuste` : ''}</span>
          </div>
          <div class="card-approvals-list">
            ${personas.map(p => {
              const a = approvals[p.id];
              const stateName = a && a.state ? a.state : 'pending';
              const wasResolved = !!(a && a.resolvedByEditorAt);
              const hasNotes = !!(a && a.notes);
              const reply = a && a.editorReply;
              const hasReply = !!(reply && reply.text);

              let stateLabel = 'pendente';
              let stateClass = '';
              if (stateName === 'approved') stateLabel = 'aprovou';
              else if (stateName === 'requested_changes') stateLabel = 'pediu ajuste';
              else if (stateName === 'pending' && wasResolved) {
                stateLabel = '✦ aguardando revisão';
                stateClass = ' is-resolved';
              }

              const klass = ['approval-row', `is-${stateName}`];
              const initial = (p.name || '·').trim().charAt(0);

              // Mostra nota original em qualquer cenário onde havia pedido ativo
              // OU foi resolvido (preserva contexto histórico pro próximo round).
              const showNote = hasNotes && (stateName === 'requested_changes' || wasResolved);
              const noteHtml = showNote
                ? `<div class="approval-note-snippet">"${escapeHtml(String(a.notes).slice(0, 120))}${a.notes.length > 120 ? '…' : ''}"</div>`
                : '';

              // Réplica da Isabelle — visível pra TODOS (editor lê pra editar; viewer lê
              // pra entender). Vínculo SD-Réplica=A: inline na approval-row da persona.
              const replyHtml = hasReply
                ? `<div class="approval-reply-display">
                     <div class="approval-reply-display-label">Resposta da Isabelle</div>
                     ${escapeHtml(reply.text)}
                   </div>`
                : '';

              // Botões inline + form de réplica — só editor, só rows requested_changes.

    // Wire-up dos botões da approval-row (editor only). Chamado após renderCardModal.
    // Lida com: resolve-adjustment, reply-toggle, reply-cancel, reply-save.
    function bindApprovalRowActions(rootEl) {
      if (!rootEl) return;
      rootEl.querySelectorAll('.approval-action-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const action = btn.getAttribute('data-action');
          const cardId = btn.getAttribute('data-card');
          const personaId = btn.getAttribute('data-persona');
          if (action === 'resolve-adjustment') {
            const ok = confirm('Marcar como ajustado? A persona vai receber sinal pra revisar e revotar.');
            if (!ok) return;
            markAdjustmentDone(cardId, personaId).then(() => {
              // Listener principal tem guard `if (modalState.open) return`, então modal
              // NÃO re-renderiza sozinho. Sync manual do draft local + force re-render
              // pra refletir o novo state visual ('✦ aguardando revisão' em vez dos botões).
              if (modalState.draft && modalState.draft.id === cardId) {
                if (!modalState.draft.approvalByPersona) modalState.draft.approvalByPersona = {};
                const prev = modalState.draft.approvalByPersona[personaId] || {};
                const now = Date.now();
                modalState.draft.approvalByPersona[personaId] = Object.assign({}, prev, {
                  state: 'pending',
                  resolvedByEditorAt: now,
                  updatedAt: now
                });
                renderCardModal();
              }
              showToast('Ajuste registrado. Persona vai ver o sinal.');
            }).catch(err => showToast('Falhou: ' + (err && err.message ? err.message : 'erro')));
          } else if (action === 'reply-toggle') {
            const form = rootEl.querySelector(`[data-reply-form="${personaId}"]`);
            if (!form) return;
            const isOpen = form.style.display !== 'none';
            form.style.display = isOpen ? 'none' : 'flex';
            if (!isOpen) {
              const ta = form.querySelector('.approval-reply-textarea');
              if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
            }
          } else if (action === 'reply-cancel') {
            const form = rootEl.querySelector(`[data-reply-form="${personaId}"]`);
            if (form) form.style.display = 'none';
          } else if (action === 'reply-save') {
            const ta = rootEl.querySelector(`[data-reply-textarea="${personaId}"]`);
            const text = ta ? ta.value.trim() : '';
            if (!text) { showToast('Escreve a resposta antes de salvar.'); return; }
            replyToApproval(cardId, personaId, text).then(() => {
              // Mesmo fix: sync draft + re-render pra mostrar a réplica salva.
              if (modalState.draft && modalState.draft.id === cardId) {
                if (!modalState.draft.approvalByPersona) modalState.draft.approvalByPersona = {};
                const prev = modalState.draft.approvalByPersona[personaId] || {};
                modalState.draft.approvalByPersona[personaId] = Object.assign({}, prev, {
                  editorReply: { text: String(text), repliedAt: Date.now() }
                });
                renderCardModal();
              }
              showToast('Resposta enviada.');
            }).catch(err => showToast('Falhou: ' + (err && err.message ? err.message : 'erro')));
          }
        });
      });
    }

    // Área 9: hero com double-tap = aprovar (se elegível) ou fullscreen.
    // canVote: card está em review E persona logada está pending (ou sem voto).
    function bindCardHero(hero, card, canVote) {
      let lastTap = 0;
      let singleTimer = null;
      let actionTakenAt = 0;

      const tryAction = () => {
        // Anti double-disparo: no mobile, touchend custom E dblclick nativo
        // disparam pro mesmo gesto. Ignora actions dentro de 500ms.
        const now = Date.now();
        if (now - actionTakenAt < 500) return;
        actionTakenAt = now;

        if (canVote) {
          triggerApproveAnimation(card);
          return;
        }
        // Não-elegível pra votar: double-tap só abre fullscreen se há imagem.
        if (card.referenceImage) openFullscreen(card);
      };

      hero.addEventListener('touchend', (e) => {
        const now = Date.now();
        if (now - lastTap < 320) {
          e.preventDefault();
          if (singleTimer) { clearTimeout(singleTimer); singleTimer = null; }
          tryAction();
          lastTap = 0;
        } else {
          lastTap = now;
          if (singleTimer) clearTimeout(singleTimer);
          singleTimer = setTimeout(() => {
            singleTimer = null;
            // single tap = open fullscreen if has image
            if (card.referenceImage) openFullscreen(card);
          }, 320);
        }
      }, { passive: false });

      hero.addEventListener('dblclick', (e) => {
        e.preventDefault();
        if (singleTimer) { clearTimeout(singleTimer); singleTimer = null; }
        tryAction();
      });

      // single click for desktop opens fullscreen with delay
      hero.addEventListener('click', (e) => {
        if (e.detail === 2) return; // dblclick will handle
      });
    }

    // Área 9: aprova com animação de coração + som (mantém ritual amado em campo).
    // Substitui o antigo completeCard. Chama approveCard() pra escrever no Firebase.
    function triggerApproveAnimation(card) {
      // Coração FLOATING no centro da viewport — visível mesmo com scroll
      // (botão "Aprovar" pode estar abaixo do hero; usuário não veria o heart no hero).
      const flyHeart = document.createElement('div');
      flyHeart.className = 'fly-heart';
      flyHeart.textContent = '♥';
      document.body.appendChild(flyHeart);
      flyHeart.addEventListener('animationend', () => flyHeart.remove(), { once: true });
      // fallback: garante remoção mesmo se animationend não disparar
      setTimeout(() => { if (flyHeart.parentNode) flyHeart.remove(); }, 1500);

      // Mantém também o coração no hero (caso visível por double-tap na imagem).
      const heart = document.getElementById('card-heart');
      if (heart) {
        heart.classList.remove('fire');
        void heart.offsetWidth;
        heart.classList.add('fire');
      }
      // som + haptic
      playSuccessSound();
      if (navigator.vibrate) navigator.vibrate([15, 30, 15]);

      // escreve aprovação no Firebase
      approveCard(card, state.currentPersonaId).then(() => {
        // limpa rascunho local da checklist (organização própria, não persiste após voto)
        clearChecklistDraft(card.id);
        setTimeout(() => {
          showToast('Aprovado');
          state.viewer = 'home';
          state.currentCardId = null;
          renderHome();
        }, 1100);
      }).catch(e => {
        showToast('Falhou ao aprovar: ' + e.message);
      });
    }

    function openFullscreen(card) {
      if (!card.referenceImage) return;
      const overlay = document.createElement('div');
      overlay.className = 'card-fullscreen';
      overlay.innerHTML = `
        <button class="card-fullscreen-close">×</button>
        <img src="${card.referenceImage}" alt="referência">
      `;
      overlay.addEventListener('click', () => overlay.remove());
      document.body.appendChild(overlay);
    }

    // ============================================================
    // Trilha D / D3: prefix por cliente. Antes era 'closet-check-' hardcoded —
    // colidiria entre clientes diferentes se 2 personas tivessem mesmo cardId.
    function checklistKey(cardId) {
      const slug = state.clientSlug || 'unk';
      return slug + '-check-' + state.currentPersonaId + '-' + cardId;
    }

    function loadChecklistDraft(cardId) {
      try {
        const raw = localStorage.getItem(checklistKey(cardId));
        return raw ? JSON.parse(raw) : {};
      } catch (e) { return {}; }
    }

    function saveChecklistDraft(cardId, draft) {
      try { localStorage.setItem(checklistKey(cardId), JSON.stringify(draft)); }
      catch (e) {}
    }

    function clearChecklistDraft(cardId) {
      try { localStorage.removeItem(checklistKey(cardId)); }
      catch (e) {}
    }

    // ============================================================
    // SHEET (bottom modal)
    // ============================================================
    function openSheet(type, content) {
      sheetState = { open: true, type };
      document.body.classList.add('modal-open');
      const sheet = document.getElementById('sheet');
      sheet.classList.remove('is-hidden');
      // S2.5* polish: classe extra pra CSS escopar por tipo (ex: sheet de
      // delegação pode ser mais alto pra caber Pedir Ajuste sem rolar)
      const typeClass = type ? ` sheet-type-${type}` : '';
      sheet.innerHTML = `
        <div class="sheet${typeClass}" onclick="event.stopPropagation()">
          <div class="sheet-handle"></div>
          ${content}
        </div>
      `;
      sheet.addEventListener('click', closeSheet, { once: true });
    }

    function closeSheet() {
      sheetState = { open: false, type: null };
      document.body.classList.remove('modal-open');
      const sheet = document.getElementById('sheet');
      sheet.classList.add('is-hidden');
      sheet.innerHTML = '';
    }

    function openSwitchSheet() {
      const day = getCurrentDay();
      if (!day) { showToast('Sem day selecionado.'); return; }
      const blocks = getBlocksOfDay(day.id);
      // PARTE 2 — Visão 360: switch-sheet enxerga TODOS os cards do day (não só da persona logada).
      // Antes era a "navegação next/prev" do renderCardExpanded; viragou sheet "Pular para um bloco".
      const dayCards = Object.values(state.data.cards || {})
        .filter(c => c.dayId === day.id);

      const content = `
        <div class="sheet-header">
          <div class="sheet-kicker">${escapeHtml(getDayDisplayLabel(day))} · ${formatDate(day.date)}</div>
          <div class="sheet-title">Pular para um bloco</div>
        </div>
        <div class="sheet-body">
          ${blocks.map(b => {
            const blockCards = dayCards.filter(c => c.blockId === b.id);
            const total = blockCards.length;
            const done = blockCards.filter(c => isCardCompleted(c)).length;
            const isMeal = b.kind === 'meal';
            const isPause = b.kind === 'pause';
            const isCurrent = isCurrentBlock(b);
            const klass = ['sheet-block-row'];
            if (isMeal) klass.push('is-meal');
            if (isPause) klass.push('is-pause');
            if (isCurrent) klass.push('is-current');
            const progressLabel = total > 0
              ? (done === total ? `${done}/${total} ✓` : `${done}/${total}`)
              : (isMeal || isPause ? '—' : 'sem cards');
            const progressClass = total > 0 && done === total ? 'is-complete' : '';
            return `
              <div class="${klass.join(' ')}" data-block="${b.id}">
                <div class="sheet-block-info">
                  <div class="sheet-block-time">${b.timeStart}–${b.timeEnd}${isCurrent ? ' · agora' : ''}</div>
                  <div class="sheet-block-name">${escapeHtml(b.label)}</div>
                </div>
                <div class="sheet-block-progress ${progressClass}">${progressLabel}</div>
              </div>
            `;
          }).join('')}
        </div>
      `;
      openSheet('switch', content);

      const sheet = document.getElementById('sheet');
      sheet.querySelectorAll('.sheet-block-row').forEach(row => {
        row.addEventListener('click', (e) => {
          e.stopPropagation();
          const blockId = row.getAttribute('data-block');
          closeSheet();
          // dá tempo da animação
          setTimeout(() => {
            const target = document.getElementById('block-' + blockId);
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }, 100);
        });
      });
    }

        clearAuthLocal();

        e.stopPropagation();
        const ok = confirm('Limpar todos os rascunhos locais?');

        // Trilha D / D3: prefix por cliente, paridade com checklistKey.
        const slug = state.clientSlug || 'unk';
        const prefix = slug + '-check-' + state.currentPersonaId + '-';
        // Bonus: também limpa o prefix legado 'closet-check-...' se sobrar
        // de versões antigas com hardcode.
        const legacyPrefix = 'closet-check-' + state.currentPersonaId + '-';
        Object.keys(localStorage).forEach(k => {
          if (k.startsWith(prefix) || k.startsWith(legacyPrefix)) localStorage.removeItem(k);

        showToast('Rascunhos locais limpos');
        closeSheet();
        renderHome();

    // ============================================================
    // ATRITO 3 — Sheet de gestão de tags por cliente
    // ============================================================
    // Lê tags atuais via getCardTypesOfClient() (fallback CARD_TYPES_DEFAULT).
    // Adicionar grava em /clients/{slug}/cardTypes (seedado se ainda não existe).
    // Excluir bloqueia se a tag está em uso (count de cards com c.type === tag).
    function openManageTagsSheet() {
      const tags = getCardTypesOfClient();
      const cards = Object.values(state.clientData?.cards || {});
      // Conta uso de cada tag pelos cards.
      const cardsByTag = {};
      cards.forEach(c => {
        if (c.type) cardsByTag[c.type] = (cardsByTag[c.type] || 0) + 1;
      });

      const content = `
        <div class="sheet-header">
          <div class="sheet-kicker">Gerenciar</div>
          <div class="sheet-title">Tags do cliente</div>
        </div>
        <div class="sheet-body">
          <div class="sheet-form">
            <div class="form-group">
              <label class="form-label">Adicionar tag nova</label>
              <div class="tag-add-row">
                <input type="text" class="form-input" id="new-tag-input" placeholder="Ex: Casa nova" maxlength="40" />
                <button class="btn-primary" id="add-tag-btn" type="button">Adicionar</button>
              </div>
              <div class="form-hint">As tags ficam disponíveis no campo "Tipo" ao criar/editar um card.</div>
            </div>

            <div class="form-group">
              <label class="form-label">Tags atuais (${tags.length})</label>
              <div class="tags-list">
                ${tags.length === 0 ? '<div class="form-hint">Nenhuma tag cadastrada ainda.</div>' :
                  tags.map(t => {
                    const count = cardsByTag[t] || 0;
                    const inUse = count > 0;
                    return `
                      <div class="tag-row${inUse ? ' is-in-use' : ''}">
                        <span class="tag-row-label">${escapeHtml(t)}</span>
                        <span class="tag-row-count">${count} card${count !== 1 ? 's' : ''}</span>
                        <button class="tag-row-remove" data-tag="${escapeAttr(t)}" type="button" title="${inUse ? 'Não dá pra excluir — tag em uso' : 'Excluir tag'}">×</button>
                      </div>
                    `;
                  }).join('')
                }
              </div>
            </div>
          </div>
        </div>
      `;
      openSheet('manage-tags', content);

      const sheet = document.getElementById('sheet');
      sheet.querySelector('.sheet-body').addEventListener('click', (e) => e.stopPropagation());
      sheet.querySelector('.sheet-header').addEventListener('click', (e) => e.stopPropagation());

      // Adicionar
      const input = sheet.querySelector('#new-tag-input');
      const addBtn = sheet.querySelector('#add-tag-btn');
      const submitAdd = () => {
        const name = (input.value || '').trim();
        if (!name) { showToast('Digite o nome da tag.'); return; }
        const current = getCardTypesOfClient();
        if (current.includes(name)) { showToast('Essa tag já existe.'); return; }
        const next = [...current, name];
        clientRef.child('cardTypes').set(next).then(() => {
          showToast('Tag adicionada: ' + name);
          openManageTagsSheet(); // re-render
        }).catch(e => {
          showToast('Falhou ao adicionar: ' + (e && e.message ? e.message : 'erro'));
        });
      };
      addBtn.addEventListener('click', submitAdd);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); submitAdd(); }
      });

      // Excluir
      sheet.querySelectorAll('.tag-row-remove').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const tag = btn.getAttribute('data-tag');
          const count = cardsByTag[tag] || 0;
          if (count > 0) {
            showToast(`"${tag}" está em uso por ${count} card${count !== 1 ? 's' : ''}. Mude o tipo desses cards primeiro.`);
            return;
          }
          if (!confirm(`Excluir a tag "${tag}"?`)) return;
          const current = getCardTypesOfClient();
          const next = current.filter(t => t !== tag);
          clientRef.child('cardTypes').set(next).then(() => {
            showToast('Tag excluída: ' + tag);
            openManageTagsSheet();
          }).catch(e => {
            showToast('Falhou ao excluir: ' + (e && e.message ? e.message : 'erro'));
          });
        });
      });
    }

                  personasArr.map(p => {
                    const usage = countPersonaUsage(p.id);
                    const inUse = usage.total > 0;
                    const color = personaColors[p.id] || '#888';
                    const isVoter = p.isVoter !== false;
                    return `
                      <div class="persona-row${inUse ? ' is-in-use' : ''}">

      sheet.querySelector('.sheet-body').addEventListener('click', (e) => e.stopPropagation());
      sheet.querySelector('.sheet-header').addEventListener('click', (e) => e.stopPropagation());

      // Hex input + swatch live (mesmo pattern do Add Cliente palette)
      const colorInput = sheet.querySelector('#new-persona-color');
      const swatch = sheet.querySelector('#new-persona-swatch');
      colorInput.addEventListener('input', () => {
        const hex = colorInput.value.trim();
        if (/^#[0-9A-Fa-f]{6}$/.test(hex)) swatch.style.background = hex;
      });

      // Adicionar
      const nameInput = sheet.querySelector('#new-persona-name');
      const voterInput = sheet.querySelector('#new-persona-voter');
      const addBtn = sheet.querySelector('#add-persona-btn');
      const submitAdd = () => {
        const name = (nameInput.value || '').trim();
        if (!name) { showToast('Digite o nome da persona.'); return; }
        const color = (colorInput.value || '').trim();
        if (!/^#[0-9A-Fa-f]{6}$/.test(color)) { showToast('Cor inválida — use formato #RRGGBB.'); return; }
        const isVoter = !!voterInput.checked;
        const existingPersonas = (state.clientData && state.clientData.personas) || {};
        const id = generatePersonaId(name, existingPersonas);
        const order = Object.values(existingPersonas).reduce((max, p) => Math.max(max, p.order || 0), 0) + 1;

        const updates = {};
        updates['personas/' + id] = { name, order, isVoter };
        updates['branding/personaColors/' + id] = color;

        clientRef.update(updates).then(() => {
          showToast('Persona adicionada: ' + name);
          openManagePersonasSheet(); // re-render
        }).catch(e => {
          showToast('Falhou ao adicionar: ' + (e && e.message ? e.message : 'erro'));
        });

      addBtn.addEventListener('click', submitAdd);
      nameInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); submitAdd(); }
      });

      // Excluir
      sheet.querySelectorAll('.persona-row-remove').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const personaId = btn.getAttribute('data-persona-id');
          const persona = personasObj[personaId];
          if (!persona) return;
          const usage = countPersonaUsage(personaId);
          if (usage.total > 0) {
            showToast(`"${persona.name || personaId}" tem ${usage.owns} card${usage.owns !== 1 ? 's' : ''} e ${usage.votes} voto${usage.votes !== 1 ? 's' : ''}. Mude/apague esses cards primeiro.`);

          }
          if (!confirm(`Excluir a persona "${persona.name || personaId}"?\nNão dá pra desfazer.`)) return;
          const updates = {};
          updates['personas/' + personaId] = null;
          updates['branding/personaColors/' + personaId] = null;
          clientRef.update(updates).then(() => {
            showToast('Persona excluída: ' + (persona.name || personaId));
            openManagePersonasSheet();
          }).catch(e => {
            showToast('Falhou ao excluir: ' + (e && e.message ? e.message : 'erro'));
          });
        });
      });
    }

    // Shell principal POV executora — header fixo + área central + bottom nav.
    // C2 plugou Hub real; C3 plugará Criar; C5 plugará Galeria + Histórico.
    // É async pq Hub precisa carregar pauta de hoje (resto vem de state.clientData).
    async function renderExecutoraShell() {
      const app = document.getElementById('app');
      app.classList.remove('editor-view');
      const exec = state.currentExecutora || {};
      const clientName = state.clientData?.meta?.name || '';
      const slug = state.clientSlug || '';
      const tab = state.executoraTab || 'hub';

      // Pré-carregar dados conforme a tab
      let pautaHoje = null;
      let historicoExt = null;
      if (tab === 'hub') {
        try {
          pautaHoje = await loadPautaDoDia(slug);
        } catch (e) {
          console.warn('[executora] load pauta falhou:', e);
        }
      } else if (tab === 'historico') {
        try {
          historicoExt = await loadPautaUltimasN(slug, 10);
        } catch (e) {
          console.warn('[executora] load historico falhou:', e);
        }
      }

      app.innerHTML = `
        <div class="executora-shell">
          <header class="executora-header">
            <div class="executora-header-left">
              <div class="executora-kicker" data-brand-logo>${escapeHtml(clientName)}</div>
              <div class="executora-greeting">Olá, <strong>${escapeHtml(exec.name || '')}</strong></div>
            </div>
            <button type="button" class="executora-logout" id="executora-logout-btn" aria-label="Sair">Sair</button>
          </header>

          ${renderDeltaBannerHTML('jamily')}

          <main class="executora-main">
            ${renderExecutoraTabContent(tab, { pautaHoje, historico: historicoExt })}
          </main>

          <nav class="executora-bottom-nav" role="tablist">
            <button type="button" class="executora-tab ${tab === 'hub' ? 'active' : ''}" data-exec-tab="hub" role="tab">
              <span class="executora-tab-icon">◉</span><span class="executora-tab-label">Hub</span>
            </button>
            <button type="button" class="executora-tab ${tab === 'criar' ? 'active' : ''}" data-exec-tab="criar" role="tab">
              <span class="executora-tab-icon">＋</span><span class="executora-tab-label">Criar</span>
            </button>
            <button type="button" class="executora-tab ${tab === 'galeria' ? 'active' : ''}" data-exec-tab="galeria" role="tab">
              <span class="executora-tab-icon">▦</span><span class="executora-tab-label">Galeria</span>
            </button>
            <button type="button" class="executora-tab ${tab === 'historico' ? 'active' : ''}" data-exec-tab="historico" role="tab">
              <span class="executora-tab-icon">⏱</span><span class="executora-tab-label">Histórico</span>
            </button>
          </nav>
        </div>
      `;

      // Handlers globais do shell
      document.getElementById('executora-logout-btn')?.addEventListener('click', () => {
        clearAuthLocal();
        window.location.search = '';
      });
      document.querySelectorAll('[data-exec-tab]').forEach(btn => {
        btn.addEventListener('click', () => {
          const newTab = btn.getAttribute('data-exec-tab');
          // C4.1: ao trocar de tab via bottom nav, limpa modo refazer pra evitar
          // que o form de Criar continue pré-preenchido em contexto errado.
          if (refazerCardState.cardId && newTab !== 'criar') {
            refazerCardState = { cardId: null };
            pendingImageBase64 = null;
            pendingVideoUrl = '';
            pendingVideoMeta = null;
            pendingOrigin = 'pauta';
          }
          // C5.2: sair da Galeria reseta o expand (mas mantém filtros — útil
          // pra ela voltar e continuar de onde estava).
          if (newTab !== 'galeria') {
            galeriaState.expandedRefId = null;
          }
          state.executoraTab = newTab;
          renderExecutoraShell();
        });
      });

      // Bind específico por tab
      if (tab === 'hub')     bindHubJamilyHandlers();
      if (tab === 'criar')   bindCriarCardHandlers();
      if (tab === 'refazer') bindRefazerListaHandlers();
      if (tab === 'galeria') bindGaleriaHandlers();
      // Fase 3: banner "o que você perdeu" — sempre tenta bindar (no-op se ausente)
      bindDeltaBannerHandlers('jamily');

      // Fase 3 commit 2: overlay "bem-vinda de volta" pós-folga (segunda/terça, uma vez por dia)
      try { maybeShowWelcomeBack(); } catch (e) { console.warn('[welcome back]', e); }
    }

    // Render do conteúdo central conforme aba ativa.
    // C2 plugou 'hub'. C3 substituirá 'criar', C5 substituirá 'galeria' + 'historico'.
    function renderExecutoraTabContent(tab, data) {
      data = data || {};
      if (tab === 'hub') {
        return renderHubJamilyHTML(data.pautaHoje);
      }
      if (tab === 'refazer') {
        return renderRefazerListaHTML();
      }
      if (tab === 'criar') {
        // C4.1: se refazerCardState ativo, passa o card como prefill
        const prefill = refazerCardState.cardId
          ? (state.clientData && state.clientData.cards && state.clientData.cards[refazerCardState.cardId]) || null
          : null;
        return renderCriarCardHTML(prefill);
      }
      if (tab === 'galeria') {
        return renderGaleriaHTML();
      }
      if (tab === 'historico') {
        // Reusa renderPautaHistoricoHTML da C2 — mesma estrutura,
        // hoje em destaque mauve, anteriores opacas.
        return `
          <div class="historico-jamily-header">
            <div class="historico-jamily-kicker">Pautas anteriores</div>
            <div class="historico-jamily-sub">As 10 últimas, mais recentes em cima. Hoje destacada em mauve.</div>
          </div>
          ${renderPautaHistoricoHTML(data.historico)}
        `;
      }
      return '';
    }
