    // ============================================================
    // ÁREA 13 — localStorage de auth (PROMPT 11)
    // ============================================================
    // Equipe abre o app sem precisar do link toda vez. Após auth validado em
    // route(), persiste { cliente, u, mode, pin, master } na key 'celulose-auth'.
    // bootstrap() consulta esse cache quando a URL chega vazia.
    //
    // Granularidade: chave única (sobrescreve a cada login). Anti-padrão só pra
    // Isabelle (que troca de modo); equipe sempre fica em 1 modo.
    //
    // Auto-recuperação: gates de PIN/cliente-não-encontrado chamam clearAuthLocal()
    // antes de renderizar — se PIN rotacionou no Firebase, o cache stale é limpo
    // e o próximo bootstrap cai em entry gate em vez de loop.
    const AUTH_LOCAL_KEY = 'celulose-auth';

    function saveAuthLocal(params) {
      try {
        const payload = {
          cliente: params.cliente || '',
          u:       params.u || '',
          mode:    params.mode || '',
          pin:     params.pin || '',
          master:  params.master ? '1' : ''
        };
        localStorage.setItem(AUTH_LOCAL_KEY, JSON.stringify(payload));
      } catch (e) { /* localStorage indisponível — degrade silencioso */ }
    }

    function loadAuthLocal() {
      try {
        const raw = localStorage.getItem(AUTH_LOCAL_KEY);
        if (!raw) return null;
        const data = JSON.parse(raw);
        // Sanidade: precisa ter cliente OU master pra ser uma URL reconstruível.
        if (!data || (!data.cliente && !data.master)) return null;
        return data;
      } catch (e) { return null; }
    }

    function clearAuthLocal() {
      try { localStorage.removeItem(AUTH_LOCAL_KEY); } catch (e) {}
    }

    // Reconstrói a query string a partir do payload do cache.
    // Filtra chaves vazias pra não gerar URL com '&u=&mode=' poluído.
    function authLocalToQueryString(data) {
      const parts = [];
      if (data.master) parts.push('master=1');
      if (data.cliente) parts.push('cliente=' + encodeURIComponent(data.cliente));
      if (data.u)       parts.push('u='       + encodeURIComponent(data.u));
      if (data.mode)    parts.push('mode='    + encodeURIComponent(data.mode));
      if (data.pin)     parts.push('pin='     + encodeURIComponent(data.pin));
      return parts.join('&');
    }

    // ============================================================
    // ÁREA 11 — Master Dashboard (Isabelle vê todos os clientes)
    // ============================================================
    // Carrega /celulose-app/clients de uma vez (single read, não listener).
    // Master dashboard é tela de overview — não precisa live-update enquanto
    // Isabelle olha. Quando ela clica num card, vai pro editor que tem
    // listener próprio. Voltar pra master = re-route = re-load.
    async function loadMasterDashboard() {
      const app = document.getElementById('app');
      app.classList.remove('editor-view');
      // Master = espaço Celulose, reseta favicon pro padrão Celulose
      // (caso esteja vindo de um cliente que sobrescreveu).
      setFavicon();
      updatePageTitle();
      try {
        const snap = await db.ref(ROOT_PATH + '/clients').once('value');
        state.masterData = { clients: snap.val() || {} };
      } catch (e) {
        console.warn('[master] load falhou:', e);
        state.masterData = { clients: {} };
      }
      renderMasterDashboard();
    }

    // Render do grid master.
    // Filtro B (decisão da sessão 2026-05-08): default ativo —
    //   c.meta && c.meta.active !== false. Cliente sem meta válido é skipado.
    // Contador "em aprovação" = cards com status === 'review'.
    // Contador "insights novos" = insights com createdAt > notifications/isabelle/lastSeenInsightAt
    //   (reusa o path do Tipo 4 — coerência com sistema de notificação do editor).
    // Click → ?cliente={slug}&mode=editor&pin={editorPin}.
    function renderMasterDashboard() {
      const app = document.getElementById('app');
      const clientsObj = (state.masterData && state.masterData.clients) || {};
      const clients = Object.values(clientsObj).filter(c => c && c.meta && c.meta.active !== false);

      const cardsHtml = clients.length === 0
        ? `<div class="master-empty">Nenhum cliente ativo. Cadastre via Firebase Console em <code>${ROOT_PATH}/clients/{slug}</code>.</div>`
        : `<div class="master-clients">${clients.map(c => {
            const meta = c.meta || {};
            const slug = meta.slug || '';
            const viewerPin = (c.auth && c.auth.viewerPin) || '';

            // S3.0: lista de personas (ordenadas) pra renderizar botões "Copiar link" PWA por persona.
            const personasArr = Object.entries(c.personas || {})
              .map(([id, p]) => ({ id, name: (p && p.name) || id, order: (p && p.order) || 999 }))
              .sort((a, b) => a.order - b.order);

            // HARD-LITE: sprint removido. Mostra contagem de days ativos do cliente
            // como sinal de "tem produção" ou similar.
            const dayCount = Object.keys(c.days || {}).length;

            const cards = Object.values(c.cards || {});
            // B8 fix: exclui cards que todas as personas ja aprovaram (effective === 'approved').
            // card.status fica 'review' ate Marcar como publicado, mas semanticamente o card nao esta
            // mais 'em aprovacao' se todas votaram approved. Cards com requested_changes/pending/in_progress continuam contando.
            const reviewCount = cards.filter(card => card && card.status === 'review' && getCardEffectiveApproval(card) !== 'approved').length;

            const insights = Object.values(c.insights || {});
            const lastSeenInsightAt = (c.notifications && c.notifications.isabelle && c.notifications.isabelle.lastSeenInsightAt) || 0;
            const newInsightsCount = insights.filter(i => i && i.createdAt && i.createdAt > lastSeenInsightAt).length;

            const reviewClass = reviewCount > 0 ? ' is-attention' : '';
            const insightsClass = newInsightsCount > 0 ? ' is-attention' : '';

            // Vitrine V1 (D16): cada card recebe CSS vars locais com a paleta
            // do cliente — fundo blushLight do branding, texto deep, accent
            // mauve. Fallback = DEFAULT_PALETA inline (mesmo do applyBranding,
            // duplicado aqui pra evitar dependencia de hoisting na composicao
            // do template). CSS esta em body.master-mode .master-client-card.
            const paleta = Object.assign({
              blush:       '#FDF0F5',
              blushLight:  '#FFF7FA',
              mauve:       '#A6546A',
              mauveText:   '#6B3848',
              deep:        '#3A1E28',
              borderSoft:  '#F0DCE3'
            }, (c.branding && c.branding.paleta) || {});
            const cardStyle = [
              `--card-bg: ${paleta.blushLight}`,
              // 2C: pilula stat usa sombra translucida — legivel em qualquer
              // paleta cliente (blush escuro do Empire quebrava se usasse paleta.blush).
              `--card-bg-soft: rgba(0, 0, 0, 0.05)`,
              `--card-fg: ${paleta.deep}`,
              `--card-accent: ${paleta.mauve}`,
              `--card-accent-soft: ${paleta.mauveText}`,
              `--card-border: ${paleta.borderSoft}`
            ].join('; ');

            return `
              <div class="master-client-card-wrapper">
                <button type="button" class="master-client-card" data-slug="${escapeHtml(slug)}" style="${cardStyle}">
                  <div class="master-client-name">${escapeHtml(meta.name || slug || '(sem nome)')}</div>
                  <div class="master-client-sprint">${dayCount} ${dayCount === 1 ? 'day cadastrado' : 'days cadastrados'}</div>
                  <div class="master-client-stats">
                    <span class="master-client-stat${reviewClass}"><strong>${reviewCount}</strong> em aprovação</span>
                    <span class="master-client-stat${insightsClass}"><strong>${newInsightsCount}</strong> insights novos</span>
                  </div>
                </button>
                <!-- P10: edit branding irmao (esquerda do x, verde no hover). -->
                <button type="button" class="master-client-card-edit" data-slug="${escapeHtml(slug)}" aria-label="Editar branding de ${escapeHtml(meta.name || slug)}">⚙</button>
                <!-- D17: x irmao (HTML valido — nao aninha button-em-button). -->
                <button type="button" class="master-client-card-delete" data-slug="${escapeHtml(slug)}" aria-label="Apagar ${escapeHtml(meta.name || slug)}"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><line x1="2" y1="2" x2="10" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="10" y1="2" x2="2" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
                <!-- S3.0: lista de links de instalação PWA por persona (só visível em is-manage-mode) -->
                <div class="master-client-persona-links">
                  <div class="master-client-persona-links-title">📲 Links de instalação</div>
                  ${personasArr.length === 0
                    ? `<div class="master-client-persona-links-empty">Cliente sem personas. Adicione no editor (★ Personas).</div>`
                    : (!viewerPin
                      ? `<div class="master-client-persona-links-empty">Sem viewerPin configurado. Edite o cliente (⚙) pra gerar.</div>`
                      : `<div class="master-client-persona-links-list">${personasArr.map(p => `<button type="button" class="master-client-persona-link-btn" data-slug="${escapeHtml(slug)}" data-persona-id="${escapeHtml(p.id)}" data-persona-name="${escapeHtml(p.name)}" data-viewer-pin="${escapeHtml(viewerPin)}"><span class="master-client-persona-link-btn-icon">📲</span><span class="master-client-persona-link-btn-name">${escapeHtml(p.name)}</span><span class="master-client-persona-link-btn-hint">copiar</span></button>`).join('')}</div>`)
                  }
                </div>
              </div>
            `;
          }).join('')}</div>`;

      // S2.6 Sessão 2: mini dashboard de uso de Storage (vídeos)
      // Conta vídeos em cards, references e adjustments de todos os clientes
      // ativos. Estimativa: 30MB médio por vídeo (aproximação, sem consulta à
      // API do Storage — economia de custo). Limite Always Free = 5GB.
      const STORAGE_LIMIT_MB = 5120;
      const AVG_VIDEO_MB = 30;
      let videoCount = 0;
      for (const c of clients) {
        const cards = Object.values(c.cards || {});
        videoCount += cards.filter(card => card && card.videoUrl).length;
        const refs = Object.values(c.references || {});
        videoCount += refs.filter(r => r && r.videoUrl).length;
        const adjsObj = c.adjustments || {};
        for (const cardAdjs of Object.values(adjsObj)) {
          if (cardAdjs && typeof cardAdjs === 'object') {
            videoCount += Object.values(cardAdjs).filter(a => a && a.videoUrl).length;
          }
        }
      }
      const estimatedMB = videoCount * AVG_VIDEO_MB;
      const pctUsage = Math.min(100, Math.round((estimatedMB / STORAGE_LIMIT_MB) * 100));
      const isWarning = pctUsage > 80;
      const isOk = pctUsage <= 50;

      const storageBlock = `

    // ============================================================
    // ATRITO 6 — Adicionar cliente novo (UI master)
    // ============================================================
    // Form sheet com nome, slug auto-gerado (editável), PINs random gerados
    // (regeneráveis), saudação, logo (upload Storage ou URL externa) e paleta
    // (8 hex inputs prepopulados com defaults do Closet). Cliente é criado
    // vazio — personas são adicionadas em segundo passo (próxima feature).

    // Slug a partir do nome: kebab-case, sem acentos, max 40 chars.
    function generateSlug(name) {
      return (name || '')
        .toLowerCase()
        .normalize('NFD').replace(/[̀-ͯ]/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/(^-|-$)/g, '')
        .slice(0, 40);
    }

    // PIN alfanumérico, sem chars confundíveis (0/O, I/1, etc).
    function generatePin(length) {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let out = '';
      for (let i = 0; i < (length || 4); i++) {
        out += chars[Math.floor(Math.random() * chars.length)];
      }
      return out;
    }

    // D12 — gera personaId a partir do nome (slug). Se já existe em `existing`,
    // adiciona sufixo numérico ("-2", "-3", ...). Fallback "p" + random se nome vazio.
    function generatePersonaId(name, existing) {
      const base = generateSlug(name) || 'p' + Math.random().toString(36).slice(2, 6);
      const taken = new Set(Object.keys(existing || {}));
      if (!taken.has(base)) return base;
      let i = 2;
      while (taken.has(base + '-' + i)) i++;
      return base + '-' + i;
    }

    // D12 — conta cards onde a persona é dona OU votou. Usado pra bloquear delete.
    function countPersonaUsage(personaId) {
      const cards = Object.values(state.clientData?.cards || {});
      let owns = 0;
      let votes = 0;
      cards.forEach(c => {
        if (c.personaId === personaId) owns++;
        if (c.approvalByPersona && c.approvalByPersona[personaId]) votes++;
      });
      return { owns, votes, total: owns + votes };
    }

            </div>

      openSheet('add-client', content);

      const sheet = document.getElementById('sheet');

            fileStatus.textContent = 'Nenhum arquivo';
          }

      // Cancelar
      sheet.querySelector('#ac-cancel-btn').addEventListener('click', closeSheet);

      // Submit
      sheet.querySelector('#ac-submit-btn').addEventListener('click', async () => {
        const name = nameInput.value.trim();
        const slug = (slugInput.value.trim() || generateSlug(name)).toLowerCase();
        const editorPin = sheet.querySelector('#ac-editor-pin').value.trim();
        const viewerPin = sheet.querySelector('#ac-viewer-pin').value.trim();
        const greeting = sheet.querySelector('#ac-greeting').value.trim();
        const logoUrl = inlineLogoData || urlInput.value.trim();

        if (!name) { showToast('Falta o nome do cliente.'); return; }

        if (!editorPin || !viewerPin) { showToast('Faltam os PINs.'); return; }

        // Verifica unicidade do slug

          const personaId = generatePersonaId(acPersonaName, {});
          personasInitial = { [personaId]: { name: acPersonaName, order: 1, isVoter: acPersonaVoter } };
          personaColors[personaId] = acPersonaColorVal;

        const clientData = {
          meta: {
            slug: slug,
            name: name,
            active: true,
            createdAt: Date.now()

          auth: {
            editorPin: editorPin,
            viewerPin: viewerPin

            paleta: paleta,
            saudacao: greeting || 'Olá, {nome}',
            logoUrl: logoUrl || '',
            personaColors: personaColors
          },
          cardTypes: [...CARD_TYPES_DEFAULT]
        };
        if (personasInitial) clientData.personas = personasInitial;

        try {
          await db.ref(ROOT_PATH + '/clients/' + slug).set(clientData);
          showToast(`Cliente "${name}" criado.`);
          closeSheet();
          // Refresca o master pra mostrar o cliente novo
          loadMasterDashboard();
        } catch (e) {
          console.error('[add client] set falhou', e);
          showToast('Falhou ao criar: ' + (e.message || 'erro'));
        }
      });
    }

    // ============================================================
    // D17 — Delete cliente (UI master)
    // ============================================================
    // Sheet de confirmacao com count detalhado (personas/days/cards/votos/
    // insights), input pra digitar slug literal e botao Apagar disabled
    // ate match. Pre-check anti-self-delete via loadAuthLocal — bloqueia
    // delete do cliente cuja sessao esta cacheada. Refresh master via
    // loadMasterDashboard() apos remove (mesmo pattern de Add Cliente).
    function openDeleteClientSheet(slug, clientData) {
      // Pre-check 1: cliente nao existe (corrida — alguem apagou em outra aba).
      if (!clientData) {
        showToast('Cliente nao encontrado. Atualize a tela.');
        return;
      }
      // Pre-check 2: anti-self-delete.
      const cached = loadAuthLocal();
      if (cached && cached.cliente === slug) {
        showToast('Voce esta logada nesse cliente. Faca logout primeiro.');
        return;
      }

      const meta = (clientData && clientData.meta) || {};
      const clientName = meta.name || slug;

      const personasCount = Object.keys(clientData.personas || {}).length;
      const daysCount = Object.keys(clientData.days || {}).length;
      const cardsObj = clientData.cards || {};
      const cardsCount = Object.keys(cardsObj).length;
      let votosCount = 0;
      Object.values(cardsObj).forEach(card => {
        votosCount += Object.keys((card && card.approvalByPersona) || {}).length;
      });
      const insightsCount = Object.keys(clientData.insights || {}).length;

      const plural = (n, sing, plur) => `<strong>${n}</strong> ${n === 1 ? sing : plur}`;

      const content = `
        <div class="sheet-header">
          <div class="sheet-kicker">Master · Apagar cliente</div>
          <div class="sheet-title">Apagar ${escapeHtml(clientName)}?</div>
        </div>
        <div class="sheet-body">
          <div class="form-group">
            <p style="font-size: 14px; line-height: 1.7; color: var(--deep);">
              Vai apagar
              ${plural(personasCount, 'persona', 'personas')},
              ${plural(daysCount, 'day', 'days')},
              ${plural(cardsCount, 'card', 'cards')},
              ${plural(votosCount, 'voto', 'votos')} e
              ${plural(insightsCount, 'insight', 'insights')}.
              <br><br>
              <strong style="color: #dc2626;">Nao da pra desfazer.</strong>
            </p>
          </div>
          <div class="form-group">
            <label class="form-label" style="text-transform: none; letter-spacing: 0.04em;">Pra confirmar, digite <code style="background: rgba(0,0,0,0.06); padding: 2px 6px; border-radius: 4px; font-family: monospace;">${escapeHtml(slug)}</code></label>
            <input type="text" class="form-input" id="dc-slug-confirm" placeholder="${escapeHtml(slug)}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
          </div>
        </div>
        <div class="modal-footer" style="position: sticky; bottom: 0; background: var(--white); padding: 16px 20px; border-top: 1px solid rgba(0,0,0,0.08); display: flex; gap: 10px;">
          <button class="btn-secondary" id="dc-cancel-btn">Cancelar</button>
          <div style="flex: 1"></div>
          <button class="btn-primary" id="dc-submit-btn" disabled style="background: #dc2626; color: #FFFFFF;">Apagar</button>
        </div>
      `;
      openSheet('delete-client', content);

      const slugInput = document.getElementById('dc-slug-confirm');
      const submitBtn = document.getElementById('dc-submit-btn');
      const cancelBtn = document.getElementById('dc-cancel-btn');

      slugInput.addEventListener('input', () => {
        submitBtn.disabled = slugInput.value.trim() !== slug;
      });
      cancelBtn.addEventListener('click', closeSheet);
      submitBtn.addEventListener('click', async () => {
        if (slugInput.value.trim() !== slug) return; // defesa extra
        submitBtn.disabled = true;
        submitBtn.textContent = 'Apagando...';
        try {
          await db.ref(ROOT_PATH + '/clients/' + slug).remove();
          showToast(`Cliente "${clientName}" apagado.`);
          closeSheet();
          loadMasterDashboard();
        } catch (e) {
          console.error('[delete client] remove falhou', e);
          showToast('Falhou ao apagar: ' + (e.message || 'erro'));
          submitBtn.disabled = false;
          submitBtn.textContent = 'Apagar';
        }
      });
      // Foco no input pra usuario poder digitar imediatamente
      setTimeout(() => slugInput && slugInput.focus(), 50);
    }

      sheet.querySelector('.sheet-header').addEventListener('click', (e) => e.stopPropagation());

      // Live swatch update: input hex -> background do swatch.
      Object.keys(palette).forEach(key => {
        const inputEl = document.getElementById('ec-paleta-' + key);
        const swatchEl = document.getElementById('ec-swatch-' + key);
        if (!inputEl || !swatchEl) return;
        inputEl.addEventListener('input', () => {
          let v = inputEl.value.trim();
          if (!v.startsWith('#')) v = '#' + v;
          swatchEl.style.background = v;
        });
      });

      // S3.0: handler do upload de Logo PWA (Storage). Atualiza hidden input
      // e preview ao vivo. Botão Remover limpa hidden e volta pra fallback canvas.
      const ecPwaFileInput = document.getElementById('ec-pwa-logo-file');
      const ecPwaUrlInput = document.getElementById('ec-pwa-logo-url');
      const ecPwaStatus = document.getElementById('ec-pwa-logo-status');
      const ecPwaPreview = document.getElementById('ec-pwa-logo-preview');
      const ecPwaProgress = document.getElementById('ec-pwa-logo-progress');
      const ecPwaProgressBar = document.getElementById('ec-pwa-logo-progress-bar');
      const ecPwaRemove = document.getElementById('ec-pwa-logo-remove');
      if (ecPwaFileInput) {
        ecPwaFileInput.addEventListener('change', async () => {
          const file = ecPwaFileInput.files && ecPwaFileInput.files[0];
          if (!file) return;
          const err = validateLogo(file);
          if (err) { ecPwaStatus.textContent = '✗ ' + err; ecPwaStatus.style.color = 'var(--red)'; return; }
          ecPwaStatus.textContent = 'Subindo logo…';
          ecPwaStatus.style.color = 'var(--gray)';
          ecPwaProgress.style.display = 'block';
          try {
            const url = await uploadLogoToStorage(file, slug, (pct) => {
              ecPwaProgressBar.style.width = pct.toFixed(0) + '%';
            });
            ecPwaUrlInput.value = url;
            ecPwaPreview.innerHTML = '<img src="' + url + '" style="width: 100%; height: 100%; object-fit: cover;" alt="Logo PWA" />';

            ecPwaStatus.textContent = '✓ ' + file.name + ' (' + kb + ' KB) — salvo no Storage';
            ecPwaProgress.style.display = 'none';

            console.error('[ec-pwa-logo upload]', e);
            ecPwaStatus.textContent = '✗ Falhou: ' + (e.message || 'erro');

            ecPwaProgress.style.display = 'none';

        const newSaudacao = document.getElementById('ec-greeting').value.trim();
        const newLogoUrl = document.getElementById('ec-logo-url').value.trim();
        const newPwaLogoUrl = (document.getElementById('ec-pwa-logo-url').value || '').trim();
        if (!newName) {
          showToast('Nome eh obrigatorio.');
          return;
        }
        const newPaleta = {};
        Object.keys(palette).forEach(key => {
          let v = document.getElementById('ec-paleta-' + key).value.trim();
          if (!v.startsWith('#')) v = '#' + v;
          newPaleta[key] = v;
        });

        const submitBtn = document.getElementById('ec-submit-btn');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Salvando...';
        try {
          const updates = {};
          updates[ROOT_PATH + '/clients/' + slug + '/meta/name'] = newName;
          updates[ROOT_PATH + '/clients/' + slug + '/branding/saudacao'] = newSaudacao;
          updates[ROOT_PATH + '/clients/' + slug + '/branding/logoUrl'] = newLogoUrl;
          updates[ROOT_PATH + '/clients/' + slug + '/branding/pwaLogoUrl'] = newPwaLogoUrl;
          updates[ROOT_PATH + '/clients/' + slug + '/branding/paleta'] = newPaleta;
          // A2: feature flag heroPiece
          const newHeroPieceFlag = document.getElementById('ec-feat-heroPiece').checked;
          updates[ROOT_PATH + '/clients/' + slug + '/features/heroPiece'] = newHeroPieceFlag;
          await db.ref().update(updates);
          showToast('"' + newName + '" atualizado.');
          closeSheet();
          // Reload garante consistencia em tudo (nome no master, paleta global,
          // logo, saudacao com novo {nome} aplicado). Pattern simples e robusto.
          setTimeout(() => window.location.reload(), 400);
        } catch (e) {
          console.error('[edit client] update falhou', e);
          showToast('Falhou: ' + (e.message || 'erro'));
          submitBtn.disabled = false;
          submitBtn.textContent = 'Salvar';
        }
      });
    }

    // Modal compacto pra adicionar day no editor com days (Fase 0).
    // Cria overlay dinâmico (não usa #card-modal/#block-modal pra não conflitar).
    // Sugere data = day mais recente + 1 (cadência diária); fallback dateStart do sprint.
    // Submit chama createNewDay() — função existente reusada do empty state.
    function openAddDayModal() {
      // Fecha modal anterior se já aberto (idempotência).
      const existing = document.getElementById('add-day-modal');
      if (existing) { existing.remove(); }

      // Sugestão de data: último day + 1 dia, ou hoje se não há days.
      const days = getAllDaysOfClient();
      let suggestedDate;
      if (days.length > 0) {
        const lastDay = days[days.length - 1];
        suggestedDate = addDays(lastDay.date, 1);
      } else {
        suggestedDate = new Date().toISOString().slice(0, 10);
      }

      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.id = 'add-day-modal';
      overlay.innerHTML = `
        <div class="modal-box" style="max-width: 420px; padding: 28px 24px;">
          <div style="font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mauve); margin-bottom: 8px;">Novo day</div>
          <div style="font-size: 18px; font-weight: 500; color: var(--deep); margin-bottom: 4px;">Cadastrar dia de produção</div>
          <div style="font-size: 13px; color: var(--mauve-text); line-height: 1.5; margin-bottom: 20px;">Cada day vira uma tab no editor e na home das personas.</div>

          <div class="form-group">
            <label class="form-label">Data do day</label>
            <input type="date" class="form-input" id="add-day-date" value="${escapeAttr(suggestedDate)}" />
          </div>
          <div class="form-group">
            <label class="form-label">Label (opcional)</label>
            <input type="text" class="form-input" id="add-day-label" placeholder="Ex: Dia N — Terça" />
            <div class="form-hint">Vazio = "Dia N — &lt;dia da semana&gt;" automático.</div>
          </div>
          <div style="display: flex; gap: 8px; margin-top: 20px;">
            <button class="btn-secondary" id="add-day-cancel" type="button" style="flex: 1;">Cancelar</button>
            <button class="btn-primary" id="add-day-submit" type="button" style="flex: 1;">Criar day</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);

      const dateInput = overlay.querySelector('#add-day-date');
      const labelInput = overlay.querySelector('#add-day-label');
      const submitBtn = overlay.querySelector('#add-day-submit');
      const cancelBtn = overlay.querySelector('#add-day-cancel');

      // Foco automático no input de data
      setTimeout(() => { if (dateInput) dateInput.focus(); }, 50);

      const close = () => {
        document.removeEventListener('keydown', onKeyDown);
        overlay.remove();
      };
      const onKeyDown = (e) => {
        if (e.key === 'Escape') { close(); }
        else if (e.key === 'Enter' && (e.target === dateInput || e.target === labelInput)) {
          e.preventDefault();
          submit();
        }
      };
      const submit = () => {
        const date = dateInput.value;
        const label = labelInput.value.trim();
        if (!date) { showToast('Escolhe uma data primeiro.'); return; }
        close();
        createNewDay(date, label);
      };

      submitBtn.addEventListener('click', submit);
      cancelBtn.addEventListener('click', close);

      overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });

    // Cria um day no Firebase. Após gravar, o listener pega a mudança e re-renderiza.
    // HARD-LITE: day não tem mais sprintId. Order = max(allDays.order) + 1 cross-cliente.
    function createNewDay(date, labelOpt) {
      if (!clientRef) { showToast('Sem conexão com o cliente.'); return; }
      const dayId = 'd-' + date;                          // ex: d-2026-05-05
      const existing = state.clientData?.days?.[dayId];
      if (existing) {
        // já existe esse day; só seleciona ele e re-renderiza.
        state.currentDayId = dayId;
        renderEditor();
        showToast('Day já existia — selecionado.');
        return;
      }
      // Calcula `order` como (max + 1) entre todos os days do cliente.
      const allDays = getAllDaysOfClient();
      const nextOrder = allDays.length === 0 ? 1 : Math.max(...allDays.map(d => d.order || 0)) + 1;
      // Auto-label se não veio: "Dia N — <dia da semana>"
      const dows = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
      const dt = new Date(date + 'T12:00:00');
      const dowLong = dows[dt.getDay()];
      const dowShort = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][dt.getDay()];
      const finalLabel = labelOpt || ('Dia ' + nextOrder + ' — ' + dowLong);
      const shortLabel = 'Dia ' + nextOrder;
      const day = {
        id: dayId,
        date: date,
        label: finalLabel,
        short: shortLabel,
        order: nextOrder,
        notes: ''
        // blocks vazio inicialmente (Firebase não persiste null nem {})
      };
      clientRef.child('days/' + dayId).set(day).then(() => {
        state.currentDayId = dayId;
        showToast('Day criado: ' + finalLabel);
        // listener vai re-renderizar via attachClientListener; força um re-render imediato
        // pra UX não esperar o round-trip.
        renderEditor();
      }).catch(e => {
        showToast('Falhou ao criar day: ' + e.message);
      });
    }

    // Atrito 1 caminho C: deleta o day atualmente selecionado + todos os cards dele.
    // Multi-path update atômico (mesmo pattern do refactor HARD-LITE) garante que
    // ou tudo é apagado, ou nada é. renderEditor (5723) já trata currentDayId
    // inválido e cai no empty state quando data.days fica vazio.
    function deleteCurrentDay() {
      if (!clientRef) { showToast('Sem conexão com o cliente.'); return; }
      const dayId = state.currentDayId;
      const data = state.clientData;
      const day = data && data.days && data.days[dayId];
      if (!day) { showToast('Day inválido.'); return; }

      const allCards = Object.values(data.cards || {});
      const dayCards = allCards.filter(c => c.dayId === dayId);
      const count = dayCards.length;

      const dayLabel = getDayDisplayLabel(day);
      const dayDate = formatDate(day.date);
      const msg = count > 0
        ? `Apagar ${dayLabel} (${dayDate}) e ${count} card${count !== 1 ? 's' : ''} do dia? Não dá pra desfazer.`
        : `Apagar ${dayLabel} (${dayDate})?`;
      if (!confirm(msg)) return;

      const updates = {};
      updates['days/' + dayId] = null;
      dayCards.forEach(c => { updates['cards/' + c.id] = null; });
      // Apaga blocks órfãos? Não — blocks podem ser compartilhados por outros days
      // futuramente. Por enquanto blocks são por-day, mas o schema permite reusar.
      // Manter blocks intocados é mais conservador.

      clientRef.update(updates).then(() => {
        state.currentDayId = null; // listener vai resetar pro próximo day disponível
        showToast(count > 0 ? `Day excluído (${count} card${count !== 1 ? 's' : ''}).` : 'Day excluído.');
        renderEditor();
      }).catch(e => {
        console.error('[deleteCurrentDay]', e);
        showToast('Falhou ao excluir: ' + (e && e.message ? e.message : 'erro'));
      });
    }

    function saveNewBlockFromModal() {
      const dayId = blockCreateState.dayId;
      if (!dayId) { showToast('Day inválido.'); return; }
      if (!clientRef) { showToast('Sem conexão com cliente.'); return; }
      const label = (document.getElementById('bf-label').value || '').trim();
      const timeStart = document.getElementById('bf-start').value;
      const timeEnd = document.getElementById('bf-end').value;
      const kind = document.getElementById('bf-kind').value || 'shoot';
      if (!label) { showToast('Dá um nome pro bloco.'); return; }
      if (!timeStart || !timeEnd) { showToast('Define os horários.'); return; }
      if (timeEnd <= timeStart) { showToast('O fim precisa ser depois do início.'); return; }
      // Calcula próximo order entre blocks existentes do day.
      const day = state.clientData?.days?.[dayId];
      const existingBlocks = (day && day.blocks) ? Object.values(day.blocks) : [];
      const nextOrder = existingBlocks.length === 0
        ? 1
        : Math.max(...existingBlocks.map(b => b.order || 0)) + 1;
      const blockId = 'b_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
      const block = {
        id: blockId,
        timeStart,
        timeEnd,
        label,
        kind,
        order: nextOrder
      };
      clientRef.child('days/' + dayId + '/blocks/' + blockId).set(block).then(() => {
        showToast('Bloco criado: ' + label);
        closeBlockCreateModal();
        // listener re-renderiza via attachClientListener; força re-render imediato.
        renderEditor();
      }).catch(e => showToast('Falhou ao criar bloco: ' + e.message));
    }

    function renderEditorBlock(block, personas, dayCards, dayId) {
      const blockCards = dayCards.filter(c => c.blockId === block.id);
      const isMeal = block.kind === 'meal';
      const isPause = block.kind === 'pause';
      const klass = ['editor-block'];
      if (isMeal) klass.push('is-meal');
      if (isPause) klass.push('is-pause');

      const hasDetail = (block.heroPiece && clientHasHeroPiece()) || block.locationSpecific || block.note;

      return `
        <div class="${klass.join(' ')}">
          <div class="editor-block-header">
            <div class="editor-block-info">
              <div class="editor-block-time">${block.timeStart}–${block.timeEnd}</div>
              <div class="editor-block-name">${escapeHtml(block.label)}</div>
              ${block.territoryCategory ? `<div class="editor-block-territory">${escapeHtml(block.territoryCategory)}</div>` : ''}
              ${isMeal ? '<div class="editor-block-kind">refeição</div>' : ''}
              ${isPause ? '<div class="editor-block-kind">pausa</div>' : ''}
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
              <button class="editor-block-edit" data-edit-block="${block.id}">✎ Editar bloco</button>
              <div style="font-size: 12px; color: var(--gray);">${blockCards.length} card${blockCards.length === 1 ? '' : 's'}</div>
            </div>
          </div>
          ${hasDetail ? `
            <div class="editor-block-detail">
              ${block.heroPiece && clientHasHeroPiece() ? `<span class="editor-block-detail-pill is-hero">peça-hero · ${escapeHtml(block.heroPiece)}</span>` : ''}
              ${block.locationSpecific ? `<span class="editor-block-detail-pill">${escapeHtml(block.locationSpecific)}</span>` : ''}
              ${block.note ? `<span class="editor-block-detail-note">${escapeHtml(block.note)}</span>` : ''}
            </div>
          ` : ''}
          <div class="editor-cols">
            ${personas.map(f => {
              const personaCards = blockCards.filter(c => c.personaId === f.id).sort((a, b) => (a.order || 999) - (b.order || 999));
              return `
                <div class="editor-col">
                  <div class="editor-col-header">
                    <span>${escapeHtml(f.name)}</span>
                    <span class="editor-col-count">${personaCards.length}</span>
                  </div>
                  ${personaCards.map(c => renderEditorMiniCard(c)).join('')}
                  <button class="editor-add-card" data-day="${dayId}" data-block="${block.id}" data-persona="${f.id}">+ Adicionar</button>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }

    // Área 14 F2: conta comments não-lidos pela Isabelle num card específico.
    // "Não-lido" = createdAt > lastSeenAt[cardId] da Isabelle (no editor).
    // M3 híbrido: se chegar comment novo após o último open, count > 0 de novo
    //            naturalmente (sem state extra).
    function getUnreadCommentCount(cardId) {
      if (state.mode !== 'editor') return 0;
      const comments = (state.clientData && state.clientData.comments && state.clientData.comments[cardId]) || {};
      const lastSeen = (state.clientData
        && state.clientData.notifications
        && state.clientData.notifications.isabelle
        && state.clientData.notifications.isabelle.lastSeenAt
        && state.clientData.notifications.isabelle.lastSeenAt[cardId]) || 0;
      let count = 0;
      Object.values(comments).forEach(c => {
        if (!c || !c.createdAt) return;
        if (c.createdAt > lastSeen) count++;
      });
      return count;
    }

    // Área 14 Tipo 4 — conta insights novos pra ISABELLE no editor.
    // Insights são globais (não por card), então o lastSeen vive num path único:
    //   notifications/isabelle/lastSeenInsightAt = timestamp
    // "Não-lido" = insight.createdAt > lastSeenInsightAt.
    // Click na pílula "X insights recebidos" zera o path (timestamp único = vi tudo
    // até este instante). M3 híbrido: insight novo depois reativa o badge naturalmente.
    function getUnreadInsightsCount() {
      if (state.mode !== 'editor') return 0;
      const insights = (state.clientData && state.clientData.insights) || {};
      const lastSeen = (state.clientData
        && state.clientData.notifications
        && state.clientData.notifications.isabelle
        && state.clientData.notifications.isabelle.lastSeenInsightAt) || 0;
      let count = 0;
      Object.values(insights).forEach(i => {
        if (!i || !i.createdAt) return;
        if (i.createdAt > lastSeen) count++;
      });
      return count;
    }

    // Área 14 Tipo 3 — conta pedidos de ajuste não-vistos pela ISABELLE no editor.
    // Regras (D7=Caminho 3 híbrido):
    //   - Só editor (state.mode === 'editor').
    //   - Conta entries em approvalByPersona com:
    //       state === 'requested_changes'    (especificamente, NÃO approved)
    //       updatedAt > lastSeenAt[cardId] da Isabelle
    // SD1=A: reusa o MESMO path de notifications/isabelle/lastSeenAt do Tipo 1.
    // Quando Isabelle abre o card, openCardModal já zera o lastSeenAt — Tipo 1 e
    // Tipo 3 zeram juntos no mesmo gesto ("vi tudo aqui").
    // M3 híbrido: se persona retomar o voto pra approved, state ≠ requested_changes
    // e o badge laranja some naturalmente — semântica "pedido foi resolvido".
    function getUnreadRequestedChangesCount(cardId) {
      if (state.mode !== 'editor') return 0;
      const card = state.clientData && state.clientData.cards && state.clientData.cards[cardId];
      if (!card) return 0;
      const approvals = card.approvalByPersona || {};
      const lastSeen = (state.clientData
        && state.clientData.notifications
        && state.clientData.notifications.isabelle
        && state.clientData.notifications.isabelle.lastSeenAt
        && state.clientData.notifications.isabelle.lastSeenAt[cardId]) || 0;
      let count = 0;
      Object.values(approvals).forEach(a => {
        if (!a) return;
        if (a.state !== 'requested_changes') return;
        if (!a.updatedAt) return;
        if (a.updatedAt > lastSeen) count++;
      });
      return count;
    }

    // Área 14 Tipo 5 (Caminho C) — conta "ajustes feitos pela Isabelle" não-vistos pela
    // persona votante logada. Trigger pro badge verde no home-card e pro banner no card view.
    // Regras:
    //   - Só viewer (state.mode === 'viewer').
    //   - Conta cards onde approvalByPersona[currentPersonaId] tem:
    //       state === 'pending' (foi resetado pela Isabelle)
    //       resolvedByEditorAt > lastSeenAt[cardId]
    //       notes existe (havia um pedido anterior — não é primeiro voto)
    function getAdjustmentDoneCount(card) {
      if (state.mode !== 'viewer') return 0;
      if (!card || !card.approvalByPersona) return 0;
      const personaId = state.currentPersonaId;
      if (!personaId) return 0;
      const a = card.approvalByPersona[personaId];
      if (!a) return 0;
      if (a.state !== 'pending') return 0;
      if (!a.resolvedByEditorAt) return 0;
      if (!a.notes) return 0;
      const lastSeen = (state.clientData
        && state.clientData.notifications
        && state.clientData.notifications[personaId]
        && state.clientData.notifications[personaId].lastSeenAt
        && state.clientData.notifications[personaId].lastSeenAt[card.id]) || 0;
      return a.resolvedByEditorAt > lastSeen ? 1 : 0;
    }

    // Área 14 Tipo 2 — conta votos não-vistos pelo DONO do card (executor).
    // Regras (D6=A + SD1/SD2):
    //   - Só viewer (state.mode === 'viewer'). Editor não recebe Tipo 2.
    //   - Só se a persona logada é a dona do card (card.personaId === currentPersonaId).
    //   - Closet nunca recebe (não loga; closet = 'Isa produz').
    //   - Conta entradas em approvalByPersona com:
    //       state ∈ {approved, requested_changes}     (ignora 'pending' inicial)
    //       updatedAt > lastSeenAt[cardId] da persona logada
    //       votingPersonaId !== ownerId               (não conta self-vote)
    // M3 híbrido (igual Tipo 1): se voto mudar depois do último open,
    // updatedAt atualiza e o count volta naturalmente.
    function getUnreadVoteCount(card) {
      if (state.mode !== 'viewer') return 0;
      if (!card || !card.personaId) return 0;
      if (card.personaId === 'closet') return 0;
      if (card.personaId !== state.currentPersonaId) return 0;
      const approvals = card.approvalByPersona || {};
      const personaId = state.currentPersonaId;
      const lastSeen = (state.clientData
        && state.clientData.notifications
        && state.clientData.notifications[personaId]
        && state.clientData.notifications[personaId].lastSeenAt
        && state.clientData.notifications[personaId].lastSeenAt[card.id]) || 0;
      let count = 0;
      Object.keys(approvals).forEach(voterId => {
        if (voterId === card.personaId) return; // self-vote não notifica
        const a = approvals[voterId];
        if (!a) return;
        if (a.state !== 'approved' && a.state !== 'requested_changes') return;
        if (!a.updatedAt) return;
        if (a.updatedAt > lastSeen) count++;
      });
      return count;
    }

    function renderEditorMiniCard(c) {
      const prio = (c.priority || 'Média').toLowerCase().replace('é', 'e');
      // Área 9: estado efetivo + ação inline.
      const cardStatus = getCardStatus(c);              // 'draft'|'review'|'published'
      const effective = getCardEffectiveApproval(c);
      const isDraft = cardStatus === 'draft';
      const isReadyToPublish = cardStatus === 'review' && effective === 'approved';

      const BADGE_LABELS = {
        draft: 'rascunho',
        pending: 'aguardando votos',
        in_progress: 'em aprovação',
        approved: '✓ aprovado',
        requested_changes: '! pediu ajuste',
        published: '✓ publicado'
      };
      const badgeLabel = BADGE_LABELS[effective] || effective;
      const badge = `<span class="editor-mini-badge is-${effective}">${badgeLabel}</span>`;

      let actionBtn = '';
      if (isDraft) {
        actionBtn = `<button class="editor-mini-action is-send" data-action="send-review" data-card="${c.id}">Enviar pra aprovação</button>`;
      } else if (isReadyToPublish) {
        actionBtn = `<button class="editor-mini-action is-publish" data-action="publish" data-card="${c.id}">Marcar como publicado</button>`;
      } else if (cardStatus === 'published') {
        // Rede de segurança contra click acidental no Marcar como publicado.
        actionBtn = `<button class="editor-mini-action is-unpublish" data-action="unpublish" data-card="${c.id}">Despublicar</button>`;
      }

      // Área 14 F2: badge de comments não-lidos (só aparece se count > 0).
      const unreadCount = getUnreadCommentCount(c.id);
      const unreadBadge = unreadCount > 0
        ? `<span class="editor-mini-comment-badge" title="${unreadCount} comment${unreadCount > 1 ? 's' : ''} não lido${unreadCount > 1 ? 's' : ''}">${unreadCount}</span>`
        : '';
      const unreadClass = unreadCount > 0 ? ' has-unread' : '';

      // Área 14 Tipo 3: badge laranja de pedidos de ajuste não-vistos (canto sup esquerdo).
      const changesCount = getUnreadRequestedChangesCount(c.id);
      const changesBadge = changesCount > 0
        ? `<span class="editor-mini-changes-badge" title="${changesCount} pedido${changesCount > 1 ? 's' : ''} de ajuste não vistos">${changesCount}</span>`
        : '';
      const changesClass = changesCount > 0 ? ' has-unread-changes' : '';

      return `
        <div class="editor-mini-card is-state-${effective}${unreadClass}${changesClass}" data-card="${c.id}">
          ${unreadBadge}
          ${changesBadge}
          <div class="editor-mini-meta">
            <span class="editor-mini-prio is-${prio}"></span>
            ${c.format ? `<span class="editor-mini-pill">${escapeHtml(c.format)}</span>` : ''}
            ${c.type ? `<span class="editor-mini-pill">${escapeHtml(c.type)}</span>` : ''}
            ${badge}
          </div>
          <div class="editor-mini-title">${escapeHtml(c.title || '(sem título)')}</div>
          ${c.timeSlot ? `<div class="editor-mini-time">${escapeHtml(c.timeSlot)}</div>` : ''}
          ${actionBtn}
        </div>
      `;
    }

    // ============================================================
    // CARD MODAL (form de edição no editor)
    // ============================================================
    function openCardModal(cardId, ctx) {
      const data = state.data;
      let draft;

      if (cardId && data.cards[cardId]) {
        draft = JSON.parse(JSON.stringify(data.cards[cardId]));
        modalState.cardId = cardId;
        modalState.dayId = draft.dayId;
        modalState.blockId = draft.blockId;
        modalState.personaId = draft.personaId;
      } else if (ctx) {
        draft = createDefaultCard(ctx.dayId, ctx.blockId, ctx.personaId);
        modalState.cardId = null;
        modalState.dayId = ctx.dayId;
        modalState.blockId = ctx.blockId;
        modalState.personaId = ctx.personaId;
      } else { return; }

      modalState.draft = draft;
      modalState.open = true;
      document.body.classList.add('modal-open');

      // Área 14 F2: marca card como "visto" pela Isabelle ao abrir o modal no editor.
      // M3 híbrido: comments anteriores ao timestamp atual ficam invisíveis no badge;
      // se vier comment novo depois, o badge volta naturalmente (createdAt > lastSeenAt).
      // O guard modalState.open=true acima impede o listener Firebase de re-renderizar
      // o editor (e fechar o modal) quando essa escrita disparar o on('value').
      if (cardId && state.mode === 'editor' && clientRef) {
        clientRef.child('notifications/isabelle/lastSeenAt/' + cardId).set(Date.now())
          .catch(e => console.warn('[F2 lastSeenAt set falhou]', e));
      }

      renderCardModal();
    }

    function closeCardModal() {
      // Área 10: detach do listener de comments antes de qualquer outra coisa,
      // pra não vazar listener e não tentar atualizar DOM que vai sumir.
      detachCommentsListener();
      modalState.open = false;
      modalState.cardId = null;
      modalState.draft = null;
      document.body.classList.remove('modal-open');
      const overlay = document.getElementById('card-modal');
      overlay.classList.add('is-hidden');
      overlay.innerHTML = '';
      if (state.mode === 'editor') renderEditor();
    }

    // Atrito 2A: schema simplificado — apenas 3 campos de texto livre (objective,
    // caption, topics). Campos antigos (framing, concept, captionTone, anchorPhrase)
    // removidos. Migração one-shot via DevTools console limpa o schema dos cards
    // existentes (script no comentário no fim deste arquivo).
    function createDefaultCard(dayId, blockId, personaId) {
      const block = state.clientData.days[dayId].blocks[blockId];
      return {
        id: 'card_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
        dayId, blockId, personaId,
        title: '',
        format: 'Story',
        type: 'Bastidor casual',
        priority: 'Média',
        timeSlot: block ? (block.timeStart + '–' + block.timeEnd) : '',
        objective: '',
        caption: '',
        topics: '',
        referenceImage: '',
        videoUrl: '',
        checklist: JSON.parse(JSON.stringify(DEFAULT_CHECKLIST)),
        order: 0,
        createdAt: Date.now()
      };
    }

    function renderCardModal() {
      const overlay = document.getElementById('card-modal');
      if (!modalState.open || !modalState.draft) {
        overlay.classList.add('is-hidden');
        overlay.innerHTML = '';
        return;
      }

      const d = modalState.draft;
      const persona = state.clientData.personas?.[d.personaId];
      const day = state.clientData.days?.[d.dayId];
      const block = day?.blocks?.[d.blockId];
      const isNew = !modalState.cardId;
      // Área 9: editor vê os votos das personas no topo do modal (read-only).
      const approvalsBlockHtml = !isNew ? renderApprovalsByPersonaBlock(d) : '';

      // Bug fix mobile: re-renders do modal (add/remove item de checklist, troca de imagem)
      // jogavam o usuário pro topo. Preserva scrollTop dos 2 elementos rolantes:
      // .modal-overlay (rola no desktop) e .modal-body (rola no mobile, max-width:600px).
      const prevOverlayScroll = overlay.scrollTop;
      const prevBodyScroll = overlay.querySelector('.modal-body')?.scrollTop || 0;

      overlay.classList.remove('is-hidden');
      overlay.innerHTML = `
        <div class="modal-box">
          <div class="modal-header">
            <div>
              <div class="modal-kicker">${escapeHtml(persona.name)} · ${escapeHtml(block.label)} · ${escapeHtml(getDayDisplayLabel(day))}</div>
              <div class="modal-title">${isNew ? 'Novo card' : 'Editar card'}</div>
            </div>
            <button class="modal-close" id="modal-close-btn">×</button>
          </div>

          <div class="modal-body">
            ${approvalsBlockHtml}
            <div class="form-group">
              <label class="form-label">Título</label>
              <input type="text" class="form-input" id="f-title" value="${escapeAttr(d.title)}" placeholder="Ex: Story spoiler arrumando mala" />
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Formato</label>
                <select class="form-select" id="f-format">
                  ${CARD_FORMATS.map(opt => `<option value="${opt}" ${d.format === opt ? 'selected' : ''}>${opt}</option>`).join('')}
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Tipo</label>
                <select class="form-select" id="f-type">
                  ${getCardTypesOfClient().map(opt => `<option value="${opt}" ${d.type === opt ? 'selected' : ''}>${opt}</option>`).join('')}
                </select>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Prioridade</label>
                <select class="form-select" id="f-priority">
                  ${CARD_PRIORITIES.map(opt => `<option value="${opt}" ${d.priority === opt ? 'selected' : ''}>${opt}</option>`).join('')}
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Horário sugerido</label>
                <input type="text" class="form-input" id="f-timeslot" value="${escapeAttr(d.timeSlot)}" placeholder="Ex: 11:30 ou 11–13h" />
              </div>
            </div>

            <!-- Atrito 2A: 3 campos de texto livre. Vazios não aparecem no card final. -->
            <div class="form-group">
              <label class="form-label">Objetivo do conteúdo</label>
              <textarea class="form-textarea" id="f-objective" placeholder="Por que esse conteúdo existe? Qual papel ele tem na narrativa?">${escapeHtml(d.objective || '')}</textarea>
            </div>

            <div class="form-group">
              <label class="form-label">Legenda</label>
              <textarea class="form-textarea" id="f-caption" placeholder="Copy pronta ou tom sugerido pra legenda">${escapeHtml(d.caption || '')}</textarea>
            </div>

            <div class="form-group">
              <label class="form-label">Tópicos</label>
              <textarea class="form-textarea" id="f-topics" placeholder="Pontos a abordar (um por linha, opcional)">${escapeHtml(d.topics || '')}</textarea>
            </div>

            <div class="form-group">
              <label class="form-label">Referência visual</label>
              <div class="image-upload">
                <div class="image-preview ${d.referenceImage ? 'has-image' : ''}" id="image-preview">
                  ${d.referenceImage ? `<img src="${d.referenceImage}" alt="referência">` : ''}
                </div>
                <div class="image-upload-actions">
                  <label class="image-upload-btn" for="f-image">${d.referenceImage ? 'Trocar imagem' : 'Anexar imagem'}</label>
                  ${d.referenceImage ? '<button class="image-clear" id="f-image-clear" type="button">Remover</button>' : ''}
                  <input type="file" id="f-image" accept="image/*" />
                </div>
                <div class="image-loading" id="image-loading" style="display: none;">Comprimindo imagem…</div>
              </div>
            </div>

            <!-- S2.7: vídeo no editor principal de cards (mesmo pattern dos outros fluxos) -->
            <div class="form-group">
              <label class="form-label">Vídeo (opcional)</label>
              <div class="image-upload">
                ${d.videoUrl
                  ? `<div style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--white, #fff); border: 1px solid var(--border-soft, #eadbe0); border-radius: 8px;">
                       <div style="font-size: 24px;">📹</div>
                       <div style="flex: 1; min-width: 0;">
                         <div style="font-weight: 600; font-size: 14px; color: var(--deep, #3A1E28);">Vídeo anexado</div>
                         <div style="font-size: 12px; color: var(--mauve-text, #6B3848); margin-top: 2px; word-break: break-all;">${escapeHtml(d.videoUrl.slice(0, 60))}…</div>
                       </div>
                     </div>`
                  : ''}
                <div class="image-upload-actions">
                  <label class="image-upload-btn" for="f-video">${d.videoUrl ? 'Trocar vídeo' : 'Anexar vídeo'}</label>
                  ${d.videoUrl ? '<button class="image-clear" id="f-video-clear" type="button">Remover</button>' : ''}
                  <input type="file" id="f-video" accept="video/mp4,video/quicktime,video/webm,.mp4,.mov,.webm" />
                </div>
                <div id="f-video-progress" style="display: none; margin-top: 8px;">
                  <div style="display: flex; justify-content: space-between; font-size: 12px; color: var(--mauve-text, #A0A0A0); margin-bottom: 4px;">
                    <span>Subindo… <span id="f-video-pct">0</span>%</span>
                    <span id="f-video-eta"></span>
                  </div>
                  <div style="height: 4px; background: rgba(0,0,0,0.08); border-radius: 2px; overflow: hidden;">
                    <div id="f-video-bar" style="height: 100%; width: 0%; background: var(--mauve, #A6546A); transition: width 0.2s ease;"></div>
                  </div>
                </div>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Checklist obrigatória (pra liberar a conclusão por double-tap)</label>
              <div class="checklist-editor" id="checklist-editor">
                ${(d.checklist || []).map((item, idx) => `
                  <div class="checklist-row" data-idx="${idx}">
                    <input type="text" class="checklist-row-input" value="${escapeAttr(item.label)}" data-idx="${idx}" />
                    <button class="checklist-row-remove" data-idx="${idx}" type="button">×</button>
                  </div>
                `).join('')}
                <button class="checklist-add" id="checklist-add" type="button">+ Adicionar item</button>
              </div>
              <div class="form-hint">Esses itens precisam estar marcados pelo fundador antes do double-tap concluir o card.</div>
            </div>

            ${!isNew ? `
              <div class="modal-comments" data-card-id="${escapeAttr(modalState.cardId)}">
                <h3 class="modal-comments-title">Conversa</h3>
                <div class="comment-thread-list" id="comment-thread-list">
                  <div class="comment-thread-empty">Sem comments ainda.</div>
                </div>
                <div class="comment-compose">
                  <textarea
                    class="comment-compose-input"
                    id="comment-compose-input"
                    placeholder="Escreve um comentário…"
                    rows="2"
                  ></textarea>
                  <button class="comment-compose-submit" id="comment-compose-submit" type="button" disabled>Enviar</button>
                </div>
              </div>
            ` : ''}
          </div>

          <div class="modal-footer">
            <button class="btn-secondary" id="modal-cancel-btn">Cancelar</button>
            ${!isNew ? '<button class="btn-danger" id="modal-delete-btn">Remover card</button>' : ''}
            <div style="flex: 1"></div>
            <button class="btn-primary" id="modal-save-btn">Salvar</button>
          </div>
        </div>
      `;

      bindModalEvents();

      // Bug fix mobile: restaura scroll dos elementos rolantes depois do innerHTML.
      // Em mobile o .modal-body é quem rola; em desktop é o overlay.
      // requestAnimationFrame garante que o layout já foi calculado.
      requestAnimationFrame(() => {
        if (prevOverlayScroll) overlay.scrollTop = prevOverlayScroll;
        const newBody = overlay.querySelector('.modal-body');
        if (newBody && prevBodyScroll) newBody.scrollTop = prevBodyScroll;
      });
    }

    function bindModalEvents() {
      const overlay = document.getElementById('card-modal');

      document.getElementById('modal-close-btn').addEventListener('click', closeCardModal);

    function compressImage(file, maxDim, quality) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            let w = img.width, h = img.height;
            if (w > maxDim || h > maxDim) {
              if (w > h) { h = Math.round(h * (maxDim / w)); w = maxDim; }
              else { w = Math.round(w * (maxDim / h)); h = maxDim; }
            }
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // ============================================================
    // AUDIO — som sintético de conclusão (estilo Apple Pay)
    // ============================================================
    function unlockAudio() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        g.gain.value = 0;
        o.connect(g); g.connect(ctx.destination);
        o.start(); o.stop(ctx.currentTime + 0.001);
        window._audioCtx = ctx;
      } catch (e) { console.warn('[Audio unlock falhou]', e); }
    }

    function playSuccessSound() {
      const ctx = window._audioCtx;
      if (!ctx) return;
      try {
        if (ctx.state === 'suspended') ctx.resume();
        const now = ctx.currentTime;

        // Tom 1 — bell-like (G6 ~ 1568Hz)
        const o1 = ctx.createOscillator();
        const g1 = ctx.createGain();
        o1.type = 'sine';
        o1.frequency.value = 1568;
        o1.connect(g1); g1.connect(ctx.destination);
        g1.gain.setValueAtTime(0, now);
        g1.gain.linearRampToValueAtTime(0.25, now + 0.01);
        g1.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
        o1.start(now);
        o1.stop(now + 0.2);

        // Tom 2 — bell-like agudo (C7 ~ 2093Hz), sobreposto
        const o2 = ctx.createOscillator();
        const g2 = ctx.createGain();
        o2.type = 'sine';
        o2.frequency.value = 2093;
        o2.connect(g2); g2.connect(ctx.destination);
        g2.gain.setValueAtTime(0, now + 0.06);
        g2.gain.linearRampToValueAtTime(0.18, now + 0.075);
        g2.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
        o2.start(now + 0.06);
        o2.stop(now + 0.3);
      } catch (e) {
        console.warn('[playSuccessSound]', e);
      }
    }

    // PROMPT 12: registra unlock do AudioContext no primeiro user gesture.
    // iOS Safari exige um tap/click pra "destravar" o AudioContext — sem isso,
    // playSuccessSound() em aprovar não emite som. Ouve uma vez via { once: true }.
    document.addEventListener('touchstart', () => {
      if (!window._audioCtx) unlockAudio();
    }, { once: true, passive: true });
    document.addEventListener('click', () => {
      if (!window._audioCtx) unlockAudio();
    }, { once: true });

    let toastTimer = null;
    function showToast(msg, duration) {
      duration = duration || 2400;
      const t = document.getElementById('toast');

    // ============================================================
    // N-B L3 — NOTIFICATION HELPERS (PWA push setup local)
    // ============================================================
    // Flow inicial: pede permission ao usuario, dispara notificacao local via
    // SW registration (preferencial) ou Notification constructor (fallback).
    // FCM + Cloud Function viram em S2.5 — aqui e setup do front que ja deixa
    // tudo pronto pra receber push events do SW.

    async function requestNotificationPermission() {
      if (!('Notification' in window)) {
        showToast('Browser nao suporta notificacoes');
        return 'unsupported';
      }
      if (Notification.permission === 'granted') return 'granted';
      if (Notification.permission === 'denied') {
        showToast('Notificacoes bloqueadas — habilite nas config do browser');
        return 'denied';
      }
      try {
        return await Notification.requestPermission();
      } catch (e) {
        console.warn('[notif] permission request falhou:', e);
        return 'default';
      }
    }

    async function showNativeNotification(title, body, options) {
      if (!('Notification' in window) || Notification.permission !== 'granted') return false;
      const opts = Object.assign({
        body: body || '',
        icon: './icon-notif.png',
        badge: './icon-notif.png',
        tag: 'sinapse-default'
      }, options || {});
      try {
        // Preferencial: via SW registration (suporta badge, actions, persiste no tray).
        if ('serviceWorker' in navigator) {
          const reg = await navigator.serviceWorker.ready;
          await reg.showNotification(title, opts);
          return true;
        }
        // Fallback: Notification constructor (sem SW)
        new Notification(title, opts);
        return true;
      } catch (e) {
        console.warn('[notif] showNotification falhou:', e);
        return false;
      }
    }

    async function testNotification() {
      const perm = await requestNotificationPermission();
      if (perm === 'granted') {
        const ok = await showNativeNotification(
          'Sinapse · Notificações ativas',
          'Tudo certo! Você vai receber alertas de aprovação, ajuste e insight quando o backend (FCM) for ligado.',
          { tag: 'sinapse-test' }
        );
        showToast(ok ? 'Notificacao enviada' : 'Falha ao enviar');
      }
      // 'denied' e 'unsupported' ja mostraram toast via requestNotificationPermission
    }


    // ============================================================
    // HELPERS
    // ============================================================
    function escapeHtml(s) {
      if (s === null || s === undefined) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escapeAttr(s) { return escapeHtml(s); }

    function formatDate(iso) {
      const [y, m, d] = iso.split('-');
      return `${d}/${m}`;
    }

    function formatDateShort(iso) {
      const [y, m, d] = iso.split('-');
      const date = new Date(iso + 'T12:00:00');
      const dows = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
      return `${dows[date.getDay()]} ${d}/${m}`;
    }

    function formatTimestamp(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      const now = new Date();
      const dd = String(d.getDate()).padStart(2, '0');
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const hh = String(d.getHours()).padStart(2, '0');
      const min = String(d.getMinutes()).padStart(2, '0');
      const sameDay = d.toDateString() === now.toDateString();
      return sameDay ? `hoje, ${hh}:${min}` : `${dd}/${mm} ${hh}:${min}`;
    }

    // ============================================================
    // BOOT
    // ============================================================
    bootstrap();

    // N-B L2: registra Service Worker (PWA-capable; offline shell + push handler).
    // Fire-and-forget — falha de SW nao deve bloquear o app.
    // Roda apos 'load' pra nao concorrer com bootstrap inicial.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js?v=20260520-s30-pwa-pin-icone').then((reg) => {
          console.log('[SW] registrado, scope:', reg.scope);
        }).catch((err) => {
          console.warn('[SW] registro falhou:', err);
        });
      });
    }
  </script>
</body>
