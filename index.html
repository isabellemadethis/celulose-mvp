    // form (ex: digitando texto não perde a thumb selecionada). Reset ao
    // submitar com sucesso ou ao trocar de aba.
    let pendingImageBase64 = null;
    let pendingVideoUrl = '';
    let pendingVideoMeta = null;  // { name, size, mime } pra mostrar info no preview
    let pendingOrigin = 'pauta';

    // C5.1+C5.2: estado do form de Referência. mode = 'list' | 'create' | 'edit'.
    // editingId só usado em 'edit'. pendingImage é base64 sobrevive re-renders.
    // fields.pieceTypes/shotTypes são arrays (multi-select de chips fechados).
    let referenciaFormState = {
      mode: 'list',
      editingId: null,
      fields: { title: '', copy: '', notes: '', pieceTypes: [], shotTypes: [] },
      pendingImage: null,
      pendingVideoUrl: null,    // null=usa existente, ''=removido, string=novo URL
      pendingVideoMeta: null
    };

    function resetReferenciaFormState() {
      referenciaFormState = {
        mode: 'list',
        editingId: null,
        fields: { title: '', copy: '', notes: '', pieceTypes: [], shotTypes: [] },
        pendingImage: null,
        pendingVideoUrl: null,
        pendingVideoMeta: null
      };
    }

    // C5.2: estado da Galeria (POV Jamily) — filtros aplicados + expand inline.
    // expandedRefId != null → renderGaleriaHTML mostra tela cheia da referência
    // em vez da lista filtrada. Reseta ao trocar de tab via bottom nav.
    let galeriaState = {
      pieceFilter: [],
      shotFilter: [],
      expandedRefId: null
    };

    function resetGaleriaState() {
      galeriaState = { pieceFilter: [], shotFilter: [], expandedRefId: null };
    }

    // ============================================================
    // Fase 3 — Infra "o que você perdeu" (sem servidor, Caminho 2)
    // ============================================================
    // localStorage por (slug, role): cd:lastSeen:{slug}:{role}
    // Roles: 'isabelle' (master/editor) e 'jamily' (executora). Segrega na
    // mesma máquina pra Isabelle/Jamily logadas no mesmo navegador.

    function getLastSeenKey(slug, role) {
      return `cd:lastSeen:${slug}:${role}`;
    }

    function getLastSeen(slug, role) {
      try {
        const raw = localStorage.getItem(getLastSeenKey(slug, role));
        if (raw == null) return null;
        const ts = parseInt(raw, 10);
        return Number.isFinite(ts) ? ts : null;
      } catch (e) { return null; }
    }

    function markSeen(slug, role) {
      try {
        localStorage.setItem(getLastSeenKey(slug, role), String(Date.now()));
      } catch (e) {}
    }

    // Computa delta de atividade desde lastSeen pro role indicado.
    // Primeira visita (sem localStorage) → marca silenciosamente e retorna
    // sem delta (banner não aparece, é primeira impressão limpa).
    // Role 'isabelle': novos cards na fila + ajustes resolvidos + postados.
    // Role 'jamily':   pauta nova + aprovados pra postar + ajustes pedidos + refs novas.
    function getDeltaSinceLastSeen(slug, role) {
      const lastSeen = getLastSeen(slug, role);
      if (lastSeen == null) {
        markSeen(slug, role);
        return { hasDelta: false, isFirstVisit: true, lastSeen: null, items: [] };
      }
      const cd = state.clientData || {};
      const cards = Object.values(cd.cards || {});
      const adjustments = cd.adjustments || {};
      const pautas = cd.pautas || {};
      const references = cd.references || {};
      const items = [];

      if (role === 'isabelle') {
        // Cards novos na fila Bulk (review + executoraInterna + sentForReviewAt > lastSeen
        // + sem ajuste pendente — cards com ajuste pendente ficam fora da fila visível dela)
        const novosFila = cards.filter(c =>
          c &&
          c.status === 'review' &&
          c.createdByRole === ROLES.EXECUTORA_INTERNA &&
          (c.sentForReviewAt || 0) > lastSeen &&
          !isCardComAjustePendente(c)
        );
        if (novosFila.length > 0) {
          items.push({
            kind: 'novos-fila',
            count: novosFila.length,
            label: `${novosFila.length} card${novosFila.length === 1 ? '' : 's'} novo${novosFila.length === 1 ? '' : 's'} na fila`
          });
        }
        // Ajustes resolvidos (Jamily reenviou)
        let ajResolvidos = 0;
        Object.values(adjustments).forEach(byCardId => {
          if (!byCardId) return;
          Object.values(byCardId).forEach(adj => {
            if (adj && adj.resolved === true && (adj.resolvedAt || 0) > lastSeen) {
              ajResolvidos += 1;
            }
          });
        });
        if (ajResolvidos > 0) {
          items.push({
            kind: 'ajustes-resolvidos',
            count: ajResolvidos,
            label: `${ajResolvidos} ajuste${ajResolvidos === 1 ? '' : 's'} resolvido${ajResolvidos === 1 ? '' : 's'} (de volta na fila)`
          });
        }
        // Cards postados pela Jamily (escopo executora)
        const postados = cards.filter(c =>
          c &&
          (c.postedAt || 0) > lastSeen &&
          c.createdByRole === ROLES.EXECUTORA_INTERNA
        );
        if (postados.length > 0) {
          items.push({
            kind: 'postados',
            count: postados.length,
            label: `${postados.length} card${postados.length === 1 ? '' : 's'} postado${postados.length === 1 ? '' : 's'} pela Jamily`
          });
        }
      } else if (role === 'jamily') {
        // Pauta de hoje atualizada
        const todayKey = getPautaTodayKey();
        const pautaHoje = pautas[todayKey];
        if (pautaHoje && (pautaHoje.updatedAt || 0) > lastSeen) {
          items.push({ kind: 'pauta-nova', count: 1, label: 'Pauta de hoje atualizada' });
        }
        // Cards aprovados prontos pra postar (Isabelle aprovou desde lastSeen)
        const aprovadosNovos = cards.filter(c =>
          c &&
          c.status === 'published' &&
          !c.postedAt &&
          c.createdByRole === ROLES.EXECUTORA_INTERNA &&
          (c.updatedAt || 0) > lastSeen
        );
        if (aprovadosNovos.length > 0) {
          items.push({
            kind: 'aprovados-novos',
            count: aprovadosNovos.length,
            label: `${aprovadosNovos.length} card${aprovadosNovos.length === 1 ? '' : 's'} aprovado${aprovadosNovos.length === 1 ? '' : 's'} pra postar`
          });
        }
        // Ajustes novos pedidos pela Isabelle (pra Jamily refazer)
        const ajustesPedidos = cards.filter(c => {
          if (!c || !c.lastAdjustmentId || c.createdByRole !== ROLES.EXECUTORA_INTERNA) return false;
          const adj = (adjustments[c.id] && adjustments[c.id][c.lastAdjustmentId]) || null;
          return !!(adj && adj.resolved === false && (adj.requestedAt || 0) > lastSeen);
        });
        if (ajustesPedidos.length > 0) {
          items.push({
            kind: 'ajustes-pedidos',
            count: ajustesPedidos.length,
            label: `${ajustesPedidos.length} ajuste${ajustesPedidos.length === 1 ? '' : 's'} novo${ajustesPedidos.length === 1 ? '' : 's'} pra refazer`
          });
        }
        // Referências novas na Galeria
        const refsNovas = Object.values(references).filter(r => r && (r.createdAt || 0) > lastSeen);
        if (refsNovas.length > 0) {
          items.push({
            kind: 'refs-novas',
            count: refsNovas.length,
            label: `${refsNovas.length} referência${refsNovas.length === 1 ? '' : 's'} nova${refsNovas.length === 1 ? '' : 's'} na Galeria`
          });
        }
      }

      return { hasDelta: items.length > 0, isFirstVisit: false, lastSeen, items };
    }

    function renderDeltaBannerHTML(role) {
      const slug = state.clientSlug || '';
      const delta = getDeltaSinceLastSeen(slug, role);
      if (!delta.hasDelta) return '';
      const agoLabel = delta.lastSeen ? formatTimeAgo(delta.lastSeen) : '';
      return `
        <div class="delta-banner" id="delta-banner" data-role="${escapeHtml(role)}">
          <div class="delta-banner-icon">✦</div>
          <div class="delta-banner-body">
            <div class="delta-banner-kicker">Desde sua última visita ${escapeHtml(agoLabel)}</div>
            <div class="delta-banner-items">
              ${delta.items.map(i => `<span class="delta-banner-item">${escapeHtml(i.label)}</span>`).join('')}
            </div>
          </div>
          <button type="button" class="delta-banner-dismiss" id="delta-banner-dismiss" aria-label="Marcar como visto">
            ✓ Visto
          </button>
        </div>
      `;
    }

    function bindDeltaBannerHandlers(role) {
      const slug = state.clientSlug || '';
      const btn = document.getElementById('delta-banner-dismiss');
      if (!btn) return;
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        markSeen(slug, role);
        const banner = document.getElementById('delta-banner');
        if (banner && banner.parentNode) banner.parentNode.removeChild(banner);
      });
    }

    // ============================================================
    // Fase 3 commit 2 — Notifs locais (sem servidor) + lembretes janelas + bem-vinda
    // ============================================================

    // Estado de notificação. notifPermAsked salvo no localStorage (não pede 2x na mesma máquina).
    // welcomeShown salvo por (slug, dia) — overlay "bem-vinda" só uma vez por dia pra Jamily.
    function getNotifPermAskedKey(slug) { return `cd:notifPermAsked:${slug}`; }
    function wasNotifPermAsked(slug) {
      try { return localStorage.getItem(getNotifPermAskedKey(slug)) === '1'; } catch (e) { return false; }
    }
    function markNotifPermAsked(slug) {
      try { localStorage.setItem(getNotifPermAskedKey(slug), '1'); } catch (e) {}
    }

    // Pede permissão com toast contextual (Caminho A: lazy, no primeiro evento relevante).
    // Não pede se já tem decisão (granted/denied) OU se já perguntou antes.
    function maybeAskNotifPermission(slug) {
      if (typeof Notification === 'undefined') return;
      if (Notification.permission !== 'default') return;
      if (wasNotifPermAsked(slug)) return;
      markNotifPermAsked(slug);
      // Toast simpático com 2 botões
      const existing = document.getElementById('notif-perm-toast');
      if (existing && existing.parentNode) existing.parentNode.removeChild(existing);
      const toast = document.createElement('div');
      toast.id = 'notif-perm-toast';
      toast.className = 'notif-perm-toast';
      toast.innerHTML = `
        <div class="notif-perm-toast-body">
          <div class="notif-perm-toast-title">Quer receber lembretes?</div>
          <div class="notif-perm-toast-sub">Te avisa quando bater janela ou rolar novidade — mesmo com o app em outra aba.</div>
        </div>
        <div class="notif-perm-toast-actions">
          <button type="button" class="notif-perm-toast-btn notif-perm-toast-btn-no" id="notif-perm-no">Agora não</button>
          <button type="button" class="notif-perm-toast-btn notif-perm-toast-btn-yes" id="notif-perm-yes">Permitir</button>
        </div>
      `;
      document.body.appendChild(toast);
      const dismiss = () => {
        if (toast.parentNode) toast.parentNode.removeChild(toast);
      };
      document.getElementById('notif-perm-no')?.addEventListener('click', (e) => {
        e.stopPropagation();
        dismiss();
      });
      document.getElementById('notif-perm-yes')?.addEventListener('click', async (e) => {
        e.stopPropagation();
        try {
          await Notification.requestPermission();
        } catch (err) {
          console.warn('[notif] erro pedindo permissão:', err);
        }
        dismiss();
      });
    }

    // Dispara notificação local via Service Worker (preferido — funciona com app em background)
    // ou via Notification API direta (fallback).
    function showLocalNotif(title, body, opts) {
      if (typeof Notification === 'undefined') return;
      if (Notification.permission !== 'granted') return;
      const options = Object.assign({
        body: body || '',
        icon: './icon-notif.png',
        badge: './icon-notif.png',
        tag: 'sinapse-local',
        requireInteraction: false
      }, opts || {});
      try {
        if (navigator.serviceWorker && navigator.serviceWorker.ready) {
          navigator.serviceWorker.ready.then(reg => {
            reg.showNotification(title, options).catch(err => {
              console.warn('[notif] sw showNotification erro:', err);
            });
          }).catch(() => {
            // Fallback direto
            new Notification(title, options);
          });
        } else {
          new Notification(title, options);
        }
      } catch (e) {
        console.warn('[notif] erro:', e);
      }
    }

    // ----- Lembretes das janelas (POV Isabelle) -----
    // setTimeout pra próxima janela ativa. Quando dispara, mostra notif local
    // + re-agenda pra próxima. Cancelado ao sair do editor.
    let janelaReminderTimeoutId = null;

    function clearJanelaReminder() {
      if (janelaReminderTimeoutId) {
        clearTimeout(janelaReminderTimeoutId);
        janelaReminderTimeoutId = null;
      }
    }

    // Calcula ms até próxima janela (apenas no dia de hoje, futuras). Retorna null se nenhuma.
    function msAteProximaJanelaFutura() {
      const janelas = (Array.isArray(janelasAprovacao) && janelasAprovacao.length)
        ? janelasAprovacao : JANELAS_FALLBACK;
      const now = new Date();
      const nowMs = now.getTime();
      const todayY = now.getFullYear();
      const todayM = now.getMonth();
      const todayD = now.getDate();
      for (const h of janelas) {
        const [hh, mm] = h.split(':').map(Number);
        const target = new Date(todayY, todayM, todayD, hh, mm, 0, 0).getTime();
        if (target > nowMs) return { hora: h, ms: target - nowMs };
      }
      return null;
    }

    function scheduleJanelaReminder() {
      clearJanelaReminder();
      if (state.mode !== 'editor') return; // só Isabelle no editor
      const next = msAteProximaJanelaFutura();
      if (!next) return; // sem janela futura hoje
      janelaReminderTimeoutId = setTimeout(() => {
        // Conta cards na fila no momento que dispara (pode ter mudado)
        const cardsNaFila = (typeof getCardsNaFilaBulk === 'function') ? getCardsNaFilaBulk() : [];
        const n = cardsNaFila.length;
        const body = n === 0
          ? 'Hora da janela — nada novo na fila ainda.'
          : `${n} card${n === 1 ? '' : 's'} aguardando aprovação.`;
        showLocalNotif(`Janela das ${next.hora}`, body, { tag: 'celulose-janela' });
        // Re-agenda pra próxima
        scheduleJanelaReminder();
      }, next.ms);
    }

    // ----- Diff-aware notifications (via attachClientListener) -----
    // Mantém snapshot anterior pra comparar e disparar notifs locais quando algo
    // muda enquanto app está aberto. Pula a primeira chamada (sem comparação válida).
    let lastClientDataSnap = null;

    function detectAndNotifyDeltas(prevData, newData) {
      if (!prevData || !newData) return; // primeira chamada — pula
      if (typeof Notification === 'undefined') return;
      if (Notification.permission !== 'granted') return;

      const role = state.mode === 'executora' ? 'jamily'
                 : (state.mode === 'editor' || state.mode === 'master') ? 'isabelle'
                 : null;
      if (!role) return;

      const prevCards = prevData.cards || {};
      const newCards = newData.cards || {};
      const prevAdjs = prevData.adjustments || {};
      const newAdjs = newData.adjustments || {};
      const prevPautas = prevData.pautas || {};
      const newPautas = newData.pautas || {};
      const prevRefs = prevData.references || {};
      const newRefs = newData.references || {};

      if (role === 'isabelle') {
        // Card novo na fila (criado pela Jamily)
        Object.keys(newCards).forEach(cardId => {
          const newC = newCards[cardId];
          const oldC = prevCards[cardId];
          if (!newC || newC.createdByRole !== ROLES.EXECUTORA_INTERNA) return;
          if (newC.status !== 'review') return;
          if (!oldC) {
            // Card novo
            const title = newC.title || newC.concept?.slice(0, 40) || 'sem título';
            showLocalNotif('Jamily mandou um card novo', `"${title}"`, { tag: `card-novo-${cardId}` });
          }
        });
        // Ajuste resolvido (card reenviado pós-ajuste)
        Object.keys(newAdjs).forEach(cardId => {
          const newByCard = newAdjs[cardId] || {};
          const oldByCard = prevAdjs[cardId] || {};
          Object.keys(newByCard).forEach(adjId => {
            const newA = newByCard[adjId];
            const oldA = oldByCard[adjId];
            if (newA && newA.resolved === true && (!oldA || oldA.resolved !== true)) {
              const card = newCards[cardId];
              const title = card?.title || 'card';
              showLocalNotif('Ajuste resolvido', `"${title}" tá de volta na fila`, { tag: `ajuste-resolvido-${adjId}` });
            }
          });
        });
      } else if (role === 'jamily') {
        // Pauta nova de hoje
        const todayKey = getPautaTodayKey();
        const newPauta = newPautas[todayKey];
        const oldPauta = prevPautas[todayKey];
        if (newPauta && (!oldPauta || (newPauta.updatedAt || 0) > (oldPauta.updatedAt || 0))) {
          showLocalNotif('Pauta de hoje atualizada', 'A Isabelle mexeu na pauta. Dá uma olhada.', { tag: `pauta-${todayKey}` });
        }
        // Card aprovado novo (status: review→published)
        Object.keys(newCards).forEach(cardId => {
          const newC = newCards[cardId];
          const oldC = prevCards[cardId];
          if (!newC || newC.createdByRole !== ROLES.EXECUTORA_INTERNA) return;
          if (newC.status === 'published' && !newC.postedAt && oldC && oldC.status !== 'published') {
            const title = newC.title || 'card';
            showLocalNotif('Card aprovado pra postar', `"${title}" pode ir no ar`, { tag: `aprovado-${cardId}` });
          }
        });
        // Ajuste novo pedido
        Object.keys(newAdjs).forEach(cardId => {
          const newByCard = newAdjs[cardId] || {};
          const oldByCard = prevAdjs[cardId] || {};
          Object.keys(newByCard).forEach(adjId => {
            const newA = newByCard[adjId];
            const oldA = oldByCard[adjId];
            if (newA && !newA.resolved && !oldA) {
              const card = newCards[cardId];
              const title = card?.title || 'card';
              showLocalNotif('Isabelle pediu ajuste', `"${title}" — abre o app pra ver`, { tag: `ajuste-pedido-${adjId}` });
            }
          });
        });
      }
    }

    // ----- Overlay "bem-vinda de volta" pra Jamily pós-folga -----
    // Aparece se hoje é segunda OU terça E ainda não foi mostrado hoje.
    // Conteúdo: saudação + resumo do que rolou nos dias de folga (dom + seg).
    function getWelcomeBackKey(slug) { return `cd:lastWelcomeDismiss:${slug}`; }
    function wasWelcomeShownToday(slug) {
      try {
        const last = localStorage.getItem(getWelcomeBackKey(slug));
        return last === getPautaTodayKey();
      } catch (e) { return false; }
    }
    function markWelcomeShownToday(slug) {
      try { localStorage.setItem(getWelcomeBackKey(slug), getPautaTodayKey()); } catch (e) {}
    }

    function shouldShowWelcomeBack() {
      // Só pra Jamily em dia útil pós-folga.
      // Folga atual: dom + qua. Pós-folga = segunda (após dom) ou quinta (após qua).
      if (state.mode !== 'executora') return false;
      const today = new Date();
      const dow = today.getDay(); // 0=dom, 1=seg, 2=ter, 3=qua, 4=qui
      if (dow !== 1 && dow !== 4) return false;
      const slug = state.clientSlug || '';
      return !wasWelcomeShownToday(slug);
    }

    function computeWelcomeBackResumo() {
      // Resumo do que rolou na folga (24h da folga + 4h de margem).
      // Folga atual: dom OU qua (1 dia). Janela de 28h cobre confortavelmente.
      const janelaFolga = Date.now() - (28 * 60 * 60 * 1000);
      const cd = state.clientData || {};
      const cards = Object.values(cd.cards || {});
      const adjs = cd.adjustments || {};
      const pautas = cd.pautas || {};

      const aprovadosPostar = cards.filter(c =>
        c && c.status === 'published' && !c.postedAt &&
        c.createdByRole === ROLES.EXECUTORA_INTERNA &&
        (c.updatedAt || 0) > janelaFolga
      ).length;

      let ajustesPedidos = 0;
      Object.values(adjs).forEach(byCardId => {
        Object.values(byCardId || {}).forEach(adj => {
          if (adj && !adj.resolved && (adj.requestedAt || 0) > janelaFolga) {
            ajustesPedidos += 1;
          }
        });
      });

      const pautasRecentes = Object.entries(pautas)
        .filter(([k, p]) => p && (p.updatedAt || 0) > janelaFolga)
        .length;

      return { aprovadosPostar, ajustesPedidos, pautasRecentes };
    }

    function renderWelcomeBackOverlayHTML() {
      const exec = state.currentExecutora || {};
      const nome = exec.name || 'Jamily';
      const resumo = computeWelcomeBackResumo();
      const items = [];
      if (resumo.aprovadosPostar > 0) {
        items.push(`${resumo.aprovadosPostar} card${resumo.aprovadosPostar === 1 ? '' : 's'} aprovado${resumo.aprovadosPostar === 1 ? '' : 's'} esperando pra postar`);
      }
      if (resumo.ajustesPedidos > 0) {
        items.push(`${resumo.ajustesPedidos} ajuste${resumo.ajustesPedidos === 1 ? '' : 's'} pedido${resumo.ajustesPedidos === 1 ? '' : 's'} pra refazer`);
      }
      if (resumo.pautasRecentes > 0) {
        items.push(`${resumo.pautasRecentes} pauta${resumo.pautasRecentes === 1 ? '' : 's'} nova${resumo.pautasRecentes === 1 ? '' : 's'} pra olhar`);
      }

      const itemsHtml = items.length > 0
        ? `<ul class="welcome-back-list">${items.map(i => `<li>${escapeHtml(i)}</li>`).join('')}</ul>`
        : `<div class="welcome-back-empty">Tudo calmo na folga. Bom dia!</div>`;

      const dow = new Date().getDay();
      const greeting = dow === 1 ? 'Boa segunda-feira' : 'Boa quinta-feira';

      return `
        <div class="welcome-back-overlay" id="welcome-back-overlay">
          <div class="welcome-back-modal">
            <div class="welcome-back-icon">👋🏼</div>
            <div class="welcome-back-title">${escapeHtml(greeting)}, ${escapeHtml(nome)}</div>
            <div class="welcome-back-sub">Aqui o resumo do que rolou enquanto você descansou:</div>
            ${itemsHtml}
            <button type="button" class="welcome-back-btn" id="welcome-back-dismiss">Vamos para cima! 👹🤘🏻🔥</button>
          </div>
        </div>
      `;
    }

    function maybeShowWelcomeBack() {
      if (!shouldShowWelcomeBack()) return;
      const slug = state.clientSlug || '';
      const existing = document.getElementById('welcome-back-overlay');
      if (existing && existing.parentNode) existing.parentNode.removeChild(existing);
      const wrap = document.createElement('div');
      wrap.innerHTML = renderWelcomeBackOverlayHTML();
      const overlay = wrap.firstElementChild;
      document.body.appendChild(overlay);
      const close = () => {
        markWelcomeShownToday(slug);
        if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
      };
      document.getElementById('welcome-back-dismiss')?.addEventListener('click', (e) => {
        e.stopPropagation();
        close();
      });
      // Esc fecha também
      const escHandler = (e) => {
        if (e.key === 'Escape') {
          close();
          document.removeEventListener('keydown', escHandler);
        }
      };
      document.addEventListener('keydown', escHandler);
    }


    function renderCriarCardHTML(prefillCard) {
      // C4.1: se em modo refazer e prefill não veio explícito, busca pelo state.
      if (!prefillCard && refazerCardState.cardId) {
        prefillCard = (state.clientData && state.clientData.cards && state.clientData.cards[refazerCardState.cardId]) || null;
      }
      const isRefazer = !!(refazerCardState.cardId && prefillCard);
      const origins = CARD_ORIGINS;
      const previewSrc = pendingImageBase64 || '';
      const titleVal = prefillCard?.title || '';
      const conceptVal = prefillCard?.concept || '';

      // Header da tela — modo refazer mostra ajuste da Isabelle em destaque.
      let headerBlock = '';
      if (isRefazer) {
        const adjs = (state.clientData && state.clientData.adjustments && state.clientData.adjustments[prefillCard.id]) || {};

        });

        headerBlock = `

            ← Voltar pra lista

          <div class="criar-card-refazer-header">
            <div class="criar-card-refazer-kicker">Refazendo · pedido ${escapeHtml(requestedLabel)}</div>
            <div class="criar-card-refazer-title">A Isabelle pediu mudança</div>
            ${tagLabels.length ? `
              <div class="criar-card-refazer-tags">
                ${tagLabels.map(l => `<span class="criar-card-refazer-tag">${escapeHtml(l)}</span>`).join('')}
              </div>` : ''}
            ${adj?.comment ? `
              <div class="criar-card-refazer-comment">
                <div class="criar-card-refazer-comment-kicker">Comentário</div>
                <div class="criar-card-refazer-comment-text">${escapeHtml(adj.comment)}</div>
              </div>` : ''}
            ${adj?.videoUrl ? `
              <div class="criar-card-refazer-comment">
                <div class="criar-card-refazer-comment-kicker">Vídeo de direcionamento</div>
                <video src="${escapeHtml(adj.videoUrl)}" controls preload="metadata" playsinline style="width: 100%; max-height: 320px; margin-top: 8px; border-radius: 8px; background: #000;"></video>
              </div>` : ''}
          </div>
        `;
      } else {
        headerBlock = `
          <div class="criar-card-header">
            <div class="criar-card-kicker">Novo card</div>
            <div class="criar-card-title">Vai pra fila da Isabelle aprovar</div>
          </div>
        `;
      }

      const submitLabel = isRefazer ? 'Reenviar pra Isabelle' : 'Enviar pra fila';

      return `
        <section class="criar-card-form ${isRefazer ? 'is-refazer' : ''}">
          ${headerBlock}

          <!-- Upload de mídia -->
          <div class="criar-card-field">
            <label class="criar-card-label">Mídia ${isRefazer ? '(troca se quiser)' : '(opcional)'}</label>
            <div class="criar-card-upload ${previewSrc ? 'has-preview' : ''}" id="criar-upload-zone">
              ${previewSrc
                ? `<img src="${previewSrc}" alt="Pré-visualização" class="criar-card-preview" />
                   <button type="button" class="criar-card-remove" id="criar-remove-img" aria-label="Remover imagem">×</button>`
                : `<div class="criar-card-upload-placeholder">
                     <div class="criar-card-upload-icon">📸</div>
                     <div class="criar-card-upload-cta">Toca pra escolher uma foto</div>
                     <div class="criar-card-upload-hint">JPEG/PNG até ~5MB. Comprime automaticamente.</div>
                   </div>`
              }
              <input type="file" id="criar-card-file" accept="image/*" style="display: none;" />
            </div>
          </div>

          <!-- Upload de vídeo (S2.6) -->
          <div class="criar-card-field">
            <label class="criar-card-label">Vídeo (opcional)</label>
            <div class="criar-card-upload ${pendingVideoUrl ? 'has-preview' : ''}" id="criar-video-zone" style="min-height: 80px;">
              ${pendingVideoUrl
                ? `<div style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; width: 100%;">
                     <div style="font-size: 24px;">📹</div>
                     <div style="flex: 1; min-width: 0;">
                       <div style="font-weight: 600; font-size: 14px; color: var(--text, #F2F2F2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                         ${escapeHtml(pendingVideoMeta?.name || 'vídeo.mp4')}
                       </div>
                       <div style="font-size: 12px; color: var(--text-secondary, #A0A0A0); margin-top: 2px;">
                         ${pendingVideoMeta?.size ? Math.round(pendingVideoMeta.size / (1024 * 1024)) + 'MB · ' : ''}Anexado
                       </div>
                     </div>
                     <button type="button" class="criar-card-remove" id="criar-remove-video" aria-label="Remover vídeo" style="position: static;">×</button>
                   </div>`
                : `<div class="criar-card-upload-placeholder">
                     <div class="criar-card-upload-icon">📹</div>
                     <div class="criar-card-upload-cta">Toca pra anexar vídeo</div>
                     <div class="criar-card-upload-hint">MP4/MOV/WEBM até 100MB. Exporte do rascunho do Instagram.</div>
                   </div>`
              }
              <input type="file" id="criar-card-video-file" accept="video/mp4,video/quicktime,video/webm,.mp4,.mov,.webm" style="display: none;" />
            </div>
            <div id="criar-card-video-progress" style="display: none; margin-top: 10px;">
              <div style="display: flex; justify-content: space-between; font-size: 12px; color: var(--text-secondary, #A0A0A0); margin-bottom: 4px;">
                <span>Subindo… <span id="criar-card-video-pct">0</span>%</span>
                <span id="criar-card-video-eta"></span>
              </div>
              <div style="height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden;">
                <div id="criar-card-video-bar" style="height: 100%; width: 0%; background: #07D379; transition: width 0.2s ease;"></div>
              </div>
            </div>
          </div>

          <!-- Peça (title curto) -->
          <div class="criar-card-field">
            <label class="criar-card-label" for="criar-card-title-input">Peça ou contexto</label>
            <input
              type="text"
              id="criar-card-title-input"
              class="criar-card-input"
              maxlength="60"
              placeholder="Ex: Vestido vinho longo"
              value="${escapeHtml(titleVal)}"
            />
          </div>

          <!-- Copy (concept) -->
          <div class="criar-card-field">
            <label class="criar-card-label" for="criar-card-concept-input">Copy / contexto</label>
            <textarea
              id="criar-card-concept-input"
              class="criar-card-textarea"
              maxlength="500"
              rows="4"
              placeholder="O que você queria dizer? Como abordar?"
            >${escapeHtml(conceptVal)}</textarea>
          </div>

          <!-- Chips origem -->
          <div class="criar-card-field">
            <label class="criar-card-label">Origem</label>
            <div class="criar-card-chips" role="radiogroup">
              ${origins.map(o => `
                <button type="button"
                  class="criar-card-chip ${pendingOrigin === o.id ? 'active' : ''}"
                  data-origin="${o.id}"
                  role="radio"
                  aria-checked="${pendingOrigin === o.id}"
                  style="${pendingOrigin === o.id ? `border-color: ${o.color}; color: ${o.color};` : ''}">
                  ${escapeHtml(o.label)}
                </button>
              `).join('')}
            </div>
          </div>

          <!-- Submit -->
          <div class="criar-card-footer">
            <button type="button" class="btn-primary criar-card-submit" id="criar-card-submit">
              ${escapeHtml(submitLabel)}
            </button>
          </div>

    function bindCriarCardHandlers() {
      const uploadZone = document.getElementById('criar-upload-zone');
      const fileInput = document.getElementById('criar-card-file');
      const removeBtn = document.getElementById('criar-remove-img');
      const submitBtn = document.getElementById('criar-card-submit');
      const titleInput = document.getElementById('criar-card-title-input');
      const conceptInput = document.getElementById('criar-card-concept-input');

      // Click na zona de upload abre file picker
      if (uploadZone && fileInput) {
        uploadZone.addEventListener('click', (e) => {
          // Se clicou no remove, não abre picker
          if (e.target.closest('#criar-remove-img')) return;
          if (!pendingImageBase64) fileInput.click();
        });
      }

      // Seleção de arquivo → comprime → preview
      if (fileInput) {
        fileInput.addEventListener('change', async (e) => {
          const file = e.target.files && e.target.files[0];
          if (!file) return;
          try {
            showToast('Comprimindo imagem…');
            const base64 = await compressImageToBase64(file, 1200, 0.7);
            pendingImageBase64 = base64;
            // Re-render só desta tab
            const main = document.querySelector('.executora-main');
            if (main) {
              main.innerHTML = renderCriarCardHTML();
              bindCriarCardHandlers();
              // Restaura valores que estavam digitados
              const newTitle = document.getElementById('criar-card-title-input');
              const newConcept = document.getElementById('criar-card-concept-input');
              if (newTitle) newTitle.value = titleInput?.value || '';
              if (newConcept) newConcept.value = conceptInput?.value || '';
            }
          } catch (err) {
            console.warn('[compress] erro:', err);
            showToast('Não consegui ler essa imagem.');
          }
          // Limpa file input pra permitir selecionar mesmo arquivo de novo
          fileInput.value = '';
        });
      }

      // Remover imagem
      if (removeBtn) {
        removeBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          pendingImageBase64 = null;
          const main = document.querySelector('.executora-main');
          if (main) {
            main.innerHTML = renderCriarCardHTML();
            bindCriarCardHandlers();
            const newTitle = document.getElementById('criar-card-title-input');
            const newConcept = document.getElementById('criar-card-concept-input');
            if (newTitle) newTitle.value = titleInput?.value || '';
            if (newConcept) newConcept.value = conceptInput?.value || '';
          }
        });
      }

      // ----- S2.6: Handlers de upload de vídeo -----
      const videoZone = document.getElementById('criar-video-zone');
      const videoInput = document.getElementById('criar-card-video-file');
      const videoRemoveBtn = document.getElementById('criar-remove-video');
      const videoProgress = document.getElementById('criar-card-video-progress');
      const videoPct = document.getElementById('criar-card-video-pct');

      if (videoZone && videoInput) {
        videoZone.addEventListener('click', (e) => {
          if (e.target.closest('#criar-remove-video')) return;
          if (!pendingVideoUrl) videoInput.click();
        });
      }

      if (videoInput) {
        videoInput.addEventListener('change', async (e) => {
          const file = e.target.files && e.target.files[0];
          if (!file) return;
          const val = validateVideo(file);
          if (!val.ok) {
            showToast(val.error);
            videoInput.value = '';
            return;
          }
          // Mostra progress, esconde zona enquanto sobe
          if (videoProgress) videoProgress.style.display = 'block';
          if (videoZone) videoZone.style.opacity = '0.5';
          try {
            const tempCardId = refazerCardState.cardId || generateCardId();
            const videoBar = document.getElementById('criar-card-video-bar');
            const videoEta = document.getElementById('criar-card-video-eta');
            const url = await uploadVideoToStorage(
              file,
              state.clientSlug || 'unknown',
              tempCardId,
              (pct, etaSec) => {
                if (videoPct) videoPct.textContent = Math.round(pct);
                if (videoBar) videoBar.style.width = pct + '%';
                if (videoEta) videoEta.textContent = formatUploadEta(etaSec);
              }
            );
            pendingVideoUrl = url;
            pendingVideoMeta = { name: file.name, size: file.size, mime: file.type };
            showToast('✓ Vídeo anexado');
            // Re-render preservando inputs
            const titleVal = (document.getElementById('criar-card-title-input') || {}).value || '';
            const conceptVal = (document.getElementById('criar-card-concept-input') || {}).value || '';
            const main = document.querySelector('.executora-main');
            if (main) {
              main.innerHTML = renderCriarCardHTML();
              bindCriarCardHandlers();
              const nt = document.getElementById('criar-card-title-input');
              const nc = document.getElementById('criar-card-concept-input');
              if (nt) nt.value = titleVal;
              if (nc) nc.value = conceptVal;
            }
          } catch (err) {
            console.warn('[uploadVideo] erro:', err);
            showToast('Não consegui subir o vídeo. Tenta de novo.');
            if (videoProgress) videoProgress.style.display = 'none';
            if (videoZone) videoZone.style.opacity = '1';
          }
          videoInput.value = '';
        });
      }

      if (videoRemoveBtn) {
        videoRemoveBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          pendingVideoUrl = '';
          pendingVideoMeta = null;
          const titleVal = (document.getElementById('criar-card-title-input') || {}).value || '';
          const conceptVal = (document.getElementById('criar-card-concept-input') || {}).value || '';
          const main = document.querySelector('.executora-main');
          if (main) {
            main.innerHTML = renderCriarCardHTML();
            bindCriarCardHandlers();
            const nt = document.getElementById('criar-card-title-input');
            const nc = document.getElementById('criar-card-concept-input');
            if (nt) nt.value = titleVal;
            if (nc) nc.value = conceptVal;
          }
        });
      }

      // Chips de origem
      document.querySelectorAll('[data-origin]').forEach(chip => {
        chip.addEventListener('click', () => {
          pendingOrigin = chip.getAttribute('data-origin');
          // Atualiza visual sem full re-render (só toggle de classes)
          document.querySelectorAll('[data-origin]').forEach(c => {
            const isActive = c.getAttribute('data-origin') === pendingOrigin;
            c.classList.toggle('active', isActive);
            c.setAttribute('aria-checked', isActive ? 'true' : 'false');
            const o = CARD_ORIGINS.find(x => x.id === c.getAttribute('data-origin'));
            c.setAttribute('style', isActive ? `border-color: ${o.color}; color: ${o.color};` : '');
          });
        });
      });

      // C4.1 — botão voltar pra lista (modo refazer)
      const refazerBackBtn = document.getElementById('criar-card-refazer-back');
      if (refazerBackBtn) {
        refazerBackBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          cancelarRefazer();
        });
      }

      // Submit
      if (submitBtn) {
        const isRefazer = !!refazerCardState.cardId;
        const defaultLabel = isRefazer ? 'Reenviar pra Isabelle' : 'Enviar pra fila';
        submitBtn.addEventListener('click', async () => {
          const title = titleInput?.value || '';
          const concept = conceptInput?.value || '';
          submitBtn.disabled = true;
          submitBtn.textContent = isRefazer ? 'Reenviando…' : 'Enviando…';
          try {
            if (isRefazer) {
              await reenviarCardAjustado(refazerCardState.cardId, {
                title,
                concept,
                origin: pendingOrigin,
                referenceImage: pendingImageBase64 || '',
                videoUrl: pendingVideoUrl || ''
              });
              // Reset estado refazer + criar
              refazerCardState = { cardId: null };
              pendingImageBase64 = null;
              pendingVideoUrl = '';
              pendingVideoMeta = null;
              pendingOrigin = 'pauta';
              // Decide pra onde voltar: se ainda tem outros pra refazer, lista;
              // caso contrário, Hub.
              const restantes = getCardsParaRefazer();
              state.executoraTab = restantes.length > 0 ? 'refazer' : 'hub';
              renderExecutoraShell();
            } else {
              await criarCardJamily({
                title,
                concept,
                origin: pendingOrigin,
                referenceImage: pendingImageBase64 || '',
                videoUrl: pendingVideoUrl || ''
              });
              // Reset
              pendingImageBase64 = null;
              pendingVideoUrl = '';
              pendingVideoMeta = null;
              pendingOrigin = 'pauta';
              // Volta pro Hub (mostra que entrou na fila)
              state.executoraTab = 'hub';
              renderExecutoraShell();
            }
          } catch (e) {
            // Erro já mostrou toast em criarCardJamily / reenviarCardAjustado
            submitBtn.disabled = false;
            submitBtn.textContent = defaultLabel;
          }
        });
      }
    }

    // ----- C4.1 — Refazer (lista + navegação) -----

    function openRefazerCard(cardId) {
      const card = (state.clientData && state.clientData.cards && state.clientData.cards[cardId]) || null;
      if (!card) { showToast('Card não encontrado.'); return; }
      refazerCardState = { cardId };
      pendingImageBase64 = card.referenceImage || null;
      pendingVideoUrl = card.videoUrl || '';
      pendingVideoMeta = card.videoUrl ? { name: 'vídeo anterior', size: 0, mime: '' } : null;
      pendingOrigin = card.origin || 'pauta';
      state.executoraTab = 'criar';
      renderExecutoraShell();
    }

    function cancelarRefazer() {
      refazerCardState = { cardId: null };
      pendingImageBase64 = null;
      pendingVideoUrl = '';
      pendingVideoMeta = null;
      pendingOrigin = 'pauta';
      state.executoraTab = 'refazer';
      renderExecutoraShell();
    }

    function renderRefazerListaHTML() {

        return `
          <div class="refazer-screen">
            <button type="button" class="refazer-back" id="refazer-back-hub-btn">
              ← Voltar pro Hub
            </button>
            <div class="refazer-empty">
              <div class="refazer-empty-icon">✓</div>
              <div class="refazer-empty-title">Nada pra refazer</div>
              <div class="refazer-empty-sub">Tudo em dia. Os ajustes que a Isabelle pedir aparecem aqui.</div>
            </div>
          </div>
        `;
      }

      return `
        <div class="refazer-screen">
          <button type="button" class="refazer-back" id="refazer-back-hub-btn">
            ← Voltar pro Hub
          </button>
          <div class="refazer-header">
            <div class="refazer-header-kicker">Ajustes pra refazer · ${lista.length}</div>
            <div class="refazer-header-sub">Mais antigos primeiro. Toca num card pra abrir e editar.</div>
          </div>
          <div class="refazer-list">
            ${lista.map(({ card, adjustment }) => {
              const title = card.title || card.concept?.slice(0, 40) || '(sem título)';
              const tags = (adjustment.tags || []).map(tid => {
                const t = ADJUSTMENT_TAGS.find(x => x.id === tid);
                return t ? t.label : tid;
              });
              const comment = adjustment.comment || '';
              const requestedLabel = formatTimeAgo(adjustment.requestedAt || 0);
              // S2.6 bug-fix: thumb com badge 📹 quando tem vídeo (não clicável aqui — botão pai navega pro Refazer)
              let thumbHtml;
              if (card.videoUrl && card.referenceImage) {
                thumbHtml = `<img class="refazer-item-thumb-img" src="${escapeHtml(card.referenceImage)}" alt="" />
                             <div style="position: absolute; right: 4px; bottom: 4px; background: rgba(0,0,0,0.7); color: #fff; border-radius: 12px; padding: 2px 6px; font-size: 11px;">📹</div>`;
              } else if (card.videoUrl) {
                thumbHtml = `<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; background: #1A1A1A; color: #F2F2F2; gap: 4px;">
                               <div style="font-size: 24px;">📹</div>
                               <div style="font-size: 9px; color: #A0A0A0; letter-spacing: 0.5px;">VÍDEO</div>
                             </div>`;

                <button type="button" class="refazer-item" data-refazer-card="${escapeHtml(card.id)}">

                      <div class="refazer-item-tags">
                        ${tags.map(l => `<span class="refazer-item-tag">${escapeHtml(l)}</span>`).join('')}
                      </div>` : ''}
                    ${comment ? `<div class="refazer-item-comment">${escapeHtml(comment)}</div>` : ''}
                  </div>
                  <div class="refazer-item-chevron">›</div>
                </button>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }

      const backBtn = document.getElementById('refazer-back-hub-btn');
      if (backBtn) {
        backBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          state.executoraTab = 'hub';
          renderExecutoraShell();
        });
      }
      document.querySelectorAll('[data-refazer-card]').forEach(btn => {

          e.stopPropagation();
          const cardId = btn.getAttribute('data-refazer-card');

      });

    // ----- Hub Jamily (C2) -----

    function renderHubJamilyHTML(pautaHoje) {
      const proxima = getProximaJanela();
      const stats = getHubStats();
      const aprovados = getCardsAprovadosPraPostar();
      const todayKey = getPautaTodayKey();
      const todayLabel = formatDateShort(todayKey);

      // Card pauta
      const pautaCard = pautaHoje && pautaHoje.texto
        ? `
          <div class="hub-card hub-card-pauta">
            <div class="hub-card-kicker">Pauta de hoje · ${escapeHtml(todayLabel)}</div>
            <div class="hub-card-pauta-text">${escapeHtml(pautaHoje.texto)}</div>
          </div>`
        : `
          <div class="hub-card hub-card-pauta is-empty">
            <div class="hub-card-kicker">Pauta de hoje · ${escapeHtml(todayLabel)}</div>
            <div class="hub-card-pauta-empty">A Isabelle ainda não escreveu a pauta de hoje. Aproveita pra organizar referências.</div>
          </div>`;

      // Card próxima janela
      const proximaClass = proxima.isAgora ? 'is-agora' : (proxima.isAmanha ? 'is-amanha' : '');
      const janelaCard = `
        <div class="hub-card hub-card-janela ${proximaClass}">
          <div class="hub-card-kicker">Próxima janela da Isabelle</div>
          <div class="hub-card-janela-text">${escapeHtml(formatProximaJanela(proxima))}</div>
        </div>`;

      // C4.1 — Banner de ajustes pendentes (Caminho C). Só aparece se houver
      // cards com lastAdjustment.resolved=false. Click vai pra tab virtual
      // 'refazer' (não exposta na bottom nav).
      const refazerBanner = stats.paraRefazer > 0
        ? `
          <button type="button" class="hub-refazer-banner" id="hub-refazer-banner-btn">
            <span class="hub-refazer-banner-icon">⚠</span>
            <span class="hub-refazer-banner-text">
              <span class="hub-refazer-banner-title">${stats.paraRefazer} ${stats.paraRefazer === 1 ? 'ajuste' : 'ajustes'} pra refazer</span>
              <span class="hub-refazer-banner-sub">A Isabelle pediu mudança. Toca pra ver.</span>
            </span>
            <span class="hub-refazer-banner-chevron">→</span>
          </button>`
        : '';

      // Stats compactos
      const statsBlock = `
        <div class="hub-stats">
          <div class="hub-stat">
            <span class="hub-stat-num">${stats.aprovados}</span>
            <span class="hub-stat-label">prontos pra postar</span>
          </div>
          <div class="hub-stat">
            <span class="hub-stat-num">${stats.naFila}</span>
            <span class="hub-stat-label">na fila</span>
          </div>
          <div class="hub-stat">
            <span class="hub-stat-num">${stats.postadosHoje}</span>
            <span class="hub-stat-label">postados hoje</span>
          </div>
        </div>`;

      // Bloco aprovados
      const aprovadosBlock = aprovados.length === 0
        ? `
          <div class="hub-section">

    function bindHubJamilyHandlers() {

    // ============================================================
    // S2.5* DELEGAÇÃO CLOSET — sheet POV Isabelle (C1 stub, C2-C4 plugam telas)
    // ============================================================

    // Estado local do sheet de delegação. Tab persiste entre re-aberturas
    // do sheet dentro da mesma sessão (recém-abriu Pauta, fechou, abriu de
    // novo → volta em Pauta).
    let delegacaoSheetTab = 'pauta';

    async function openDelegacaoSheet() {
      const slug = state.clientSlug || '';
      const internas = state.clientPersonasInternas || {};
      const hasExecutora = Object.keys(internas).length > 0;
      const tab = delegacaoSheetTab;

      // C2: pré-carrega pauta de hoje + histórico (async) antes do render.
      // Cards já estão em state.clientData (listener) — não precisa await.
      let pautaHoje = null;
      let historico = {};
      if (hasExecutora && (tab === 'pauta' || tab === 'historico')) {
        try {
          [pautaHoje, historico] = await Promise.all([
            loadPautaDoDia(slug),
            loadPautaUltimas3(slug)
          ]);
        } catch (e) {
          console.warn('[delegacao] load pauta falhou:', e);
        }
      }

      const content = `
        <div class="sheet-header">
          <div class="sheet-kicker">Delegação · ${escapeHtml(state.clientData?.meta?.name || slug)}</div>

            <button type="button" class="delegacao-tab ${tab === 'fila' ? 'active' : ''}" data-deleg-tab="fila" role="tab">Fila</button>
            <button type="button" class="delegacao-tab ${tab === 'referencias' ? 'active' : ''}" data-deleg-tab="referencias" role="tab">Referências</button>
            <button type="button" class="delegacao-tab ${tab === 'historico' ? 'active' : ''}" data-deleg-tab="historico" role="tab">Histórico</button>
          </div>

          <div class="delegacao-body">
            ${hasExecutora ? renderDelegacaoTabContent(tab, { pautaHoje, historico }) : `
              <div class="delegacao-empty">
                <div class="delegacao-empty-title">Sem executora cadastrada</div>
                <div class="delegacao-empty-sub">Este cliente ainda não tem nenhuma persona em <code>personasInternas</code>. Cadastre uma no Realtime DB pra ativar a delegação.</div>
              </div>
            `}
          </div>
        </div>

      openSheet('delegacao', content);

          e.stopPropagation();

          delegacaoSheetTab = newTab;
          openDelegacaoSheet(); // re-render

      if (tab === 'fila'        && hasExecutora) bindFilaBulkHandlers();

    // Render do conteúdo de cada tab. C2 plugou 'pauta' e 'historico'.
    // C3 substitui 'fila', C4 não muda (sub-fluxo dentro da fila).
    // C5.1 adiciona 'referencias' (biblioteca pedagógica POV Isabelle).
    function renderDelegacaoTabContent(tab, data) {
      data = data || {};
      if (tab === 'pauta') {
        return renderPautaPanelHTML(data.pautaHoje);
      }
      if (tab === 'fila') {
        return renderFilaBulkHTML();
      }
      if (tab === 'referencias') {
        return renderReferenciasTabHTML();
      }
      if (tab === 'historico') {
        return renderPautaHistoricoHTML(data.historico);
      }
      return '';
    }

    // ----- Fila Bulk (Isabelle, C3) -----

    function renderFilaBulkHTML() {

      if (pedirAjusteState.cardId) {

    function renderFilaItemHTML(card) {

            ${conceptPreview ? `<div class="fila-item-concept">${escapeHtml(conceptPreview)}</div>` : ''}
            <div class="fila-item-actions">
              <button type="button" class="fila-btn-ajuste" data-deleg-ajuste="${escapeHtml(card.id)}">Pedir ajuste</button>

    function bindFilaBulkHandlers() {
      // C4: se em modo ajuste, bind handlers da tela de ajuste em vez dos da fila
      if (pedirAjusteState.cardId) {

    // ----- Modal de imagem expandida (Polish C5) -----
    // Overlay full-screen com a imagem em tamanho real. Click em qualquer
    // lugar fecha. Suporta tecla Esc também.
    function openImageModal(src) {
      const overlay = document.createElement('div');
      overlay.className = 'img-modal-overlay';
      overlay.innerHTML = `
        <img class="img-modal-img" src="${escapeHtml(src)}" alt="" />
        <button type="button" class="img-modal-close" aria-label="Fechar">×</button>
      `;
      document.body.appendChild(overlay);
      const close = () => {
        if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
        document.removeEventListener('keydown', escHandler);
      };
      const escHandler = (e) => { if (e.key === 'Escape') close(); };
      overlay.addEventListener('click', close);
      document.addEventListener('keydown', escHandler);
    }

    // S2.6 bug-fix: modal pra tocar vídeo em fullscreen ao clicar no thumb.
    // Mesma UX do openImageModal (click em qualquer lugar fora do vídeo fecha).
    function openVideoModal(src) {
      const overlay = document.createElement('div');
      overlay.className = 'img-modal-overlay';
      overlay.innerHTML = `
        <video class="img-modal-img" src="${escapeHtml(src)}" controls autoplay playsinline style="max-width: 96vw; max-height: 92vh; background: #000;"></video>
        <button type="button" class="img-modal-close" aria-label="Fechar">×</button>
      `;
      document.body.appendChild(overlay);
      const videoEl = overlay.querySelector('video');
      const close = () => {
        if (videoEl) { try { videoEl.pause(); } catch (e) {} }
        if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
        document.removeEventListener('keydown', escHandler);
      };
      const escHandler = (e) => { if (e.key === 'Escape') close(); };
      // Click no overlay fecha — mas NÃO no vídeo (pra não fechar ao clicar play/pause).
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay || e.target.classList.contains('img-modal-close')) close();
      });
      document.addEventListener('keydown', escHandler);
    }

    // C4: ativa "modo ajuste" da aba Fila (mesma sheet, conteúdo substitui).

    function bindPedirAjusteHandlers() {
      // Click no thumb do resumo expande imagem em modal
      document.querySelectorAll('[data-img-expand]').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          const src = el.getAttribute('data-img-expand');
          if (src) openImageModal(src);
        });
      });
      // S2.6 bug-fix: click no thumb com vídeo abre player em modal
      document.querySelectorAll('[data-video-expand]').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          const src = el.getAttribute('data-video-expand');
          if (src) openVideoModal(src);
        });
      });
      const backBtn = document.getElementById('ajuste-back-btn');
      const cancelBtn = document.getElementById('ajuste-cancel-btn');
      const submitBtn = document.getElementById('ajuste-submit-btn');
      const textarea = document.getElementById('ajuste-comment');
      const counter = document.getElementById('ajuste-counter-value');

      // Voltar/cancelar
      [backBtn, cancelBtn].forEach(btn => {
        if (!btn) return;
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          cancelarPedirAjuste();
        });
      });

      // Chips de tag (toggle)
      document.querySelectorAll('[data-ajuste-tag]').forEach(chip => {
        chip.addEventListener('click', (e) => {
          e.stopPropagation();
          const tagId = chip.getAttribute('data-ajuste-tag');
          const tags = pedirAjusteState.tags || [];
          const idx = tags.indexOf(tagId);
          if (idx >= 0) tags.splice(idx, 1); else tags.push(tagId);
          pedirAjusteState.tags = tags;
          // Toggle visual sem full re-render
          const isActive = tags.includes(tagId);
          chip.classList.toggle('active', isActive);
          chip.setAttribute('aria-pressed', isActive ? 'true' : 'false');
        });
      });

      // Textarea — sincroniza state + atualiza counter + libera botão
      if (textarea && counter && submitBtn) {
        // Focus pra começar a digitar de cara
        setTimeout(() => textarea.focus(), 80);
        textarea.addEventListener('input', () => {
          pedirAjusteState.comment = textarea.value;
          counter.textContent = String(textarea.value.length);
          submitBtn.disabled = textarea.value.trim().length < 10;
        });
      }

      // ----- S2.6: handlers de upload de vídeo de direcionamento -----
      const ajVideoZone = document.getElementById('ajuste-video-zone');
      const ajVideoInput = document.getElementById('ajuste-video-file');
      const ajVideoRemove = document.getElementById('ajuste-remove-video');
      const ajVideoProgress = document.getElementById('ajuste-video-progress');
      const ajVideoPct = document.getElementById('ajuste-video-pct');

      if (ajVideoZone && ajVideoInput) {
        ajVideoZone.addEventListener('click', (e) => {
          if (e.target.closest('#ajuste-remove-video')) return;
          if (!pedirAjusteState.videoUrl) ajVideoInput.click();
        });
      }

      if (ajVideoInput) {
        ajVideoInput.addEventListener('change', async (e) => {
          const file = e.target.files && e.target.files[0];
          if (!file) return;
          const val = validateVideo(file);
          if (!val.ok) {
            showToast(val.error);
            ajVideoInput.value = '';
            return;
          }
          if (ajVideoProgress) ajVideoProgress.style.display = 'block';
          if (ajVideoZone) ajVideoZone.style.opacity = '0.5';
          try {
            const ajVideoBar = document.getElementById('ajuste-video-bar');
            const ajVideoEta = document.getElementById('ajuste-video-eta');
            const url = await uploadVideoToStorage(
              file,
              state.clientSlug || 'unknown',
              pedirAjusteState.cardId || 'unknown',
              (pct, etaSec) => {
                if (ajVideoPct) ajVideoPct.textContent = Math.round(pct);
                if (ajVideoBar) ajVideoBar.style.width = pct + '%';
                if (ajVideoEta) ajVideoEta.textContent = formatUploadEta(etaSec);
              }
            );
            pedirAjusteState.videoUrl = url;
            pedirAjusteState.videoMeta = { name: file.name, size: file.size, mime: file.type };
            showToast('✓ Vídeo anexado');
            // Reabre sheet pra refletir o vídeo no estado
            if (sheetState.open && sheetState.type === 'delegacao') {
              openDelegacaoSheet();
            }
          } catch (err) {
            console.warn('[ajuste uploadVideo] erro:', err);
            showToast('Não consegui subir o vídeo. Tenta de novo.');
            if (ajVideoProgress) ajVideoProgress.style.display = 'none';
            if (ajVideoZone) ajVideoZone.style.opacity = '1';
          }
          ajVideoInput.value = '';
        });
      }

      if (ajVideoRemove) {
        ajVideoRemove.addEventListener('click', (e) => {
          e.stopPropagation();
          pedirAjusteState.videoUrl = '';
          pedirAjusteState.videoMeta = null;
          if (sheetState.open && sheetState.type === 'delegacao') {
            openDelegacaoSheet();
          }
        });
      }

      // Submit
      if (submitBtn) {
        submitBtn.addEventListener('click', async (e) => {
          e.stopPropagation();
          if (submitBtn.disabled) return;
          submitBtn.disabled = true;
          submitBtn.textContent = 'Enviando…';
          try {
            await pedirAjusteCard(
              pedirAjusteState.cardId,
              pedirAjusteState.tags,
              pedirAjusteState.comment,
              pedirAjusteState.videoUrl
            );
            // sucesso: pedirAjusteCard já reseta state + re-renderiza
          } catch (err) {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Enviar ajuste';
          }
        });
      }
    }

    function bindReferenciasTabHandlers() {
      if (referenciaFormState.mode === 'create' || referenciaFormState.mode === 'edit') {
        bindReferenciaFormHandlers();
      } else {
        bindReferenciasListaHandlers();
      }
    }

    function bindReferenciasListaHandlers() {
      const createBtn = document.getElementById('ref-create-btn');
      if (createBtn) {
        createBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          referenciaFormState.mode = 'create';
          referenciaFormState.editingId = null;
          referenciaFormState.fields = { title: '', copy: '', notes: '', pieceTypes: [], shotTypes: [] };
          referenciaFormState.pendingImage = null;
          referenciaFormState.pendingVideoUrl = null;
          referenciaFormState.pendingVideoMeta = null;
          openDelegacaoSheet();
        });
      }
      document.querySelectorAll('[data-ref-edit]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const refId = btn.getAttribute('data-ref-edit');
          const existing = getReferenceById(refId);
          if (!existing) { showToast('Referência sumiu.'); return; }
          referenciaFormState.mode = 'edit';
          referenciaFormState.editingId = refId;
          referenciaFormState.fields = {
            title: existing.title || '',
            copy: existing.copy || '',
            notes: existing.notes || '',
            pieceTypes: Array.isArray(existing.pieceTypes) ? existing.pieceTypes.slice() : [],
            shotTypes: Array.isArray(existing.shotTypes) ? existing.shotTypes.slice() : []
          };
          referenciaFormState.pendingImage = null; // null = "usa existente"; só vira string se trocou
          referenciaFormState.pendingVideoUrl = null;  // mesma semântica
          referenciaFormState.pendingVideoMeta = existing.videoUrl ? { name: 'vídeo anterior', size: 0, mime: '' } : null;
          openDelegacaoSheet();
        });
      });
    }

    function bindReferenciaFormHandlers() {
      const uploadZone = document.getElementById('ref-form-upload-zone');
      const fileInput = document.getElementById('ref-form-file');
      const removeBtn = document.getElementById('ref-form-remove-img');
      const titleInput = document.getElementById('ref-form-title-input');
      const copyInput = document.getElementById('ref-form-copy-input');
      const notesInput = document.getElementById('ref-form-notes-input');
      const submitBtn = document.getElementById('ref-form-submit-btn');
      const deleteBtn = document.getElementById('ref-form-delete-btn');
      const backBtn = document.getElementById('ref-form-back-btn');

      // Helper — sincroniza inputs pra state.fields (chamado antes de re-renders).
      // pieceTypes/shotTypes não vêm de input, vêm do state (chips toggleam direto).
      function syncFieldsFromInputs() {
        referenciaFormState.fields = {
          title: titleInput?.value || '',
          copy: copyInput?.value || '',
          notes: notesInput?.value || '',
          pieceTypes: Array.isArray(referenciaFormState.fields?.pieceTypes)
            ? referenciaFormState.fields.pieceTypes : [],
          shotTypes: Array.isArray(referenciaFormState.fields?.shotTypes)
            ? referenciaFormState.fields.shotTypes : []
        };
      }

      // Chips de tags (peça + plano) — toggle no array do state, sem full re-render
      document.querySelectorAll('[data-piece-tag]').forEach(chip => {
        chip.addEventListener('click', (e) => {
          e.stopPropagation();
          syncFieldsFromInputs();
          const tagId = chip.getAttribute('data-piece-tag');
          const arr = referenciaFormState.fields.pieceTypes || [];
          const idx = arr.indexOf(tagId);
          if (idx >= 0) arr.splice(idx, 1); else arr.push(tagId);
          referenciaFormState.fields.pieceTypes = arr;
          const isActive = arr.includes(tagId);
          chip.classList.toggle('active', isActive);
          chip.setAttribute('aria-pressed', isActive ? 'true' : 'false');
        });
      });
      document.querySelectorAll('[data-shot-tag]').forEach(chip => {
        chip.addEventListener('click', (e) => {
          e.stopPropagation();
          syncFieldsFromInputs();
          const tagId = chip.getAttribute('data-shot-tag');
          const arr = referenciaFormState.fields.shotTypes || [];
          const idx = arr.indexOf(tagId);
          if (idx >= 0) arr.splice(idx, 1); else arr.push(tagId);
          referenciaFormState.fields.shotTypes = arr;
          const isActive = arr.includes(tagId);
          chip.classList.toggle('active', isActive);
          chip.setAttribute('aria-pressed', isActive ? 'true' : 'false');
        });
      });

      // Voltar pra lista (descarta alterações não salvas — sem confirm,
      // formulário ainda pequeno o suficiente pra não justificar atrito)
      if (backBtn) {
        backBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          resetReferenciaFormState();
          openDelegacaoSheet();
        });
      }

      // Upload zone abre file picker
      if (uploadZone && fileInput) {
        uploadZone.addEventListener('click', (e) => {
          if (e.target.closest('#ref-form-remove-img')) return;
          // Se já tem preview (pending ou existing) só permite trocar via remove primeiro
          const hasPreview = referenciaFormState.pendingImage != null
            || (referenciaFormState.mode === 'edit' && !!(getReferenceById(referenciaFormState.editingId)?.mediaBase64));
          if (!hasPreview) fileInput.click();
        });
      }

      if (fileInput) {
        fileInput.addEventListener('change', async (e) => {
          const file = e.target.files && e.target.files[0];
          if (!file) return;
          try {
            showToast('Comprimindo imagem…');
            const base64 = await compressImageToBase64(file, 1200, 0.7);
            syncFieldsFromInputs();
            referenciaFormState.pendingImage = base64;
            openDelegacaoSheet();
          } catch (err) {
            console.warn('[ref upload] erro:', err);
            showToast('Não consegui ler essa imagem.');
          }
          fileInput.value = '';
        });
      }

      // Remover imagem — limpa pending. Em modo edit, marca string vazia
      // pra distinguir "removeu" de "não trocou".
      if (removeBtn) {
        removeBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          syncFieldsFromInputs();
          referenciaFormState.pendingImage = '';
          openDelegacaoSheet();
        });
      }

      // ----- S2.6 Sessão 2: handlers de upload de vídeo de referência -----
      const refVideoZone = document.getElementById('ref-form-video-zone');
      const refVideoInput = document.getElementById('ref-form-video-file');
      const refVideoRemove = document.getElementById('ref-form-remove-video');
      const refVideoProgress = document.getElementById('ref-form-video-progress');
      const refVideoPct = document.getElementById('ref-form-video-pct');

      // Helper: tem vídeo? (pending novo OU existente do DB em modo edit)
      function refHasVideo() {
        if (referenciaFormState.pendingVideoUrl === '') return false; // removido
        if (referenciaFormState.pendingVideoUrl) return true;
        if (referenciaFormState.mode === 'edit') {
          const ex = getReferenceById(referenciaFormState.editingId);
          return !!(ex?.videoUrl);
        }
        return false;
      }

      if (refVideoZone && refVideoInput) {
        refVideoZone.addEventListener('click', (e) => {
          if (e.target.closest('#ref-form-remove-video')) return;
          if (!refHasVideo()) refVideoInput.click();
        });
      }

      if (refVideoInput) {
        refVideoInput.addEventListener('change', async (e) => {
          const file = e.target.files && e.target.files[0];
          if (!file) return;
          const val = validateVideo(file);
          if (!val.ok) {
            showToast(val.error);
            refVideoInput.value = '';
            return;
          }
          if (refVideoProgress) refVideoProgress.style.display = 'block';
          if (refVideoZone) refVideoZone.style.opacity = '0.5';
          try {
            syncFieldsFromInputs();
            // Path namespaced em 'refs/{slug}/{refId}-{ts}' pra separar de cards
            const refId = referenciaFormState.editingId || generateRefId();
            const refVideoBar = document.getElementById('ref-form-video-bar');
            const refVideoEta = document.getElementById('ref-form-video-eta');
            const url = await uploadVideoToStorage(
              file,
              state.clientSlug || 'unknown',
              'ref-' + refId,
              (pct, etaSec) => {
                if (refVideoPct) refVideoPct.textContent = Math.round(pct);
                if (refVideoBar) refVideoBar.style.width = pct + '%';
                if (refVideoEta) refVideoEta.textContent = formatUploadEta(etaSec);
              }
            );
            referenciaFormState.pendingVideoUrl = url;
            referenciaFormState.pendingVideoMeta = { name: file.name, size: file.size, mime: file.type };
            showToast('✓ Vídeo anexado');
            openDelegacaoSheet();
          } catch (err) {
            console.warn('[ref uploadVideo] erro:', err);
            showToast('Não consegui subir o vídeo. Tenta de novo.');
            if (refVideoProgress) refVideoProgress.style.display = 'none';
            if (refVideoZone) refVideoZone.style.opacity = '1';
          }
          refVideoInput.value = '';
        });
      }

      if (refVideoRemove) {
        refVideoRemove.addEventListener('click', (e) => {
          e.stopPropagation();
          syncFieldsFromInputs();
          referenciaFormState.pendingVideoUrl = '';  // marca removido (vs null = não trocou)
          referenciaFormState.pendingVideoMeta = null;
          openDelegacaoSheet();
        });
      }

      // Submit
      if (submitBtn) {
        submitBtn.addEventListener('click', async (e) => {
          e.stopPropagation();
          syncFieldsFromInputs();
          const isEdit = referenciaFormState.mode === 'edit';
          const editingId = referenciaFormState.editingId;
          // Decide qual imagem mandar:
          //  - pendingImage === null  → usa existing (não enviar campo no update)
          //  - pendingImage === ''    → apagou (envia '')
          //  - pendingImage string    → nova base64 (envia)
          let mediaBase64;
          if (isEdit) {
            if (referenciaFormState.pendingImage === null) {
              const ex = getReferenceById(editingId);
              mediaBase64 = ex?.mediaBase64 || '';
            } else {
              mediaBase64 = referenciaFormState.pendingImage || '';
            }
          } else {
            mediaBase64 = referenciaFormState.pendingImage || '';
          }

          // S2.6 Sessão 2: mesma lógica null/empty/string pra videoUrl
          let videoUrl;
          if (isEdit) {
            if (referenciaFormState.pendingVideoUrl === null) {
              const ex = getReferenceById(editingId);
              videoUrl = ex?.videoUrl || '';
            } else {
              videoUrl = referenciaFormState.pendingVideoUrl || '';
            }
          } else {
            videoUrl = referenciaFormState.pendingVideoUrl || '';
          }

          submitBtn.disabled = true;
          const origLabel = submitBtn.textContent;
          submitBtn.textContent = isEdit ? 'Salvando…' : 'Criando…';
          try {
            await saveReference({
              title: referenciaFormState.fields.title,
              copy: referenciaFormState.fields.copy,
              notes: referenciaFormState.fields.notes,
              pieceTypes: referenciaFormState.fields.pieceTypes || [],
              shotTypes: referenciaFormState.fields.shotTypes || [],
              mediaBase64,
              videoUrl
            }, editingId);
            resetReferenciaFormState();
            openDelegacaoSheet();
          } catch (err) {
            submitBtn.disabled = false;
            submitBtn.textContent = origLabel;
          }
        });
      }

      // Deletar (só edit)
      if (deleteBtn) {
        deleteBtn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const editingId = referenciaFormState.editingId;
          if (!editingId) return;
          if (!confirm('Apagar essa referência? A Jamily não vê mais na Galeria.')) return;
          deleteBtn.disabled = true;
          const origLabel = deleteBtn.textContent;
          deleteBtn.textContent = 'Apagando…';
          try {
            await deleteReference(editingId);
            resetReferenciaFormState();
            openDelegacaoSheet();
          } catch (err) {
            deleteBtn.disabled = false;
            deleteBtn.textContent = origLabel;
          }
        });
      }
    }

    function renderPautaHistoricoHTML(historicoObj) {

    // Paleta default — fallback caso branding.paleta não traga alguma chave.

      blush:       '#FDF0F5',
      blushLight:  '#FFF7FA',
      rose:        '#D3889C',
      roseSoft:    '#E5B0BF',
      mauve:       '#A6546A',
      mauveText:   '#6B3848',
      deep:        '#3A1E28',
      borderSoft:  '#F0DCE3'
    };

    // Favicon Sinapse (default quando não tem cliente carregado — master,

    // Nome da constante mantido por compat com call sites; apontava pra "C" verde, agora aponta pra hexágono verde.
    const CELULOSE_FAVICON_SVG = "./icon-192.png";

    function setFavicon(href) {

    // Title contextual da aba — útil quando Isabelle tem várias abas abertas.
    // 2026-05-19: rebranding Sinapse — app vira "Sinapse", agência ("Celulose Digital")
    // continua só nos welcome screens / PIN gates (contexto institucional).
    // Master: "Sinapse · Master"
    // Editor: "{cliente} · Editor — Sinapse"
    // Viewer: "{cliente} — Sinapse"
    // Sem cliente / gate: "Sinapse"
    function updatePageTitle() {
      const clientName = (state.clientData && state.clientData.meta && state.clientData.meta.name) || '';
      let title = 'Sinapse';
      if (state.mode === 'master') {
        title = 'Sinapse · Master';
      } else if (state.mode === 'editor' && clientName) {

    function applyBranding(branding) {
      branding = branding || {};
      const root = document.documentElement;

      // 1. PALETA — DEFAULT primeiro, depois sobrescreve com o que veio do Firebase.
      // Garante que mesmo se branding.paleta vier incompleto, todas as 8 vars estão setadas.
      const paleta = Object.assign({}, DEFAULT_PALETA, branding.paleta || {});
      Object.entries(paleta).forEach(([key, val]) => {
        // camelCase → kebab-case: blushLight → --blush-light
        const cssVar = '--' + key.replace(/([A-Z])/g, '-$1').toLowerCase();
        root.style.setProperty(cssVar, val);
      });

      // 2. PERSONA COLORS — namespace --persona-{personaId}.
      // Para cada persona conhecida em state.clientData.personas, garante que
      // --persona-{id} existe (mesmo que com fallback cinza).
      const personaIds = Object.keys((state.clientData && state.clientData.personas) || {});
      const personaColors = (branding.personaColors) || {};
      personaIds.forEach(id => {
        const hex = personaColors[id] || DEFAULT_PERSONA_COLOR;
        root.style.setProperty('--persona-' + id, hex);
      });
      // Também aplica qualquer cor declarada no branding mesmo se a persona
      // ainda não está em /personas (caso o branding chegue antes do /personas).
      Object.entries(personaColors).forEach(([id, hex]) => {
        root.style.setProperty('--persona-' + id, hex);
      });

      // 3. LOGO — background-image em .welcome-logo[data-brand-logo].
      // Se branding.logoUrl vazio/ausente, NÃO mexe (deixa o conteúdo textual aparecer).
      // PROMPT 12 / D-12.3: pre-probe via Image() pra detectar 404/CORS. Se falha,
      // aplica fallback "avatar com inicial" só nos .welcome-logo (kickers de editor
      // já mostram nome do cliente como texto, então logo ausente ali é OK).
      // FIX 09/05: seletor restrito a .welcome-logo — antes pegava todos
      // [data-brand-logo] e aplicava bg-image em cima do texto dos editor-kicker.
      if (branding.logoUrl) {
        const url = branding.logoUrl;
        const probe = new Image();
        probe.onload = () => {
          document.querySelectorAll('.welcome-logo[data-brand-logo]').forEach(el => {
            el.style.backgroundImage = 'url(' + url + ')';
            el.style.backgroundSize = 'contain';
            el.style.backgroundRepeat = 'no-repeat';
            el.style.backgroundPosition = 'center';
          });
          // Favicon dinâmico — usa logo do cliente na aba do navegador.
          setFavicon(url);
        };
        probe.onerror = () => {
          console.warn('[applyBranding] logoUrl falhou:', url);
          applyLogoFallback();
          // Logo do cliente falhou — volta favicon pra Celulose.
          setFavicon();
        };
        probe.src = url;
      } else {
        // Cliente sem logoUrl — favicon Celulose continua.
        setFavicon();
      }

      // Title da aba reflete cliente + modo.
      updatePageTitle();

      // 4. SAUDAÇÃO — textContent em [data-brand-greeting].
      if (typeof branding.saudacao === 'string' && branding.saudacao.length) {
        document.querySelectorAll('[data-brand-greeting]').forEach(el => {
          el.textContent = branding.saudacao;
        });
      }
    }

    // Helper pra ler a cor de uma persona em qualquer ponto do código.
    function getPersonaColor(personaId) {
      const branding = (state.clientData && state.clientData.branding) || {};
      return (branding.personaColors && branding.personaColors[personaId]) || DEFAULT_PERSONA_COLOR;
    }

    // PROMPT 12 / D-12.3: aplicado quando logoUrl falha em carregar.
    // Substitui textContent dos .welcome-logo[data-brand-logo] pela inicial do
    // nome do cliente em círculo mauve. Editor kickers ficam com texto puro
    // (já mostram "{Cliente} · Modo editor", então logo ausente é OK).
    function applyLogoFallback() {
      const clientName = (state.clientData && state.clientData.meta && state.clientData.meta.name)
        || state.clientSlug || '';
      const inicial = clientName.trim().charAt(0).toUpperCase() || '·';
      document.querySelectorAll('.welcome-logo[data-brand-logo]').forEach(el => {
        el.classList.add('is-logo-fallback');
        el.textContent = inicial;
      });
