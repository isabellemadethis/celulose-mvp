    // ----- C3: Criar Card (Jamily) + Fila Bulk (Isabelle) -----

    // Comprime imagem no front antes de salvar como base64.
    // Max 1200px lado maior, JPEG 0.7. Resultado típico ~80-120KB → base64 ~110-160KB.
    // Cabe folgado em 1MB de write do Realtime DB.
    function compressImageToBase64(file, maxDim, quality) {
      maxDim = maxDim || 1200;
      quality = quality || 0.7;
      return new Promise((resolve, reject) => {
        if (!file || !file.type || !file.type.startsWith('image/')) {
          reject(new Error('Arquivo não é imagem'));
          return;
        }
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            let w = img.width, h = img.height;
            if (w > maxDim || h > maxDim) {
              if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
              else       { w = Math.round(w * maxDim / h); h = maxDim; }
            }
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.onerror = () => reject(new Error('Falha ao carregar imagem'));
          img.src = e.target.result;
        };
        reader.onerror = () => reject(new Error('Falha ao ler arquivo'));
        reader.readAsDataURL(file);
      });
    }

    // ----- S2.6: Vídeo helpers (Firebase Storage, bucket us-central1) -----

    // Limites de validação confirmados pela Isabelle em 19/05 (D1/D2/D3).
    const VIDEO_MAX_BYTES = 100 * 1024 * 1024;   // 100MB (D2)
    const VIDEO_ALLOWED_MIMES = ['video/mp4', 'video/quicktime', 'video/webm'];
    const VIDEO_ALLOWED_EXT_FALLBACK = ['mp4', 'mov', 'webm']; // fallback p/ mobile que manda mime vazio

    // Valida arquivo de vídeo antes de subir. Retorna { ok: bool, error?: string }.
    function validateVideo(file) {
      if (!file) {
        return { ok: false, error: 'Nenhum arquivo selecionado.' };
      }
      const mime = (file.type || '').toLowerCase();
      const name = (file.name || '').toLowerCase();
      const ext = name.includes('.') ? name.split('.').pop() : '';
      const mimeOk = VIDEO_ALLOWED_MIMES.indexOf(mime) >= 0;
      const extOk = VIDEO_ALLOWED_EXT_FALLBACK.indexOf(ext) >= 0;
      if (!mimeOk && !extOk) {
        return { ok: false, error: 'Formato não aceito. Use .mp4, .mov ou .webm.' };
      }
      if (file.size > VIDEO_MAX_BYTES) {
        const mb = Math.round(file.size / (1024 * 1024));
        return { ok: false, error: 'Vídeo muito grande (' + mb + 'MB). Exporte primeiro do rascunho do Instagram pra ficar leve (limite 100MB).' };
      }
      return { ok: true };
    }

    // ---------- S2.8: Storage Explorer ----------

    // Formata bytes em string curta ("1.2MB", "500KB").
    function formatStorageBytes(bytes) {
      if (!bytes || bytes < 1024) return (bytes || 0) + 'B';
      if (bytes < 1024 * 1024) return Math.round(bytes / 1024) + 'KB';
      const mb = bytes / (1024 * 1024);
      return (mb < 10 ? mb.toFixed(1) : Math.round(mb)) + 'MB';
    }

    // Lista TODOS os vídeos do Storage agrupados por cliente.
    // Cada item: { ref, path, slug, name, size, timeCreated, contentType, downloadUrl }
    // BUG FIX: itera nos slugs conhecidos do masterData em vez de listAll() no root
    // videos/ — as Storage Rules da S2.6 só cobrem match /videos/{slug}/{...},
    // não permitem listar a pasta root pra descobrir slugs. Iterar pelos slugs
    // conhecidos contorna a regra e funciona pra qualquer cliente cadastrado.
    // Custo: 1 listAll() por slug + 1 getMetadata() + 1 getDownloadURL() por arquivo.
    async function listAllVideosFromStorage() {
      if (!storage) throw new Error('Storage não inicializado.');
      const result = [];
      const clientsObj = (state.masterData && state.masterData.clients) || {};
      const slugs = Object.keys(clientsObj).filter(s => s && clientsObj[s]);
      if (slugs.length === 0) {
        console.warn('[listAllVideos] nenhum slug em state.masterData.clients');
        return result;
      }
      for (const slug of slugs) {
        try {
          const slugRef = storage.ref('videos/' + slug);
          const slugListing = await slugRef.listAll();
          for (const item of slugListing.items) {
            try {
              const [metadata, url] = await Promise.all([
                item.getMetadata(),
                item.getDownloadURL()
              ]);
              result.push({
                ref: item,
                path: item.fullPath,
                slug,
                name: item.name,
                size: metadata.size || 0,
                timeCreated: metadata.timeCreated || null,
                contentType: metadata.contentType || '',
                downloadUrl: url
              });
            } catch (e) {
              console.warn('[listAllVideos] item erro:', item.fullPath, e);
            }
          }
        } catch (e) {
          // Erro 404 (pasta não existe ainda) é esperado pra clientes sem vídeo.
          // Só loga se for erro de permissão ou outro.
          if (e && e.code !== 'storage/object-not-found') {
            console.warn('[listAllVideos] slug erro:', slug, e);
          }
        }
      }
      // Mais recentes primeiro
      result.sort((a, b) => {
        const ta = a.timeCreated ? new Date(a.timeCreated).getTime() : 0;
        const tb = b.timeCreated ? new Date(b.timeCreated).getTime() : 0;
        return tb - ta;
      });
      return result;
    }

    // Extrai o path canônico (videos/{slug}/{name.ext}) de uma URL do Firebase Storage.
    // URL típica: https://firebasestorage.googleapis.com/v0/b/{bucket}/o/videos%2F{slug}%2F{file}?alt=media&token=...
    // Retorna 'videos/{slug}/{file}' ou null se não conseguiu extrair.
    function extractStoragePath(url) {
      if (!url || typeof url !== 'string') return null;
      const m = url.match(/\/o\/([^?]+)/);
      if (!m) return null;
      try {
        return decodeURIComponent(m[1]);
      } catch (e) {
        return null;
      }
    }

    // Cruza URL com DB pra achar quem usa esse vídeo (card, ref ou adjustment).
    // Retorna null se órfão (vídeo subido mas não referenciado em nada).
    // BUG FIX: compara via path canônico extraído da URL (não a URL inteira),
    // porque tokens de auth podem variar entre regen do downloadURL.
    function findOwnerForVideoUrl(url, masterData) {
      if (!url || !masterData || !masterData.clients) return null;
      const targetPath = extractStoragePath(url);
      const sameVideo = (otherUrl) => {
        if (!otherUrl) return false;
        if (otherUrl === url) return true;  // match exato
        const otherPath = extractStoragePath(otherUrl);
        return !!(targetPath && otherPath && targetPath === otherPath);
      };
      for (const [slug, c] of Object.entries(masterData.clients)) {
        if (!c) continue;
        const cards = c.cards || {};
        for (const card of Object.values(cards)) {
          if (card && sameVideo(card.videoUrl)) {
            return { type: 'card', slug, id: card.id, title: card.title || '(sem título)', personaId: card.personaId };
          }
        }
        const refs = c.references || {};
        for (const ref of Object.values(refs)) {
          if (ref && sameVideo(ref.videoUrl)) {
            return { type: 'reference', slug, id: ref.id, title: ref.title || '(sem título)' };
          }
        }
        const adjsObj = c.adjustments || {};
        for (const [cardId, cardAdjs] of Object.entries(adjsObj)) {
          if (cardAdjs && typeof cardAdjs === 'object') {
            for (const adj of Object.values(cardAdjs)) {
              if (adj && sameVideo(adj.videoUrl)) {
                const linkedCard = cards[cardId];
                return {
                  type: 'adjustment',
                  slug,
                  cardId,
                  adjId: adj.id,
                  title: 'Direcionamento de "' + (linkedCard ? (linkedCard.title || cardId) : cardId) + '"'
                };
              }
            }
          }
        }
      }
      return null;
    }

    // Apaga vídeo do Storage + zera videoUrl no DB se houver dono.
    // Owner = retorno de findOwnerForVideoUrl (pode ser null pra órfão).
    async function deleteVideoCompletely(item, owner) {
      // 1. Zera DB primeiro (se houver dono)
      if (owner) {
        let path = null;
        if (owner.type === 'card') {
          path = ROOT_PATH + '/clients/' + owner.slug + '/cards/' + owner.id + '/videoUrl';
        } else if (owner.type === 'reference') {
          path = ROOT_PATH + '/clients/' + owner.slug + '/references/' + owner.id + '/videoUrl';
        } else if (owner.type === 'adjustment') {
          path = ROOT_PATH + '/clients/' + owner.slug + '/adjustments/' + owner.cardId + '/' + owner.adjId + '/videoUrl';
        }
        if (path) {
          await db.ref(path).set('');
        }
      }
      // 2. Apaga arquivo do Storage
      await item.ref.delete();
    }

    // S2.8: estado efêmero do explorer (lista + filtros + status)
    let storageExplorerState = {
      open: false,
      loading: false,
      error: null,
      items: [],
      filterSlug: 'all'  // 'all' | slug específico
    };

    async function openStorageExplorerModal() {
      // Remove modal anterior se aberto
      const existing = document.getElementById('storage-explorer-modal');
      if (existing) existing.remove();

      storageExplorerState = { open: true, loading: true, error: null, items: [], filterSlug: 'all' };
      renderStorageExplorerModal();

      // Carrega lista (async)
      try {
        const items = await listAllVideosFromStorage();
        storageExplorerState.items = items;
        storageExplorerState.loading = false;
        renderStorageExplorerModal();
      } catch (err) {
        console.warn('[StorageExplorer] erro:', err);
        storageExplorerState.loading = false;
        storageExplorerState.error = err.message || 'Erro ao listar arquivos.';
        renderStorageExplorerModal();
      }
    }

    function closeStorageExplorerModal() {
      storageExplorerState.open = false;
      const el = document.getElementById('storage-explorer-modal');
      if (el) el.remove();
    }

    function renderStorageExplorerModal() {
      let modal = document.getElementById('storage-explorer-modal');
      if (!modal) {
        modal = document.createElement('div');
        modal.id = 'storage-explorer-modal';
        modal.style.cssText = 'position: fixed; inset: 0; background: rgba(10,10,10,0.85); z-index: 9999; overflow-y: auto; padding: 24px;';
        document.body.appendChild(modal);
      }

      const masterData = state.masterData || {};
      const clientsObj = masterData.clients || {};
      const slugs = Object.keys(clientsObj);

      const items = storageExplorerState.items || [];
      const filtered = storageExplorerState.filterSlug === 'all'
        ? items
        : items.filter(i => i.slug === storageExplorerState.filterSlug);

      // Filter chips
      const chipsHtml = ['all', ...slugs].map(s => {
        const label = s === 'all' ? 'Todos' : (clientsObj[s]?.meta?.name || s);
        const count = s === 'all' ? items.length : items.filter(i => i.slug === s).length;
        const isActive = storageExplorerState.filterSlug === s;
        return `<button type="button" class="storage-filter-chip" data-filter-slug="${escapeHtml(s)}" style="padding: 6px 12px; border-radius: 16px; border: 1px solid ${isActive ? '#07D379' : '#333'}; background: ${isActive ? 'rgba(7,211,121,0.12)' : 'transparent'}; color: ${isActive ? '#07D379' : '#A0A0A0'}; font-size: 12px; font-weight: 500; cursor: pointer;">${escapeHtml(label)} <span style="opacity: 0.6;">(${count})</span></button>`;
      }).join(' ');

      // Body content
      let bodyHtml = '';
      if (storageExplorerState.loading) {
        bodyHtml = '<div style="text-align: center; padding: 60px 20px; color: #A0A0A0;">Carregando lista do Storage…</div>';
      } else if (storageExplorerState.error) {
        bodyHtml = '<div style="padding: 24px; background: rgba(217,70,70,0.1); border: 1px solid rgba(217,70,70,0.3); border-radius: 8px; color: #FF6B6B;">' + escapeHtml(storageExplorerState.error) + '</div>';
      } else if (filtered.length === 0) {
        bodyHtml = '<div style="text-align: center; padding: 60px 20px; color: #A0A0A0;">Nenhum vídeo no Storage' + (storageExplorerState.filterSlug !== 'all' ? ' pra este cliente' : '') + '.</div>';
      } else {
        bodyHtml = '<div style="display: flex; flex-direction: column; gap: 8px;">' + filtered.map(item => {
          const owner = findOwnerForVideoUrl(item.downloadUrl, masterData);
          const clientName = clientsObj[item.slug]?.meta?.name || item.slug;
          const dateLabel = item.timeCreated ? new Date(item.timeCreated).toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' }) : '—';

          // Pills com info
          let ownerPills = '';
          if (owner) {
            const typeLabel = owner.type === 'card' ? '📄 Card' : (owner.type === 'reference' ? '⭐ Ref' : '✏️ Direcionamento');
            ownerPills += `<span style="padding: 2px 8px; border-radius: 10px; background: rgba(7,211,121,0.12); color: #07D379; font-size: 10px;">${typeLabel}</span>`;
            if (owner.title) {
              ownerPills += `<span style="padding: 2px 8px; border-radius: 10px; background: rgba(255,255,255,0.06); color: #F2F2F2; font-size: 10px;">${escapeHtml((owner.title || '').slice(0, 30))}${owner.title && owner.title.length > 30 ? '…' : ''}</span>`;
            }
            if (owner.personaId) {
              const personaName = clientsObj[item.slug]?.personas?.[owner.personaId]?.name || owner.personaId;
              ownerPills += `<span style="padding: 2px 8px; border-radius: 10px; background: rgba(255,255,255,0.06); color: #A0A0A0; font-size: 10px;">${escapeHtml(personaName)}</span>`;
            }
          } else {
            ownerPills = `<span style="padding: 2px 8px; border-radius: 10px; background: rgba(217,70,70,0.12); color: #D94646; font-size: 10px;">🔗 Órfão</span>`;
          }

          return `
            <div class="storage-item" style="padding: 12px 14px; background: #141414; border: 1px solid #222; border-radius: 8px;" data-storage-path="${escapeHtml(item.path)}">
              <div style="display: flex; align-items: center; gap: 12px;">
                <div style="font-size: 24px; flex-shrink: 0;">📹</div>
                <div style="flex: 1; min-width: 0;">
                  <div style="display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px;">
                    <span style="padding: 2px 8px; border-radius: 10px; background: rgba(166,84,106,0.18); color: #E8A8B8; font-size: 10px; font-weight: 500;">${escapeHtml(clientName)}</span>
                    ${ownerPills}
                  </div>
                  <div style="font-size: 12px; color: #A0A0A0; word-break: break-all;">${escapeHtml(item.name)}</div>
                  <div style="font-size: 11px; color: #6e6e6e; margin-top: 4px;">${formatStorageBytes(item.size)} · ${escapeHtml(dateLabel)}</div>
                </div>
                <div style="display: flex; flex-direction: column; gap: 4px; flex-shrink: 0;">
                  <button type="button" class="storage-preview-btn" data-storage-url="${escapeHtml(item.downloadUrl)}" style="padding: 6px 10px; background: transparent; border: 1px solid #333; border-radius: 6px; color: #F2F2F2; font-size: 11px; cursor: pointer;">▶ Ver</button>
                  <button type="button" class="storage-delete-btn" data-storage-path="${escapeHtml(item.path)}" data-storage-url="${escapeHtml(item.downloadUrl)}" style="padding: 6px 10px; background: rgba(217,70,70,0.1); border: 1px solid rgba(217,70,70,0.3); border-radius: 6px; color: #D94646; font-size: 11px; cursor: pointer;">🗑 Apagar</button>
                </div>
              </div>
            </div>
          `;
        }).join('') + '</div>';
      }

      const totalSize = filtered.reduce((sum, i) => sum + (i.size || 0), 0);

      modal.innerHTML = `
        <div style="max-width: 900px; margin: 0 auto; background: #0a0a0a; border: 1px solid #222; border-radius: 12px; padding: 24px; min-height: 400px;">
          <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px;">
            <div>
              <div style="font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: #07D379;">📂 Storage Explorer</div>
              <div style="font-size: 20px; font-weight: 500; color: #F2F2F2; margin-top: 4px;">${filtered.length} ${filtered.length === 1 ? 'arquivo' : 'arquivos'} · ${formatStorageBytes(totalSize)}</div>
            </div>
            <button type="button" id="storage-close-btn" style="padding: 8px 12px; background: transparent; border: 1px solid #333; border-radius: 6px; color: #F2F2F2; font-size: 13px; cursor: pointer;">× Fechar</button>
          </div>
          <div style="display: flex; gap: 6px; flex-wrap: wrap; margin: 16px 0;">${chipsHtml}</div>
          <div style="display: flex; gap: 8px; margin-bottom: 16px;">
            <button type="button" id="storage-refresh-btn" style="padding: 6px 12px; background: transparent; border: 1px solid #333; border-radius: 6px; color: #A0A0A0; font-size: 12px; cursor: pointer;">↻ Atualizar lista</button>
          </div>
          ${bodyHtml}
        </div>
      `;

      // Handlers
      const closeBtn = modal.querySelector('#storage-close-btn');
      if (closeBtn) closeBtn.addEventListener('click', closeStorageExplorerModal);

      const refreshBtn = modal.querySelector('#storage-refresh-btn');
      if (refreshBtn) refreshBtn.addEventListener('click', openStorageExplorerModal);

      modal.querySelectorAll('.storage-filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          storageExplorerState.filterSlug = chip.getAttribute('data-filter-slug');
          renderStorageExplorerModal();
        });
      });

      modal.querySelectorAll('.storage-preview-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const url = btn.getAttribute('data-storage-url');
          if (url) openVideoModal(url);
        });
      });

      modal.querySelectorAll('.storage-delete-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const path = btn.getAttribute('data-storage-path');
          const url = btn.getAttribute('data-storage-url');
          const item = storageExplorerState.items.find(i => i.path === path);
          if (!item) return;
          const owner = findOwnerForVideoUrl(url, state.masterData);
          const ownerDesc = owner ? ('vai apagar também a referência em "' + (owner.title || owner.cardId || owner.id) + '"') : 'esse vídeo está órfão (sem referência no DB)';
          if (!confirm('Apagar esse vídeo permanentemente? ' + ownerDesc + '.')) return;
          btn.disabled = true;
          btn.textContent = 'Apagando…';
          try {
            await deleteVideoCompletely(item, owner);
            showToast('✓ Apagado');
            // Remove do estado local + re-render
            storageExplorerState.items = storageExplorerState.items.filter(i => i.path !== path);
            renderStorageExplorerModal();
          } catch (err) {
            console.warn('[storage delete] erro:', err);
            showToast('Não consegui apagar. Tenta de novo.');
            btn.disabled = false;
            btn.textContent = '🗑 Apagar';
          }
        });
      });
    }

    // S2.6 Sessão 2: formata ETA em string curta ("12s" / "2min").
    function formatUploadEta(etaSec) {
      if (!isFinite(etaSec) || etaSec < 0) return '';
      if (etaSec < 60) return 'faltam ~' + Math.max(1, Math.round(etaSec)) + 's';
      const min = Math.round(etaSec / 60);
      return 'faltam ~' + min + (min === 1 ? 'min' : 'min');
    }

    // Sobe vídeo pro Storage. Path: videos/{clientSlug}/{cardId}-{ts}.{ext}
    // Retorna Promise<string> com a downloadURL.
    // onProgress(pct, etaSec) é chamado a cada update — etaSec só é confiável
    // após ~1s de upload (precisa de baseline de velocidade).
    function uploadVideoToStorage(file, clientSlug, cardId, onProgress) {
      if (!storage) {
        return Promise.reject(new Error('Storage não inicializado. Recarrega a página.'));
      }
      const safeSlug = (clientSlug || state.clientSlug || 'unknown').trim();
      const safeCardId = (cardId || generateCardId()).trim();
      if (!safeSlug || !safeCardId) {
        return Promise.reject(new Error('Cliente/card inválido pra upload.'));
      }
      const ts = Date.now();
      const ext = ((file.name || '').includes('.') ? file.name.split('.').pop() : 'mp4').toLowerCase();
      const path = 'videos/' + safeSlug + '/' + safeCardId + '-' + ts + '.' + ext;
      const ref = storage.ref(path);
      const task = ref.put(file, { contentType: file.type || 'video/mp4' });
      const startTime = Date.now();
      return new Promise((resolve, reject) => {
        task.on('state_changed',
          function (snapshot) {
            if (typeof onProgress === 'function' && snapshot.totalBytes > 0) {
              const pct = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
              const elapsed = (Date.now() - startTime) / 1000;
              let etaSec = NaN;
              if (elapsed > 1 && snapshot.bytesTransferred > 0) {
                const bytesPerSec = snapshot.bytesTransferred / elapsed;
                const remaining = snapshot.totalBytes - snapshot.bytesTransferred;
                etaSec = remaining / bytesPerSec;
              }
              onProgress(pct, etaSec);
            }
          },
          function (error) {
            console.warn('[uploadVideoToStorage] erro:', error);
            reject(error);
          },
          function () {
            task.snapshot.ref.getDownloadURL()
              .then(function (url) { resolve(url); })
              .catch(function (e) { reject(e); });
          }
        );
      });
    }

    // ============================================================
    // S3.0 — PWA por cliente (logo + PIN embutido)
    // ============================================================

    // Valida arquivo de logo PWA. Limite 2MB, formatos PNG/JPG/WEBP.
    // Retorna string de erro OU null se OK.
    function validateLogo(file) {
      if (!file) return 'Arquivo inválido.';
      if (file.size > 2 * 1024 * 1024) return 'Logo muito grande (máx 2MB).';
      const okTypes = ['image/png', 'image/jpeg', 'image/jpg', 'image/webp'];
      if (!okTypes.includes(file.type)) return 'Use PNG, JPG ou WEBP.';
      return null;
    }

    // Sobe logo PWA pro Storage. Path: logos/{clientSlug}/logo-{ts}.{ext}
    // Retorna Promise<string> com a downloadURL. onProgress(pct) opcional.
    function uploadLogoToStorage(file, clientSlug, onProgress) {
      if (!storage) {
        return Promise.reject(new Error('Storage não inicializado. Recarrega a página.'));
      }
      const safeSlug = (clientSlug || 'unknown').trim();
      if (!safeSlug) {
        return Promise.reject(new Error('Cliente inválido pra upload de logo.'));
      }
      const ts = Date.now();
      const ext = ((file.name || '').includes('.') ? file.name.split('.').pop() : 'png').toLowerCase();
      const path = 'logos/' + safeSlug + '/logo-' + ts + '.' + ext;
      const ref = storage.ref(path);
      const task = ref.put(file, { contentType: file.type || 'image/png' });
      return new Promise((resolve, reject) => {
        task.on('state_changed',
          function (snapshot) {
            if (typeof onProgress === 'function' && snapshot.totalBytes > 0) {
              const pct = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
              onProgress(pct);
            }
          },
          function (error) {
            console.warn('[uploadLogoToStorage] erro:', error);
            reject(error);
          },
          function () {
            task.snapshot.ref.getDownloadURL()
              .then(function (url) { resolve(url); })
              .catch(function (e) { reject(e); });
          }
        );
      });
    }

    // Gera ícone de cliente — retorna data URL (PNG) 512x512.
    // Se client.branding.pwaLogoUrl existe, retorna ela direto (já é URL pronta).
    // Senão, canvas com paleta.mauve de fundo + inicial branca em SF Pro Bold.
    function generateClientIcon(client, size) {
      size = size || 512;
      const branding = (client && client.branding) || {};
      if (branding.pwaLogoUrl) return branding.pwaLogoUrl;
      const meta = (client && client.meta) || {};
      const name = meta.name || meta.slug || '?';
      const initial = name.trim().charAt(0).toUpperCase() || '?';
      const bgColor = (branding.paleta && branding.paleta.mauve) || '#A6546A';
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, size, size);
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold ' + Math.round(size * 0.5) + 'px -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(initial, size / 2, size / 2 + (size * 0.02));
      return canvas.toDataURL('image/png');
    }

    // Monta manifest PWA pra um cliente+persona+pin. Retorna Blob URL pronto
    // pra setar no href do <link rel="manifest">. Manifest tem id único por
    // persona pra que cada install vire um app separado na home screen
    // (mesmo com scope='./' compartilhado no GitHub Pages).
    function buildManifestForClient(client, personaId, pin) {
      const meta = (client && client.meta) || {};
      const branding = (client && client.branding) || {};
      const slug = meta.slug || 'cliente';
      const name = meta.name || slug;
      const themeColor = (branding.paleta && branding.paleta.mauve) || '#A6546A';
      const bgColor = (branding.paleta && branding.paleta.blushLight) || '#FFF7FA';
      const icon = generateClientIcon(client, 512);

      let startUrl = './?cliente=' + encodeURIComponent(slug);
      if (personaId) startUrl += '&u=' + encodeURIComponent(personaId);
      if (pin) startUrl += '&pin=' + encodeURIComponent(pin);

      const id = slug + (personaId ? '-' + personaId : '');

      const manifest = {
        id: id,
        name: name,
        short_name: name.length > 12 ? name.slice(0, 12) : name,
        description: 'Sinapse · ' + name,
        start_url: startUrl,
        scope: './',
        display: 'standalone',
        orientation: 'portrait',
        background_color: bgColor,
        theme_color: themeColor,
        lang: 'pt-BR',
        categories: ['productivity', 'business'],
        icons: [
          { src: icon, sizes: '512x512', type: 'image/png', purpose: 'any' },
          { src: icon, sizes: '192x192', type: 'image/png', purpose: 'any' },
          { src: icon, sizes: '512x512', type: 'image/png', purpose: 'maskable' }
        ]
      };

      const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
      return URL.createObjectURL(blob);
    }

    // Swap dinâmico do <link rel="manifest"> no boot. Chamado de route() depois
    // que state.clientData carrega. Se não bate (sem cliente / sem persona / sem
    // pin válido), mantém manifest.json estático Sinapse (já no head).
    // Guarda Blob URL anterior pra revogar e liberar memória.
    let _pwaManifestBlobUrl = null;
    function swapPwaManifest(client, personaId, pin) {
      if (!client || !personaId) return;
      const link = document.querySelector('link[rel="manifest"]');
      if (!link) return;
      try {
        const newUrl = buildManifestForClient(client, personaId, pin);
        if (_pwaManifestBlobUrl) {
          try { URL.revokeObjectURL(_pwaManifestBlobUrl); } catch (e) {}
        }
        _pwaManifestBlobUrl = newUrl;
        link.href = newUrl;
        // Atualiza favicon e apple-touch-icon pra também refletir o cliente.
        const icon = generateClientIcon(client, 512);
        const favicon = document.querySelector('link#favicon-link');
        if (favicon) favicon.href = icon;
        const appleIcon = document.querySelector('link[rel="apple-touch-icon"]');
        if (appleIcon) appleIcon.href = icon;
      } catch (e) {
        console.warn('[swapPwaManifest] falhou — mantendo manifest padrão:', e);
      }
    }

    // ID estilo card_{ts}_{rand6} (segue convenção do schema)
    function generateCardId() {
      const rand = Math.random().toString(36).slice(2, 8);
      return `card_${Date.now()}_${rand}`;
    }

    // Cria card vindo da Jamily — fluxo simplificado da delegação.
    // Status já vai pra 'review', sem approvalByPersona (Isabelle aprova direto na Fila).
    // Persona owner default = 'closet' (a marca). dayId = day de hoje ou o mais recente.
    function criarCardJamily({ title, concept, origin, referenceImage, videoUrl }) {
      if (!clientRef) { showToast('Cliente não carregado.'); return Promise.reject(); }
      const t = (title || '').trim();
      const c = (concept || '').trim();
      if (!c) { showToast('O texto da copy é obrigatório.'); return Promise.reject(); }

      const dayId = inferCurrentDayId();
      const now = Date.now();
      const cardId = generateCardId();

      const card = {
        id: cardId,
        sprintId: '', // legado v1.5
        dayId: dayId || '',
        blockId: '',  // sem bloco específico — Jamily não pensa em bloco
        personaId: 'closet',
        title: t || c.slice(0, 40), // se sem peça, usa início da copy como title
        format: 'Story',
        type: '',
        priority: 'Média',
        timeSlot: '',
        objective: '',
        framing: '',
        concept: c,
        captionTone: '',
        anchorPhrase: '',
        referenceImage: referenceImage || '',
        videoUrl: videoUrl || '',
        checklist: [],
        // S2.5* / v1.5.1
        origin: origin || 'pauta',
        postedAt: null,
        isReference: false,
        createdByRole: ROLES.EXECUTORA_INTERNA,
        lastAdjustmentId: null,
        // Status — direto pra review (sem approvalByPersona; Isabelle aprova na Fila)
        status: 'review',
        approvalByPersona: {},
        sentForReviewAt: now,
        publishedAt: null,
        scheduledAt: null,
        order: now, // ordem temporal por padrão
        createdAt: now,
        updatedAt: now
      };

      return clientRef.child('cards/' + cardId).set(card).then(() => {
        showToast('✓ Enviado pra fila');
        // Fase 3: pede permissão de notif no primeiro send (contextual)
        try { maybeAskNotifPermission(state.clientSlug || ''); } catch (e) {}
      }).catch(e => {
        console.warn('[criarCardJamily] erro:', e);
        showToast('Não consegui salvar. Tenta de novo.');
        throw e;
      });
    }

    // Fila bulk = cards criados pela executora interna AINDA não aprovados
    // E sem ajuste pendente (cards com ajuste pedido somem da fila até Jamily
    // marcar adjustment.resolved=true ao reenviar).
    // FIFO por sentForReviewAt (mais antigo = primeiro a revisar).
    function getCardsNaFilaBulk() {
      const cards = Object.values((state.clientData && state.clientData.cards) || {});
      return cards
        .filter(c =>
          c &&
          c.status === 'review' &&
          c.createdByRole === ROLES.EXECUTORA_INTERNA &&
          !isCardComAjustePendente(c)
        )
        .sort((a, b) => (a.sentForReviewAt || a.createdAt || 0) - (b.sentForReviewAt || b.createdAt || 0));
    }

    // ----- Adjustments (C4) -----

    function generateAdjustmentId() {
      const rand = Math.random().toString(36).slice(2, 6);
      return `adj_${Date.now()}_${rand}`;
    }

    function getCardLastAdjustment(card) {
      if (!card || !card.lastAdjustmentId) return null;
      const adjs = (state.clientData && state.clientData.adjustments && state.clientData.adjustments[card.id]) || {};
      return adjs[card.lastAdjustmentId] || null;
    }

    function isCardComAjustePendente(card) {
      const adj = getCardLastAdjustment(card);
      return !!(adj && adj.resolved === false);
    }

    // Pedir ajuste = escreve adjustment + atualiza lastAdjustmentId no card.
    // Status do card NÃO muda (continua 'review'). Card some da Fila Isabelle
    // até Jamily marcar adjustment.resolved=true.
    function pedirAjusteCard(cardId, tags, comment, videoUrl) {
      if (!clientRef) { showToast('Cliente não carregado.'); return Promise.reject(); }
      const c = (comment || '').trim();
      if (c.length < 10) { showToast('Comentário precisa ter pelo menos 10 caracteres.'); return Promise.reject(); }

      const adjId = generateAdjustmentId();
      const now = Date.now();
      const adjustment = {
        id: adjId,
        cardId: cardId,
        tags: Array.isArray(tags) ? tags : [],
        comment: c,
        videoUrl: videoUrl || '',  // S2.6 — vídeo de direcionamento (opcional)
        requestedBy: 'isabelle',
        requestedAt: now,
        resolved: false
      };

      // Multi-path update atomic — escreve adjustment + atualiza card simultâneo
      const updates = {};
      updates[`adjustments/${cardId}/${adjId}`] = adjustment;
      updates[`cards/${cardId}/lastAdjustmentId`] = adjId;
      updates[`cards/${cardId}/updatedAt`] = now;

      return clientRef.update(updates).then(() => {
        showToast('✓ Ajuste enviado');
        // Reset estado local + volta pra fila normal
        pedirAjusteState = { cardId: null, tags: [], comment: '', videoUrl: '', videoMeta: null };
        if (sheetState.open && sheetState.type === 'delegacao') {
          openDelegacaoSheet();
        }
      }).catch(e => {
        console.warn('[pedirAjusteCard] erro:', e);
        showToast('Não consegui enviar. Tenta de novo.');
        throw e;
      });
    }

    // ----- C4.1: Refazer card ajustado (lado Jamily) -----

    // Cards do universo executora interna com ajuste pendente
    // (lastAdjustmentId definido && adjustment.resolved === false).
    // Ordem: ajuste mais antigo primeiro (FIFO — quem espera há mais tempo).
    function getCardsParaRefazer() {
      const cards = Object.values((state.clientData && state.clientData.cards) || {});
      const adjs = (state.clientData && state.clientData.adjustments) || {};
      return cards
        .filter(c =>
          c &&
          c.createdByRole === ROLES.EXECUTORA_INTERNA &&
          c.status === 'review' &&
          isCardComAjustePendente(c)
        )
        .map(c => {
          const adj = (adjs[c.id] && c.lastAdjustmentId) ? adjs[c.id][c.lastAdjustmentId] : null;
          return { card: c, adjustment: adj };
        })
        .filter(x => !!x.adjustment)
        .sort((a, b) => (a.adjustment.requestedAt || 0) - (b.adjustment.requestedAt || 0));
    }

    // Reenviar card após Jamily ajustar — multi-path atomic update:
    // - reescreve campos editáveis do card (title, concept, origin, referenceImage)
    // - reseta sentForReviewAt = now (volta pro fim da FIFO da Isabelle)
    // - marca o último adjustment como resolved=true + resolvedAt
    // Card já está em 'review' (não muda status). Como adjustment.resolved=true,
    // isCardComAjustePendente passa a retornar false → card reaparece em
    // getCardsNaFilaBulk automaticamente (live update grátis na Isabelle).
    function reenviarCardAjustado(cardId, fields) {
      if (!clientRef) { showToast('Cliente não carregado.'); return Promise.reject(); }
      const card = (state.clientData && state.clientData.cards && state.clientData.cards[cardId]) || null;
      if (!card) { showToast('Card não encontrado.'); return Promise.reject(); }
      const adjId = card.lastAdjustmentId;
      if (!adjId) { showToast('Card não tem ajuste pendente.'); return Promise.reject(); }

      const c = (fields.concept || '').trim();
      if (!c) { showToast('O texto da copy é obrigatório.'); return Promise.reject(); }
      const t = (fields.title || '').trim();
      const now = Date.now();

      const updates = {};
      updates[`cards/${cardId}/title`] = t || c.slice(0, 40);
      updates[`cards/${cardId}/concept`] = c;
      updates[`cards/${cardId}/origin`] = fields.origin || card.origin || 'pauta';
      if (typeof fields.referenceImage === 'string') {
        updates[`cards/${cardId}/referenceImage`] = fields.referenceImage;
      }
      // S2.6 bug-fix: videoUrl também precisa ser persistido no refazer
      if (typeof fields.videoUrl === 'string') {
        updates[`cards/${cardId}/videoUrl`] = fields.videoUrl;
      }
      updates[`cards/${cardId}/sentForReviewAt`] = now;
      updates[`cards/${cardId}/updatedAt`] = now;
      updates[`adjustments/${cardId}/${adjId}/resolved`] = true;
      updates[`adjustments/${cardId}/${adjId}/resolvedAt`] = now;

      return clientRef.update(updates).then(() => {
        showToast('✓ Reenviado pra Isabelle');
      }).catch(e => {
        console.warn('[reenviarCardAjustado] erro:', e);
        showToast('Não consegui reenviar. Tenta de novo.');
        throw e;
      });
    }

    // Estado local do form de ajuste — sobrevive a re-renders durante a edição.
    // Reset quando submit OK ou quando usuário cancela (botão Voltar).
    let pedirAjusteState = { cardId: null, tags: [], comment: '', videoUrl: '', videoMeta: null };
    // C4.1 — Jamily refazendo card pós-ajuste. Quando cardId != null, a tab
    // 'criar' renderiza form pré-preenchido com header de ajuste, e o submit
    // chama reenviarCardAjustado em vez de criarCardJamily.
    let refazerCardState = { cardId: null };

    // Aprovação 1-clique da Isabelle no fluxo de delegação.
    // Pula approvalByPersona — Isabelle É a curadoria aqui.
    // status='published' + publishedAt=now. postedAt continua null (Jamily marca depois).
    function aprovarCardBulk(cardId) {
      if (!clientRef) { showToast('Cliente não carregado.'); return; }
      const now = Date.now();
      clientRef.child('cards/' + cardId).update({
        status: 'published',
        publishedAt: now,
        updatedAt: now
      }).then(() => {
        showToast('✓ Aprovado · pronto pra Jamily postar');
        // Re-render do sheet pra atualizar UI sem listener
        if (sheetState.open && sheetState.type === 'delegacao') {
          openDelegacaoSheet();
        }
      }).catch(e => {
        console.warn('[aprovarCardBulk] erro:', e);
        showToast('Não consegui aprovar. Tenta de novo.');
      });
    }

    // ============================================================
    // FIM bloco S2.5*
    // ============================================================

    // Personas ativas, ordenadas (incluindo closet — usado pra picker, dono de card, etc).
    function getActivePersonas() {
      const personas = (state.clientData && state.clientData.personas) || {};
      return Object.values(personas)
        .filter(p => p && p.active !== false)
        .sort((a, b) => (a.order || 0) - (b.order || 0));
    }

    // A2 — Feature flag por cliente: pílula peça-hero só aparece quando flag === true.
    // Schema: clients/{slug}/features.heroPiece (boolean). Default undefined (= off) pra
    // clientes que não migraram ainda. Migração explícita via Edit Cliente (UI) ou via JS Console.
    function clientHasHeroPiece() {
      return state.clientData && state.clientData.features && state.clientData.features.heroPiece === true;
    }

    // Personas que VOTAM (aprovam cards). Filtra por isVoter explícito no Firebase.
    // Closet continua existindo como persona "dona" pra cards de marca (Isa produz),
    // mas não recebe entrada em approvalByPersona — ela tem isVoter:false setado
    // em /clients/closet-da-rafa/personas/closet (D5 fechado em 2026-05-06).
    function getVotingPersonas() {
      return getActivePersonas().filter(p => p.isVoter !== false);
    }

    // Pílula de papel da persona logada num card. Resolve a confusão "Bruna faz" / "Bruna aprova":
    //   - card do closet → "Isa produz" (cinza neutro, ninguém precisa fazer)
    //   - card cuja personaId === currentPersonaId → "Você executa" (verde forte, alto destaque)
    //   - card de outra persona → "Bruna executa" (cor da persona dona, neutro)
    function getCardRolePill(card) {
      const ownerId = card && card.personaId;
      if (!ownerId) return '';
      if (ownerId === 'closet') {
        return '<span class="card-role-pill is-closet">Isa produz</span>';
      }
      if (ownerId === state.currentPersonaId) {
        return '<span class="card-role-pill is-mine">Você executa</span>';
      }
      const owner = state.clientData?.personas?.[ownerId];
      const name = (owner && owner.name) || ownerId;
      return `<span class="card-role-pill is-other" style="background: var(--persona-${ownerId});">${escapeHtml(name)} executa</span>`;
    }

    // ===== AÇÕES (escrevem no Firebase via clientRef) =====

    // Editor → "Enviar pra aprovação" (draft → review).
    // Popula approvalByPersona com 'pending' pra todas as personas ativas.
    function sendCardForReview(card) {
      if (!clientRef) { showToast('Cliente não carregado.'); return Promise.reject(new Error('no clientRef')); }
      const personas = getVotingPersonas();
      const approval = {};
      const now = Date.now();
      personas.forEach(p => {
        approval[p.id] = { state: 'pending', updatedAt: now, notes: '' };
      });
      return clientRef.child('cards/' + card.id).update({
        status: 'review',
        approvalByPersona: approval,
        sentForReviewAt: now,
        updatedAt: now
      });
    }

    // Persona logada aprova o card (qualquer card — visão 360).
    function approveCard(card, personaId, notes) {
      if (!clientRef) { showToast('Cliente não carregado.'); return Promise.reject(new Error('no clientRef')); }
      return clientRef.child('cards/' + card.id + '/approvalByPersona/' + personaId).set({
        state: 'approved',
        updatedAt: Date.now(),
        notes: notes || ''
      });
    }

    // Persona logada pede ajuste (com nota opcional).
    function requestCardChanges(card, personaId, notes) {
      if (!clientRef) { showToast('Cliente não carregado.'); return Promise.reject(new Error('no clientRef')); }
      return clientRef.child('cards/' + card.id + '/approvalByPersona/' + personaId).set({
        state: 'requested_changes',
        updatedAt: Date.now(),
        notes: notes || ''
      });
    }

    // Editor → "Marcar como publicado" (review → published).
    function publishCard(card) {
      if (!clientRef) { showToast('Cliente não carregado.'); return Promise.reject(new Error('no clientRef')); }
      const now = Date.now();
      return clientRef.child('cards/' + card.id).update({
        status: 'published',
        publishedAt: now,
        updatedAt: now
      });
    }

    // Editor (Área 14 Caminho C) → "✓ Ajuste feito" pra um pedido de ajuste específico.
    // Reseta state pra 'pending' (SD-Reset=A) e marca resolvedByEditorAt=now (sinal pra
    // o viewer mostrar banner "Isabelle ajustou"). Usa update() parcial pra preservar
    // notes (histórico do pedido) e editorReply (caso ela já tenha replicado antes).
    function markAdjustmentDone(cardId, personaId) {
      if (!clientRef) { showToast('Cliente não carregado.'); return Promise.reject(new Error('no clientRef')); }
      const now = Date.now();
      return clientRef.child('cards/' + cardId + '/approvalByPersona/' + personaId).update({
        state: 'pending',
        resolvedByEditorAt: now,
        updatedAt: now
      });
    }

    // Editor (Área 14 Caminho C) → "↩ Replicar" à nota de pedido de uma persona.
    // Grava editorReply={text, repliedAt} via update parcial. Não muda state nem notes.
    // Persona vai ver a réplica abaixo da nota dela na seção approvals (SD-Réplica=A).
    function replyToApproval(cardId, personaId, text) {
      if (!clientRef) { showToast('Cliente não carregado.'); return Promise.reject(new Error('no clientRef')); }
      const now = Date.now();
      return clientRef.child('cards/' + cardId + '/approvalByPersona/' + personaId).update({
        editorReply: { text: String(text || ''), repliedAt: now }
      });
    }

    // Editor → "Despublicar" (published → review).
    // Rede de segurança contra click acidental no Marcar como publicado.
    // Mantém approvalByPersona intacto — votos não somem, só o status volta.
    // publishedAt vira null pra não confundir queries futuras de "publicado em X".
    function unpublishCard(card) {
      if (!clientRef) { showToast('Cliente não carregado.'); return Promise.reject(new Error('no clientRef')); }
      const now = Date.now();
      return clientRef.child('cards/' + card.id).update({
        status: 'review',
        publishedAt: null,
        updatedAt: now
      });
    }

    // ============================================================
    // ÁREA 12 — Clone de sprint REMOVIDO no refactor HARD-LITE
    // ============================================================
    // cloneActiveSprint() foi removida. Sprint deixou de ser conceito ativo —
    // produção é diária livre, sem agrupador. Se um dia precisar de "Duplicar
    // últimos N days", reescreve do zero (a função antiga ficou amarrada em
    // sprintId/dateStart/dateEnd que não existem mais).

    // ============================================================
    // HELPERS — Comments (Área 10)
    // ============================================================
    //
    // Listener separado do attachClientListener porque:
    //   1. attachClientListener bloqueia re-render quando modal aberto
    //      (linha 2512: `if (modalState.open) return;`) — sem isso, o textarea
    //      sendo digitado seria apagado a cada commit no Firebase.
    //   2. Queremos atualização granular do thread sem mexer no resto da UI.
    //
    // attachCommentsListener atualiza SÓ o container interno via innerHTML,
    // preservando o textarea e o botão. Detach é obrigatório no close pra
    // não vazar listeners.

    function attachCommentsListener(cardId, containerId) {
      if (!clientRef || !cardId) return;
      // Detach qualquer listener anterior (single-track).
      detachCommentsListener();
      const ref = clientRef.child('comments/' + cardId);
      const callback = ref.on('value', snap => {
        const comments = snap.val() || {};
        const container = document.getElementById(containerId);
        if (container) renderCommentThread(comments, container);
      });
      state.commentsListener = { cardId, ref, callback, containerId };
    }

    function detachCommentsListener() {
      if (!state.commentsListener) return;
      const { ref, callback } = state.commentsListener;
      try { ref.off('value', callback); } catch (e) { /* noop */ }
      state.commentsListener = null;
      // F1: reset modo edit ao trocar de card / fechar modal — não vaza entre threads.
      state.commentEditId = null;
    }

    // ============================================================
    // HELPERS — Permissões e edit/delete de comment (Área 14, F1)
    // ============================================================
    //
    // Regra D1=C: edit estrita (só autor próprio mexe na própria fala);
    //             delete híbrido (autor próprio OU Isabelle no editor).
    //
    // Identidade do "autor atual":
    //   - editor → Isabelle (authorId='isabelle', authorType='celulose')
    //   - viewer → persona logada (authorId=personaId, authorType='client')

    function getCurrentCommentAuthor() {
      if (state.mode === 'editor') return { id: 'isabelle', type: 'celulose' };
      return { id: state.currentPersonaId, type: 'client' };
    }

    function canEditComment(c) {
      if (!c) return false;
      const me = getCurrentCommentAuthor();
      return c.authorId === me.id && c.authorType === me.type;
    }

    function canDeleteComment(c) {
      if (!c) return false;
      if (canEditComment(c)) return true;
      // Isabelle no editor pode apagar de qualquer um (faxina de fio).
      return state.mode === 'editor';
    }

    function editComment(cardId, commentId, newText) {
      if (!clientRef) { showToast('Cliente não carregado.'); return Promise.reject(new Error('no clientRef')); }
      const trimmed = String(newText || '').trim();
      if (!trimmed) return Promise.reject(new Error('empty'));
      return clientRef.child('comments/' + cardId + '/' + commentId).update({
        text: trimmed,
        editedAt: Date.now()
      });
    }

    function deleteComment(cardId, commentId) {
      if (!clientRef) { showToast('Cliente não carregado.'); return Promise.reject(new Error('no clientRef')); }
      return clientRef.child('comments/' + cardId + '/' + commentId).remove();
    }

    function postComment(cardId, text) {
      if (!clientRef) { showToast('Cliente não carregado.'); return Promise.reject(new Error('no clientRef')); }
      const trimmed = String(text || '').trim();
      if (!trimmed) return Promise.reject(new Error('empty'));

      const isEditor = state.mode === 'editor';
      const personaId = state.currentPersonaId;
      const persona = personaId ? state.clientData?.personas?.[personaId] : null;

      const id = 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
      const comment = {
        id,
        cardId,
        text: trimmed,
        authorType: isEditor ? 'celulose' : 'client',
        authorId: isEditor ? 'isabelle' : personaId,
        authorName: isEditor ? 'Isabelle' : (persona && persona.name ? persona.name : '—'),
        createdAt: Date.now()
      };
      return clientRef.child('comments/' + cardId + '/' + id).set(comment);
    }

    function renderCommentThread(commentsObj, container) {
      if (!container) return;
      const list = Object.values(commentsObj || {})
        .filter(c => c && c.id)
        .sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));

      // F1: se o comment em edit foi deletado por outro user, limpa o state
      // pra não tentar restaurar texto num row que sumiu.
      if (state.commentEditId && !commentsObj?.[state.commentEditId]) {
        state.commentEditId = null;
      }

      // F1: preserva o que tá sendo digitado no textarea de edit (caso outro
      // user poste um comment durante a edição → re-render apaga sem isso).
      let preservedEditText = null;
      if (state.commentEditId) {
        const existing = container.querySelector(
          '.comment-edit-textarea[data-edit-id="' + state.commentEditId + '"]'
        );
        if (existing) preservedEditText = existing.value;
      }

      if (list.length === 0) {
        container.innerHTML = '<div class="comment-thread-empty">Sem comments ainda.</div>';
        return;
      }

      container.innerHTML = list.map(c => renderCommentRow(c)).join('');

      // Restaura texto editado.
      if (state.commentEditId && preservedEditText !== null) {
        const ta = container.querySelector(
          '.comment-edit-textarea[data-edit-id="' + state.commentEditId + '"]'
        );
        if (ta) ta.value = preservedEditText;
      }

      bindCommentActions(container);
    }

    function renderCommentRow(c) {
      const isCelulose = c.authorType === 'celulose';
      const initial = (c.authorName || '·').trim().charAt(0);
      const avatarStyle = isCelulose
        ? ''
        : `style="background: var(--persona-${c.authorId});"`;
      const time = formatCommentTimestamp(c.createdAt);
      const editedTag = c.editedAt
        ? '<span class="comment-edited-tag">(editado)</span>'
        : '';
      const canEdit = canEditComment(c);
      const canDelete = canDeleteComment(c);
      const isEditing = state.commentEditId === c.id;

      const bodyContent = isEditing
        ? `
          <div class="comment-edit-form">
            <textarea class="comment-edit-textarea" data-edit-id="${escapeAttr(c.id)}" rows="3">${escapeHtml(c.text || '')}</textarea>
            <div class="comment-edit-actions">
              <button class="comment-edit-save" data-comment-id="${escapeAttr(c.id)}" type="button">Salvar</button>
              <button class="comment-edit-cancel" data-comment-id="${escapeAttr(c.id)}" type="button">Cancelar</button>
            </div>
          </div>
        `
        : `<div class="comment-text">${escapeHtml(c.text || '')}</div>`;

      const actions = (!isEditing && (canEdit || canDelete))
        ? `
          <div class="comment-actions">
            ${canEdit ? `<button class="comment-action-btn comment-edit-btn" data-comment-id="${escapeAttr(c.id)}" type="button">Editar</button>` : ''}
            ${canDelete ? `<button class="comment-action-btn comment-delete-btn" data-comment-id="${escapeAttr(c.id)}" type="button">Apagar</button>` : ''}
          </div>
        `
        : '';

      return `
        <div class="comment-row" data-comment-id="${escapeAttr(c.id)}">
          <div class="comment-avatar" ${avatarStyle}>${escapeHtml(initial)}</div>
          <div class="comment-body">
            <div class="comment-header">
              <span class="comment-author">${escapeHtml(c.authorName || '—')}</span>
              <span class="comment-time">${escapeHtml(time)}</span>
              ${editedTag}
            </div>
            ${bodyContent}
          </div>
          ${actions}
        </div>
      `;
    }

    // F1: wire-up dos botões de edit/delete + form de edição.
    // É chamado a cada renderCommentThread porque o innerHTML reescreve tudo.
    function bindCommentActions(container) {
      if (!container) return;
      const wrapper = container.closest('.modal-comments');
      const cardId = wrapper ? wrapper.getAttribute('data-card-id') : null;
      if (!cardId) return;

      const reRender = () => {
        const comments = (state.clientData && state.clientData.comments && state.clientData.comments[cardId]) || {};
        renderCommentThread(comments, container);
      };

      container.querySelectorAll('.comment-edit-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.commentEditId = btn.getAttribute('data-comment-id');
          reRender();
          // Foca no textarea novo + cursor no final do texto.
          const ta = container.querySelector(
            '.comment-edit-textarea[data-edit-id="' + state.commentEditId + '"]'
          );
          if (ta) {
            ta.focus();
            ta.setSelectionRange(ta.value.length, ta.value.length);
          }
        });
      });

      container.querySelectorAll('.comment-delete-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const commentId = btn.getAttribute('data-comment-id');
          const ok = confirm('Apagar este comentário?');
          if (!ok) return;
          deleteComment(cardId, commentId).catch(e => {
            showToast('Falhou ao apagar: ' + (e && e.message ? e.message : 'erro'));
          });
        });
      });

      container.querySelectorAll('.comment-edit-save').forEach(btn => {
        btn.addEventListener('click', () => {
          const commentId = btn.getAttribute('data-comment-id');
          const ta = container.querySelector(
            '.comment-edit-textarea[data-edit-id="' + commentId + '"]'
          );
          if (!ta) return;
          const newText = ta.value;
          if (!newText.trim()) { showToast('Comentário vazio.'); return; }
          editComment(cardId, commentId, newText).then(() => {
            state.commentEditId = null;
            // listener Firebase vai re-renderizar com texto novo + tag (editado).
          }).catch(e => {
            showToast('Falhou ao editar: ' + (e && e.message ? e.message : 'erro'));
          });
        });
      });

      container.querySelectorAll('.comment-edit-cancel').forEach(btn => {
        btn.addEventListener('click', () => {
          state.commentEditId = null;
          reRender();
        });
      });

      // Cmd/Ctrl+Enter salva; Esc cancela.
      container.querySelectorAll('.comment-edit-textarea').forEach(ta => {
        ta.addEventListener('keydown', e => {
          if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
            e.preventDefault();
            const commentId = ta.getAttribute('data-edit-id');
            const newText = ta.value;
            if (!newText.trim()) return;
            editComment(cardId, commentId, newText).then(() => {
              state.commentEditId = null;
            }).catch(err => {
              showToast('Falhou ao editar: ' + (err && err.message ? err.message : 'erro'));
            });
          }
          if (e.key === 'Escape') {
            e.preventDefault();
            state.commentEditId = null;
            reRender();
          }
        });
      });
    }

    // Timestamp absoluto (Isabelle escolheu absoluto > relativo).
    //   Mesmo dia      → "HH:MM"
    //   Mesmo ano      → "DD/MM HH:MM"
    //   Outro ano      → "DD/MM/YY HH:MM"
    function formatCommentTimestamp(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      if (isNaN(d.getTime())) return '';
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      const hh = pad(d.getHours());
      const mm = pad(d.getMinutes());
      const sameDay = d.getFullYear() === now.getFullYear()
        && d.getMonth() === now.getMonth()
        && d.getDate() === now.getDate();
      if (sameDay) return `${hh}:${mm}`;
      const sameYear = d.getFullYear() === now.getFullYear();
      if (sameYear) return `${pad(d.getDate())}/${pad(d.getMonth() + 1)} ${hh}:${mm}`;
      const yy = String(d.getFullYear()).slice(-2);
      return `${pad(d.getDate())}/${pad(d.getMonth() + 1)}/${yy} ${hh}:${mm}`;
    }

    // ============================================================
    // RENDER — Persona picker (v1.5; substitui renderUserPicker)
    // ============================================================
    function renderPersonaPicker() {
      const personas = Object.values(state.clientData?.personas || {})
        .filter(p => p.active !== false)
        .sort((a, b) => (a.order || 0) - (b.order || 0));

      const pin = params.pin || '';

        <div class="welcome">

            ${personas.map(p => {

              return `
                <a href="${href}" class="welcome-cta" style="background: var(--white); color: var(--deep); border: 1px solid var(--border-soft); text-decoration: none; display: block;">
                  ${escapeHtml(p.name)}
